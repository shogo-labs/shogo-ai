# =============================================================================
# PostgreSQL - Shared Control Plane Database
# =============================================================================
# This is the shared database for:
#   - studio-core (organizations, teams, projects)
#   - better-auth (users, sessions)
#   - system-migrations (DDL tracking)
#
# In production, this would be RDS PostgreSQL with row-level security.
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: shogo-system
  labels:
    app: postgres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: shogo-system
type: Opaque
stringData:
  POSTGRES_USER: shogo
  POSTGRES_PASSWORD: shogo_k8s_dev
  POSTGRES_DB: shogo
  DATABASE_URL: postgres://shogo:shogo_k8s_dev@postgres:5432/shogo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: shogo-system
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-credentials
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "shogo"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "shogo"]
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: shogo-system
  labels:
    app: postgres
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: postgres

