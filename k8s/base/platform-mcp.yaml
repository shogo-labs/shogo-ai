# =============================================================================
# Kubernetes Deployment - Platform MCP (Singleton)
# =============================================================================
# Platform MCP provides full Shogo tool access for Claude orchestration.
#
# IMPORTANT: This is a DEPLOYMENT, not a Knative Service.
# Unlike workspace MCP services that scale to zero, Platform MCP must be
# always running for AI orchestration to work reliably.
#
# Why Deployment instead of Knative Service:
#   1. Claude orchestration requires immediate availability (no cold starts)
#   2. Platform operations (DDL, agent.chat, workspace.sync) are admin-level
#   3. Singleton ensures consistent state for platform schema management
#   4. Cost is acceptable - single small pod always running
#
# Access:
#   - Internal: http://platform-mcp.shogo-system:3100
#   - External: Via Ingress or API gateway (if needed)
#
# Tools available (all 16):
#   - Schema: set, load, list
#   - Store: create, get, update, delete, query
#   - View: execute, define, delete, project
#   - DDL: execute, migrate (platform only)
#   - Agent: chat (platform only)
#   - Workspace: sync (platform only)
#
# Schemas accessible:
#   - studio-core, platform-features, component-builder, studio-chat
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-mcp
  namespace: shogo-system
  labels:
    app.kubernetes.io/name: platform-mcp
    app.kubernetes.io/component: platform-mcp
    app.kubernetes.io/part-of: shogo-platform
    shogo.io/component: platform-mcp
    shogo.io/tier: control-plane
spec:
  # Singleton - exactly one replica at all times
  replicas: 1
  # No additional replicas during rollout
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: platform-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: platform-mcp
        app.kubernetes.io/component: platform-mcp
        shogo.io/component: platform-mcp
    spec:
      containers:
        - name: mcp
          # For local k3d: localhost:5050/shogo-mcp:latest
          # For production: ghcr.io/shogo-ai/shogo-mcp:latest
          image: ghcr.io/shogo-ai/shogo-mcp:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3100
              name: http
              protocol: TCP
          env:
            # MCP context - enables all tools
            - name: MCP_CONTEXT
              value: "platform"
            # Port configuration
            - name: MCP_PORT
              value: "3100"
            # Database connection
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: shogo-secrets
                  key: database-url
            # S3 configuration (MinIO or AWS)
            - name: S3_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: shogo-config
                  key: s3-endpoint
            - name: S3_SCHEMA_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: shogo-config
                  key: s3-bucket
            # Enable S3-based schema storage
            - name: SCHEMA_STORAGE
              value: "s3"
            # Force path-style for MinIO compatibility
            - name: S3_FORCE_PATH_STYLE
              value: "true"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: shogo-secrets
                  key: s3-access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: shogo-secrets
                  key: s3-secret-key
            # Schema storage path (local path for bundled schemas)
            - name: SCHEMAS_PATH
              value: "/app/.schemas"
            # Runtime environment
            - name: NODE_ENV
              value: "production"
          # Resource allocation - always-on service
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          # Health probes - critical for always-on service
          readinessProbe:
            httpGet:
              path: /health
              port: 3100
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3100
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          # Startup probe for slower cold starts
          startupProbe:
            httpGet:
              path: /health
              port: 3100
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30

---
# =============================================================================
# Service - Stable DNS for Platform MCP
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: platform-mcp
  namespace: shogo-system
  labels:
    app.kubernetes.io/name: platform-mcp
    app.kubernetes.io/component: platform-mcp
spec:
  type: ClusterIP
  ports:
    - port: 3100
      targetPort: 3100
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: platform-mcp
