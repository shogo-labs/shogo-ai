# =============================================================================
# cert-manager ClusterIssuer for Let's Encrypt
# =============================================================================
# Provides SSL certificates for *.shogo.ai via Let's Encrypt ACME.
# Uses HTTP01 challenge via Kourier ingress.
# Cloudflare handles SSL for *.shogo.one (Universal SSL).
# =============================================================================
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-production
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ops@shogo.ai
    privateKeySecretRef:
      name: letsencrypt-production-key
    solvers:
      - http01:
          ingress:
            ingressClassName: kourier
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: ops@shogo.ai
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            ingressClassName: kourier
---
# Certificate for the main platform domain
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: shogo-ai-tls
  namespace: kourier-system
spec:
  secretName: shogo-ai-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  dnsNames:
    - "studio.shogo.ai"
    - "api.shogo.ai"
    - "docs.shogo.ai"
