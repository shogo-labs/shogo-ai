apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: oci-growfs
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: oci-growfs
  template:
    metadata:
      labels:
        app: oci-growfs
    spec:
      hostPID: true
      priorityClassName: system-node-critical
      initContainers:
      - name: growfs
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          echo "[growfs] Starting filesystem expansion..."
          echo "[growfs] Step 1/4: oci-growfs (expand GPT partition)"
          chroot /host /usr/libexec/oci-growfs -y 2>&1 || echo "[growfs] oci-growfs returned non-zero (partition likely already expanded)"

          echo "[growfs] Step 2/4: pvresize (tell LVM about new partition size)"
          chroot /host pvresize /dev/sda3 2>&1
          sleep 2

          echo "[growfs] Step 3/4: lvextend (grow logical volume into free space)"
          chroot /host lvextend -l +100%FREE /dev/ocivolume/root 2>&1 || echo "[growfs] lvextend: no free space or already at max"

          echo "[growfs] Step 4/4: xfs_growfs (expand filesystem to fill LV)"
          chroot /host xfs_growfs / 2>&1

          DF_OUT=$(chroot /host df -h / 2>&1 | tail -1)
          echo "[growfs] Final state: $DF_OUT"
          echo "[growfs] Done."
        securityContext:
          privileged: true
        volumeMounts:
        - name: host
          mountPath: /host
      containers:
      - name: pause
        image: registry.k8s.io/pause:3.9
      volumes:
      - name: host
        hostPath:
          path: /
      tolerations:
      - operator: Exists
      nodeSelector:
        kubernetes.io/arch: arm64
