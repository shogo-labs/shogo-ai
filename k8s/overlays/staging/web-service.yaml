# =============================================================================
# Web/Studio Service - Staging Environment
# =============================================================================
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: s-studio
  namespace: shogo-staging-system
  labels:
    app.kubernetes.io/part-of: shogo
    environment: staging
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/min-scale: "1"
        autoscaling.knative.dev/max-scale: "5"
    spec:
      containers:
        - name: web
          image: shogo-web  # Replaced by kustomize
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
