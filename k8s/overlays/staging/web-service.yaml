# =============================================================================
# Web/Studio Service - Staging Environment
# =============================================================================
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: studio
  namespace: shogo-staging-system
  labels:
    app.kubernetes.io/part-of: shogo
    environment: staging
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/min-scale: "1"
        autoscaling.knative.dev/max-scale: "5"
    spec:
      containers:
        - name: web
          image: shogo-web  # Replaced by kustomize
          ports:
            - containerPort: 80
          env:
            - name: API_UPSTREAM
              value: "http://api.shogo-staging-system.svc.cluster.local"
            - name: API_HOST
              value: "api.shogo-staging-system.svc.cluster.local"
            # MCP proxies to workspace MCP service (Knative service in workspaces namespace)
            - name: MCP_UPSTREAM
              value: "http://mcp-workspace-1.shogo-staging-workspaces.svc.cluster.local"
            - name: MCP_HOST
              value: "mcp-workspace-1.shogo-staging-workspaces.svc.cluster.local"
            - name: DNS_RESOLVER
              value: "kube-dns.kube-system.svc.cluster.local"
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
