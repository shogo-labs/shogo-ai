# =============================================================================
# PodDisruptionBudget for Image Pre-Puller
# =============================================================================
# Ensures at least 3 of 4 prepuller pods remain running during disruptions.
# This prevents all prepuller pods from being deleted simultaneously, which
# would cause a complete loss of image caching across the cluster.
#
# Without this PDB, a restart with maxUnavailable: 100% would:
# 1. Delete all 4 prepuller pods
# 2. Create new pods that need to pull the 3.3GB image
# 3. Leave a 1-2 minute window where NO images are cached
# 4. Any project pods scheduled during this window pay full pull cost (79s)
#
# With this PDB:
# - Only 1 pod can be unavailable at a time
# - 3 pods always keep images cached
# - Rolling restart takes longer but never loses cache coverage
# =============================================================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: image-prepuller-pdb
  namespace: shogo-staging-system
  labels:
    app.kubernetes.io/name: image-prepuller
    app.kubernetes.io/part-of: shogo
    app.kubernetes.io/component: infrastructure
    environment: staging
spec:
  minAvailable: 1  # Allow node drains while keeping at least 1 prepuller running
  selector:
    matchLabels:
      app.kubernetes.io/name: image-prepuller
  unhealthyPodEvictionPolicy: AlwaysAllow  # Allow eviction of unhealthy pods
