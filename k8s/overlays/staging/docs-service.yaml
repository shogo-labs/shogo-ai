# =============================================================================
# Docs Service - Staging Environment
# =============================================================================
# Serves the Docusaurus documentation site at docs-staging.shogo.ai
# =============================================================================
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: docs
  namespace: shogo-staging-system
  labels:
    app.kubernetes.io/part-of: shogo
    environment: staging
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/min-scale: "1"
        autoscaling.knative.dev/max-scale: "3"
    spec:
      containers:
        - name: docs
          image: shogo-docs  # Replaced by kustomize
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "100m"
