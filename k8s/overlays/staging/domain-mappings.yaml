# =============================================================================
# Domain Mappings - Staging Environment
# =============================================================================
# Maps staging domains to Knative Services
# Note: API is proxied via /api path on studio, no separate subdomain needed
# =============================================================================
apiVersion: serving.knative.dev/v1beta1
kind: DomainMapping
metadata:
  name: studio-staging.shogo.ai
  namespace: shogo-staging-system
spec:
  ref:
    name: studio
    kind: Service
    apiVersion: serving.knative.dev/v1
---
apiVersion: serving.knative.dev/v1beta1
kind: DomainMapping
metadata:
  name: docs-staging.shogo.ai
  namespace: shogo-staging-system
spec:
  ref:
    name: docs
    kind: Service
    apiVersion: serving.knative.dev/v1
---
apiVersion: serving.knative.dev/v1beta1
kind: DomainMapping
metadata:
  name: mcp-staging.shogo.ai
  namespace: shogo-staging-workspaces
spec:
  ref:
    name: mcp-workspace-1
    kind: Service
    apiVersion: serving.knative.dev/v1
