# =============================================================================
# Kustomize Overlay - Staging Environment
# =============================================================================
# Usage: kubectl apply -k k8s/overlays/staging/
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Note: namespace is set per-resource, not globally, to support multiple namespaces

resources:
  - namespace.yaml
  # secrets.yaml is managed by GitHub Actions workflow (not committed to repo)
  - domain-mappings.yaml
  - api-service.yaml
  - web-service.yaml
  - workspace-services.yaml
  - alb-ingress.yaml  # AWS Application Load Balancer for HTTPS ingress
  - image-prepuller.yaml  # Pre-pull images on all nodes for faster cold starts
  - image-prepuller-pdb.yaml  # Ensure prepuller pods aren't all deleted at once

labels:
  - pairs:
      app.kubernetes.io/part-of: shogo
      app.kubernetes.io/managed-by: kustomize
      environment: staging
    includeSelectors: false

images:
  - name: shogo-mcp
    newName: 097357356677.dkr.ecr.us-east-1.amazonaws.com/shogo/shogo-mcp
    newTag: staging-latest
  - name: shogo-api
    newName: 097357356677.dkr.ecr.us-east-1.amazonaws.com/shogo/shogo-api
    newTag: staging-latest
  - name: shogo-web
    newName: 097357356677.dkr.ecr.us-east-1.amazonaws.com/shogo/shogo-web
    newTag: staging-latest
  # Project runtime image for pre-puller DaemonSet
  - name: shogo-project-runtime
    newName: 097357356677.dkr.ecr.us-east-1.amazonaws.com/shogo/project-runtime
    newTag: staging-latest
