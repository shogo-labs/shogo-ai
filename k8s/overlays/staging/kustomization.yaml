# =============================================================================
# Kustomize Overlay - Staging Environment
# =============================================================================
# Usage: kubectl apply -k k8s/overlays/staging/
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: shogo-staging-system

resources:
  - namespace.yaml
  - domain-mappings.yaml
  - api-service.yaml
  - web-service.yaml
  - workspace-services.yaml

commonLabels:
  app.kubernetes.io/part-of: shogo
  app.kubernetes.io/managed-by: kustomize
  environment: staging

images:
  - name: shogo-mcp
    newName: 620804327344.dkr.ecr.us-east-1.amazonaws.com/shogo/shogo-mcp
    newTag: staging-latest
  - name: shogo-api
    newName: 620804327344.dkr.ecr.us-east-1.amazonaws.com/shogo/shogo-api
    newTag: staging-latest
  - name: shogo-web
    newName: 620804327344.dkr.ecr.us-east-1.amazonaws.com/shogo/shogo-web
    newTag: staging-latest
