# =============================================================================
# API Service - Staging Environment (OCI / OKE)
# =============================================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-service-account
  namespace: shogo-staging-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: shogo-staging-api-domainmapping-manager
rules:
  - apiGroups: ["serving.knative.dev"]
    resources: ["domainmappings"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["serving.knative.dev"]
    resources: ["services"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: shogo-staging-api-domainmapping-manager
subjects:
  - kind: ServiceAccount
    name: api-service-account
    namespace: shogo-staging-system
roleRef:
  kind: ClusterRole
  name: shogo-staging-api-domainmapping-manager
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: shogo-api-db-secret-manager
  namespace: shogo-staging-workspaces
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: shogo-api-db-secret-manager
  namespace: shogo-staging-workspaces
subjects:
  - kind: ServiceAccount
    name: api-service-account
    namespace: shogo-staging-system
roleRef:
  kind: Role
  name: shogo-api-db-secret-manager
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: api
  namespace: shogo-staging-system
  labels:
    app.kubernetes.io/part-of: shogo
    environment: staging
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/min-scale: "1"
        autoscaling.knative.dev/max-scale: "5"
        # ─── Long-lived WebSocket support for desktop tunnel ───────────────
        # Without these, Knative's activator / autoscaler can terminate
        # pods holding active desktop WS sessions, causing intermittent
        # "instance offline" 503s even when Redis is healthy.
        #
        # target-burst-capacity=-1  keep the activator on the data path so
        #                           WS upgrades survive scale transitions
        # scale-down-delay=5m       don't reap pods immediately on idle;
        #                           gives desktops time to reconnect gracefully
        # window=60s                standard smoothing
        autoscaling.knative.dev/target-burst-capacity: "-1"
        autoscaling.knative.dev/scale-down-delay: "5m"
        autoscaling.knative.dev/window: "60s"
    spec:
      # Max time a single request (inc. WS) can stay open. 1800s = 30 min.
      # Desktops reconnect well before this on their own heartbeat cycle,
      # so there's no benefit to going higher — and going higher (3600)
      # risks being silently clamped by the cluster-level
      # `max-request-timeout-seconds` in knative-serving/config-defaults.
      # Keeping this within safe Knative defaults avoids that dependency.
      timeoutSeconds: 1800
      serviceAccountName: api-service-account
      containers:
        - name: api
          image: us-ashburn-1.ocir.io/idin4oltblww/shogo/shogo-api:staging-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8002
          env:
            - name: API_PORT
              value: "8002"
            - name: NODE_ENV
              value: "staging"
            - name: SYSTEM_NAMESPACE
              value: "shogo-staging-system"
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
            - name: PROJECT_NAMESPACE
              value: "shogo-staging-workspaces"
            - name: RUNTIME_IMAGE
              value: "us-ashburn-1.ocir.io/idin4oltblww/shogo/shogo-runtime:staging-latest"
            - name: PREVIEW_BASE_DOMAIN
              value: "shogo.ai"
            - name: PREVIEW_ENVIRONMENT
              value: "staging"
            - name: S3_WORKSPACES_BUCKET
              value: "shogo-workspaces-staging"
            - name: S3_REGION
              value: "us-ashburn-1"
            - name: S3_ENDPOINT
              value: "https://idin4oltblww.compat.objectstorage.us-ashburn-1.oraclecloud.com"
            - name: PUBLISH_NAMESPACE
              value: "shogo-staging-system"
            - name: PUBLISH_DOMAIN
              value: "shogo.one"
            - name: BETTER_AUTH_URL
              value: "https://studio.staging.shogo.ai"
            - name: SHOGO_PUBLIC_API_URL
              value: "https://studio.staging.shogo.ai"
            - name: ALLOWED_ORIGINS
              value: "https://studio.staging.shogo.ai"
            - name: REDIS_URL
              value: "redis://redis-master.shogo-staging-system:6379"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: DATABASE_URL
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: BETTER_AUTH_SECRET
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: ANTHROPIC_API_KEY
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: STRIPE_SECRET_KEY
                  optional: true
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: STRIPE_WEBHOOK_SECRET
                  optional: true
            - name: GH_APP_ID
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GH_APP_ID
                  optional: true
            - name: GH_APP_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GH_APP_CLIENT_ID
                  optional: true
            - name: GH_APP_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GH_APP_CLIENT_SECRET
                  optional: true
            - name: GH_APP_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GH_APP_PRIVATE_KEY
                  optional: true
            - name: GH_APP_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GH_APP_WEBHOOK_SECRET
                  optional: true
            - name: GH_APP_SLUG
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GH_APP_SLUG
                  optional: true
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GOOGLE_CLIENT_ID
                  optional: true
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GOOGLE_CLIENT_SECRET
                  optional: true
            - name: COMPOSIO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: COMPOSIO_API_KEY
                  optional: true
            - name: COMPOSIO_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: COMPOSIO_PROJECT_ID
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: OPENAI_API_KEY
                  optional: true
            - name: SERPER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: SERPER_API_KEY
                  optional: true
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GOOGLE_API_KEY
                  optional: true
            - name: ELEVENLABS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: ELEVENLABS_API_KEY
                  optional: true
            - name: ELEVENLABS_VOICE_MODE_AGENT_ID
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: ELEVENLABS_VOICE_MODE_AGENT_ID
                  optional: true
            - name: ELEVENLABS_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: ELEVENLABS_WEBHOOK_SECRET
                  optional: true
            - name: TWILIO_ACCOUNT_SID
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: TWILIO_ACCOUNT_SID
                  optional: true
            - name: TWILIO_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: TWILIO_AUTH_TOKEN
                  optional: true
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "https://ingest.us.signoz.cloud:443"
            - name: OTEL_SERVICE_NAME
              value: "shogo-api-staging"
            - name: OTEL_LOG_LEVEL
              value: "info"
            - name: SIGNOZ_INGESTION_KEY
              valueFrom:
                secretKeyRef:
                  name: signoz-credentials
                  key: SIGNOZ_INGESTION_KEY
                  optional: true
            - name: WARM_POOL_MIN_PODS
              value: "5"
            - name: REGION_ID
              value: "staging"
            - name: REGION_LABEL
              value: "Staging (OCI)"
            - name: WARM_POOL_MAX_AGE_MS
              value: "3600000"
            - name: PROMOTED_POD_GC_ENABLED
              value: "true"
            - name: PROMOTED_POD_IDLE_TIMEOUT_MS
              value: "600000"
            - name: LOAD_TEST_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: LOAD_TEST_SECRET
                  optional: true
            - name: EVAL_CALLBACK_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: EVAL_CALLBACK_SECRET
                  optional: true
            - name: EMAIL_PROVIDER
              value: "smtp"
            - name: SMTP_HOST
              value: "smtp.resend.com"
            - name: SMTP_PORT
              value: "465"
            - name: SMTP_USER
              value: "resend"
            - name: SMTP_SECURE
              value: "true"
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: SMTP_PASSWORD
                  optional: true
            - name: EMAIL_FROM
              value: "noreply@updates.shogo.ai"
            - name: SMTP_FROM_EMAIL
              value: "noreply@updates.shogo.ai"
            - name: SMTP_FROM_NAME
              value: "Shogo"
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "15"]
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "2Gi"
              cpu: "1"
      # timeoutSeconds is set near the top of template.spec (3600s) for WS support.
      terminationGracePeriodSeconds: 630
