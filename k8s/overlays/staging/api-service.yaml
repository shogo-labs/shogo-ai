# =============================================================================
# API Service - Staging Environment
# =============================================================================

# ServiceAccount for the API pod
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-service-account
  namespace: shogo-staging-system
---
# ClusterRole for managing DomainMappings (for publish feature)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: shogo-staging-api-domainmapping-manager
rules:
  - apiGroups: ["serving.knative.dev"]
    resources: ["domainmappings"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["serving.knative.dev"]
    resources: ["services"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
# Bind the ClusterRole to the API service account
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: shogo-staging-api-domainmapping-manager
subjects:
  - kind: ServiceAccount
    name: api-service-account
    namespace: shogo-staging-system
roleRef:
  kind: ClusterRole
  name: shogo-staging-api-domainmapping-manager
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: api
  namespace: shogo-staging-system
  labels:
    app.kubernetes.io/part-of: shogo
    environment: staging
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/min-scale: "1"
        autoscaling.knative.dev/max-scale: "5"
    spec:
      # Service account with permissions to create Knative services and DomainMappings
      serviceAccountName: api-service-account
      containers:
        - name: api
          image: shogo-api  # Replaced by kustomize
          ports:
            - containerPort: 8002
          env:
            - name: API_PORT
              value: "8002"
            - name: NODE_ENV
              value: "staging"
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
            - name: MCP_URL
              value: "http://mcp-workspace-1.shogo-staging-workspaces.svc.cluster.local"
            # Project runtime configuration - namespace for project pods
            # Note: PROJECT_RUNTIME_IMAGE uses floating 'staging-latest' tag updated by CI/CD
            - name: PROJECT_NAMESPACE
              value: "shogo-staging-workspaces"
            - name: PROJECT_RUNTIME_IMAGE
              value: "097357356677.dkr.ecr.us-east-1.amazonaws.com/shogo/project-runtime:staging-latest"
            # S3 configuration for project file persistence
            # knative-project-manager injects this into project runtime pods
            - name: S3_WORKSPACES_BUCKET
              value: "shogo-workspaces-staging"
            - name: S3_REGION
              value: "us-east-1"
            # Publishing configuration - namespace and domain for DomainMappings
            # Note: PUBLISH_NAMESPACE must match where the "studio" service lives
            # because DomainMappings must be in the same namespace as their target
            - name: PUBLISH_NAMESPACE
              value: "shogo-staging-system"
            - name: PUBLISH_DOMAIN
              value: "shogo.one"
            - name: BETTER_AUTH_URL
              value: "https://api-staging.shogo.ai"
            - name: ALLOWED_ORIGINS
              value: "https://studio-staging.shogo.ai,https://api-staging.shogo.ai"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: REDIS_URL
                  optional: true
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: DATABASE_URL
            - name: PROJECTS_DB_ADMIN_URL
              valueFrom:
                secretKeyRef:
                  name: projects-db-admin
                  key: PROJECTS_DB_ADMIN_URL
            - name: PROJECTS_DB_HOST
              valueFrom:
                secretKeyRef:
                  name: projects-db-admin
                  key: PROJECTS_DB_HOST
                  optional: true
            - name: PROJECTS_DB_PORT
              valueFrom:
                secretKeyRef:
                  name: projects-db-admin
                  key: PROJECTS_DB_PORT
                  optional: true
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: BETTER_AUTH_SECRET
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: ANTHROPIC_API_KEY
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: STRIPE_SECRET_KEY
                  optional: true
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: STRIPE_WEBHOOK_SECRET
                  optional: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
