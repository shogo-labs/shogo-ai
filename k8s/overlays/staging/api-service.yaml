# =============================================================================
# API Service - Staging Environment (OCI / OKE)
# =============================================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-service-account
  namespace: shogo-staging-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: shogo-staging-api-domainmapping-manager
rules:
  - apiGroups: ["serving.knative.dev"]
    resources: ["domainmappings"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # `revisions` is REQUIRED for warm-pool hot/cold detection: the controller
  # reads each pool Service's latest Revision status (actualReplicas) to tell a
  # HOT pod (>=1 running replica, instant claim) from a scaled-to-zero one (~20s
  # activator cold start). Without `list revisions` the controller gets a 403,
  # treats every pool pod as cold, and every "warm" claim silently eats a
  # scale-from-zero — i.e. the pool is only nominally warm. `configurations`/
  # `routes` + `watch` round out read access and match the production overlay.
  - apiGroups: ["serving.knative.dev"]
    resources: ["services", "revisions", "configurations", "routes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: shogo-staging-api-domainmapping-manager
subjects:
  - kind: ServiceAccount
    name: api-service-account
    namespace: shogo-staging-system
roleRef:
  kind: ClusterRole
  name: shogo-staging-api-domainmapping-manager
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: shogo-api-db-secret-manager
  namespace: shogo-staging-workspaces
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: shogo-api-db-secret-manager
  namespace: shogo-staging-workspaces
subjects:
  - kind: ServiceAccount
    name: api-service-account
    namespace: shogo-staging-system
roleRef:
  kind: Role
  name: shogo-api-db-secret-manager
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: api
  namespace: shogo-staging-system
  labels:
    app.kubernetes.io/part-of: shogo
    environment: staging
spec:
  template:
    metadata:
      annotations:
        # min-scale=2 keeps a warm second replica so the first burst of
        # CPU-bound sign-ups (Better Auth password hashing is synchronous and
        # blocks the event loop) doesn't all pile onto a single pod.
        autoscaling.knative.dev/min-scale: "2"
        autoscaling.knative.dev/max-scale: "5"
        # target=25 concurrent requests/pod. The default (100) let a single pod
        # absorb heavy concurrency before scaling, so CPU-bound sign-up hashing
        # starved reads on that pod (get-session p99 hit ~6s at 150 users).
        # Lowering it scales out sooner and spreads the event-loop blocking:
        # at 150 users this cut get-session p99 ~6.3s -> ~0.9s and sign-up p95
        # ~29s -> ~16s with 0 failures. Validated via load-tests/staging_mix.
        autoscaling.knative.dev/target: "25"
        # ─── Long-lived chat stream + WebSocket support ────────────────────
        # The desktop tunnel WebSocket bypasses Knative entirely via
        # api-tunnel-ingress.yaml (label-selector Service direct to the
        # revision pod on :8012), so we don't need the activator pinned
        # on the data path for WS Upgrade survival.
        #
        # target-burst-capacity=0   Take the activator OUT of the request
        #                           path once a replica is Ready. Knative's
        #                           activator imposes a hardcoded ~5-minute
        #                           `defaultRequestTimeout` (handler/timeout.go)
        #                           on in-flight requests that ignores the
        #                           revision-level `timeoutSeconds` below.
        #                           Long agent chat responses proxied through
        #                           the API (project-chat.ts streams from the
        #                           runtime pod back to the client over a
        #                           single long-lived HTTP response) were
        #                           getting severed at exactly the 5-minute
        #                           mark in staging. Matches the fix already
        #                           applied to runtime pods in
        #                           knative-project-manager.ts and to warm
        #                           pool services in warm-pool-controller.ts.
        # scale-down-delay=5m       don't reap pods immediately on idle;
        #                           gives desktops time to reconnect gracefully
        # window=60s                standard smoothing
        autoscaling.knative.dev/target-burst-capacity: "0"
        autoscaling.knative.dev/scale-down-delay: "5m"
        autoscaling.knative.dev/window: "60s"
    spec:
      # Max time a single request (inc. WS) can stay open. 1800s = 30 min.
      # Desktops reconnect well before this on their own heartbeat cycle,
      # so there's no benefit to going higher — and going higher (3600)
      # risks being silently clamped by the cluster-level
      # `max-request-timeout-seconds` in knative-serving/config-defaults.
      # Keeping this within safe Knative defaults avoids that dependency.
      timeoutSeconds: 1800
      serviceAccountName: api-service-account
      containers:
        - name: api
          image: us-ashburn-1.ocir.io/idin4oltblww/shogo/shogo-api:staging-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8002
          env:
            - name: API_PORT
              value: "8002"
            - name: NODE_ENV
              value: "staging"
            - name: SYSTEM_NAMESPACE
              value: "shogo-staging-system"
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
            - name: PROJECT_NAMESPACE
              value: "shogo-staging-workspaces"
            # RUNTIME_IMAGE is a render-time placeholder, NOT a real value. The
            # deploy's "Apply Kubernetes manifests" step replaces
            # RUNTIME_IMAGE_PLACEHOLDER with the resolved immutable
            # `:staging-<git-sha>` runtime tag (same mechanism as the
            # image-prepuller) before `kubectl apply`. Shipping the token rather
            # than a literal `:staging-bootstrap` — a tag that exists in no
            # OCIR — means apply can never stamp a non-existent runtime image
            # onto the api ksvc and then depend on a later patch to undo it.
            # That undo-gap bricked India on 2026-05-27 when a mid-deploy abort
            # left the placeholder live. sync-api-env.sh re-verifies the value
            # downstream as defense-in-depth.
            - name: RUNTIME_IMAGE
              value: "RUNTIME_IMAGE_PLACEHOLDER"
            - name: PREVIEW_BASE_DOMAIN
              value: "shogo.ai"
            - name: PREVIEW_ENVIRONMENT
              value: "staging"
            - name: S3_WORKSPACES_BUCKET
              value: "shogo-workspaces-staging"
            - name: S3_REGION
              value: "us-ashburn-1"
            - name: S3_ENDPOINT
              value: "https://idin4oltblww.compat.objectstorage.us-ashburn-1.oraclecloud.com"
            # S3 credentials for OCI Object Storage (Oracle's S3-compat API).
            # Required for: project import → S3 seed (apps/api/src/routes/project-export-import.ts),
            # Storage cron, and any other S3 PUT from the API pod. NOT marked
            # optional: a missing secret is the exact silent-failure mode that
            # let imports "succeed" with empty projects in staging on
            # 2026-05-11. We'd rather crashloop than ship that again.
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: secret-key
            - name: PUBLISH_NAMESPACE
              value: "shogo-staging-system"
            # OCI Object Storage bucket the *.shogo.one Cloudflare Worker
            # reads from (terraform/modules/publish-hosting-oci). MUST
            # match `shogo-published-apps-${var.environment}` for the env
            # this overlay deploys. publish.ts asserts this is set in
            # K8s mode — see the post-2026-05-26 comment there.
            - name: PUBLISH_BUCKET
              value: "shogo-published-apps-staging"
            # Writable-state bucket for SERVER-BACKED published apps (the
            # SQLite DB + uploads their server.tsx persists). publish.ts seeds
            # `{subdomain}/data.tar.gz` here and injects it into the published
            # Knative pod env (createPublishedServerService) as
            # S3_PUBLISHED_DATA_BUCKET. Must match
            # `shogo-published-data-${var.environment}`.
            - name: PUBLISH_DATA_BUCKET
              value: "shogo-published-data-staging"
            - name: PUBLISH_DOMAIN
              value: "shogo.one"
            # --- Custom domains (Cloudflare for SaaS) ----------------------
            # Bring-your-own hostnames for published apps. INERT until the
            # `custom-domains-config` secret is populated: the helper
            # (cloudflare-custom-hostnames.ts) returns null config when the
            # token/zone are missing, so the API reports the feature disabled
            # and the UI hides the panel. Populate the secret from the
            # publish-hosting-oci terraform outputs AFTER applying staging with
            # `enable_custom_domains = true` + a DEDICATED `custom_domains_zone`
            # (NOT shogo.one — see docs/custom-domains.md for the zone-sharing
            # rationale). Token needs SSL+Certificates:Edit on that zone and
            # Workers KV Storage:Edit on the account.
            - name: CF_CUSTOM_HOSTNAMES_TOKEN
              valueFrom:
                secretKeyRef:
                  name: custom-domains-config
                  key: CF_CUSTOM_HOSTNAMES_TOKEN
                  optional: true
            - name: CF_CUSTOM_DOMAIN_ZONE_ID
              valueFrom:
                secretKeyRef:
                  name: custom-domains-config
                  key: CF_CUSTOM_DOMAIN_ZONE_ID
                  optional: true
            - name: CF_ACCOUNT_ID
              valueFrom:
                secretKeyRef:
                  name: custom-domains-config
                  key: CF_ACCOUNT_ID
                  optional: true
            - name: CF_CUSTOM_DOMAIN_KV_NAMESPACE_ID
              valueFrom:
                secretKeyRef:
                  name: custom-domains-config
                  key: CF_CUSTOM_DOMAIN_KV_NAMESPACE_ID
                  optional: true
            # Workers KV namespace that flags server-backed subdomains so the
            # *.shogo.one Worker proxies their /api/* to the Knative ingress.
            # From the publish-hosting-oci output `server_backed_kv_namespace_id`
            # (set enable_server_backed_publish + kourier_origin). Optional —
            # absent => server-backed publishing degrades to static-only edge.
            - name: CF_SERVER_BACKED_KV_NAMESPACE_ID
              valueFrom:
                secretKeyRef:
                  name: custom-domains-config
                  key: CF_SERVER_BACKED_KV_NAMESPACE_ID
                  optional: true
            # Workers KV namespace for the published-site password gate. The
            # *.shogo.one Worker prompts for a shared password on subdomains
            # with an entry here. From the publish-hosting-oci output
            # `site_auth_kv_namespace_id`. Optional — absent => publish.ts can't
            # write the gate and password-protected sites serve publicly.
            - name: CF_SITE_AUTH_KV_NAMESPACE_ID
              valueFrom:
                secretKeyRef:
                  name: custom-domains-config
                  key: CF_SITE_AUTH_KV_NAMESPACE_ID
                  optional: true
            # Workers KV namespace for the preview region map. The
            # `preview--*.staging.shogo.ai` router Worker reads
            # `projectId -> region` here to resolveOverride each preview to its
            # hosting region's Kourier LB; the API
            # (cloudflare-preview-region-kv.ts) writes it on preview
            # DomainMapping create/delete. From the staging output
            # `preview_regions_kv_namespace_id`. Optional — absent => previews
            # fall back to the flat `*.staging.shogo.ai` wildcard.
            - name: CF_PREVIEW_REGIONS_KV_NAMESPACE_ID
              valueFrom:
                secretKeyRef:
                  name: custom-domains-config
                  key: CF_PREVIEW_REGIONS_KV_NAMESPACE_ID
                  optional: true
            - name: CUSTOM_DOMAIN_FALLBACK_ORIGIN
              valueFrom:
                secretKeyRef:
                  name: custom-domains-config
                  key: CUSTOM_DOMAIN_FALLBACK_ORIGIN
                  optional: true
            - name: BETTER_AUTH_URL
              value: "https://studio.staging.shogo.ai"
            - name: SHOGO_PUBLIC_API_URL
              value: "https://studio.staging.shogo.ai"
            - name: ALLOWED_ORIGINS
              value: "https://studio.staging.shogo.ai"
            # Public hostname the desktop should use for the on-demand
            # tunnel WebSocket. Routed by api-tunnel-ingress.yaml directly
            # to the api revision pod (no DomainMapping → no broken WS
            # Upgrade hop). Heartbeat traffic stays on
            # SHOGO_PUBLIC_API_URL above.
            - name: SHOGO_TUNNEL_WS_URL
              value: "wss://tunnel.staging.shogo.ai"
            - name: REDIS_URL
              value: "redis://redis-master.shogo-staging-system:6379"
            # Conventional pooler split (durable fix for advisory-lock pool
            # exhaustion, validated HERE before any prod region): DATABASE_URL
            # points at the transaction-mode PgBouncer (platform-pg-pooler-rw,
            # see k8s/cnpg/staging-oci/platform-pooler.yaml). Session-scoped work
            # that must pin a backend — advisory locks (withAdvisoryLock /
            # withGlobalJobLock) and Prisma migrate — uses DATABASE_DIRECT_URL
            # -> platform-pg-rw. Ops MUST add the `DATABASE_DIRECT_URL` key to
            # the postgres-credentials secret and repoint `DATABASE_URL` at the
            # pooler BEFORE applying this manifest — see
            # k8s/cnpg/logical-replication/RUNBOOK.md.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: DATABASE_URL
            - name: DATABASE_DIRECT_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: DATABASE_DIRECT_URL
            - name: PRISMA_POOL_SIZE
              value: "25"
            # Better Auth opens its OWN pg pool (apps/api/src/auth.ts), separate
            # from Prisma. Left unset it defaults to 60 conns/pod, so per-pod
            # client conns to PgBouncer are 25 (Prisma) + 60 = 85, not 25. Cap it
            # so pods x (PRISMA_POOL_SIZE + AUTH_POOL_SIZE) stays well under the
            # pooler's max_client_conn.
            - name: AUTH_POOL_SIZE
              value: "10"
            - name: ADVISORY_LOCK_POOL_SIZE
              value: "4"
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: BETTER_AUTH_SECRET
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: ANTHROPIC_API_KEY
            # AES-256-GCM master key for encrypting model-provider API keys
            # at rest (apps/api/src/lib/secret-crypto.ts). Optional so the API
            # still boots if unset; saving a custom-provider key 503s until it
            # is provisioned.
            - name: SECRETS_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: SECRETS_ENCRYPTION_KEY
                  optional: true
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: STRIPE_SECRET_KEY
                  optional: true
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: STRIPE_WEBHOOK_SECRET
                  optional: true
            - name: STRIPE_CONNECT_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: STRIPE_CONNECT_WEBHOOK_SECRET
                  optional: true
            - name: GH_APP_ID
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GH_APP_ID
                  optional: true
            - name: GH_APP_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GH_APP_CLIENT_ID
                  optional: true
            - name: GH_APP_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GH_APP_CLIENT_SECRET
                  optional: true
            - name: GH_APP_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GH_APP_PRIVATE_KEY
                  optional: true
            - name: GH_APP_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GH_APP_WEBHOOK_SECRET
                  optional: true
            - name: GH_APP_SLUG
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GH_APP_SLUG
                  optional: true
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GOOGLE_CLIENT_ID
                  optional: true
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GOOGLE_CLIENT_SECRET
                  optional: true
            - name: COMPOSIO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: COMPOSIO_API_KEY
                  optional: true
            - name: COMPOSIO_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: COMPOSIO_PROJECT_ID
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: OPENAI_API_KEY
                  optional: true
            - name: SERPER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: SERPER_API_KEY
                  optional: true
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GOOGLE_API_KEY
                  optional: true
            - name: ELEVENLABS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: ELEVENLABS_API_KEY
                  optional: true
            - name: ELEVENLABS_VOICE_MODE_AGENT_ID
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: ELEVENLABS_VOICE_MODE_AGENT_ID
                  optional: true
            - name: ELEVENLABS_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: ELEVENLABS_WEBHOOK_SECRET
                  optional: true
            - name: TWILIO_ACCOUNT_SID
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: TWILIO_ACCOUNT_SID
                  optional: true
            - name: TWILIO_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: TWILIO_AUTH_TOKEN
                  optional: true
            # ── Native MLM affiliate program ──────────────────────────
            # Master flag. When 'true' all /api/affiliates/* routes are
            # live, the better-auth signup hook starts writing
            # AffiliateAttribution rows, and the three commission cron
            # jobs become active. Flipping back to 'false' is a safe
            # rollback (every code path short-circuits).
            - name: SHOGO_AFFILIATES_NATIVE
              value: "true"
            - name: SHOGO_AFFILIATE_MAX_DEPTH
              value: "3"
            # Pay only the direct referrer by default (MLM payouts off);
            # enrollment tree depth above is unaffected. Set to "3" to
            # re-enable full multi-level payouts.
            - name: SHOGO_AFFILIATE_PAYOUT_MAX_DEPTH
              value: "1"
            - name: SHOGO_AFFILIATE_REFUND_HOLD_DAYS
              value: "30"
            - name: SHOGO_AFFILIATE_MIN_PAYOUT_CENTS
              value: "5000"
            - name: SHOGO_AFFILIATE_COOKIE_DAYS
              value: "60"
            # Shared secret with shogo-website/functions/r/[code].ts —
            # the marketing-site Cloudflare Function calls
            # POST /api/affiliates/click with this header. The API
            # rejects the request when the value doesn't match.
            # Set in api-secrets by the deploy workflow (and on first
            # rollout via `kubectl patch secret api-secrets`).
            - name: SHOGO_INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: SHOGO_INTERNAL_SECRET
                  optional: true
            # --- Affiliate content-CPM (Instagram / TikTok view tracking) ---
            # Optional, DB-controlled feature. The master toggle, provider,
            # CPM rate, hold days, and caps are all super-admin PlatformSetting
            # rows (`affiliate.content.*`), NOT env vars — see Admin → Affiliate
            # CPM. The only env here is the EnsembleData token (a secret); the
            # encrypted PlatformSetting provider-key.ensembledata (set via the
            # admin UI) is preferred, this secretKeyRef is a fallback.
            - name: ENSEMBLEDATA_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: ENSEMBLEDATA_API_TOKEN
                  optional: true
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "https://ingest.us.signoz.cloud:443"
            - name: OTEL_SERVICE_NAME
              value: "shogo-api-staging"
            - name: OTEL_LOG_LEVEL
              value: "info"
            - name: SIGNOZ_INGESTION_KEY
              valueFrom:
                secretKeyRef:
                  name: signoz-credentials
                  key: SIGNOZ_INGESTION_KEY
                  optional: true
            - name: WARM_POOL_MIN_PODS
              value: "5"
            # Warm-pool memory is intentionally OVERCOMMITTED (request << limit):
            # most pool pods idle near ~768Mi and only a few actively bundle at
            # multi-GB at any instant, so a low request lets us bin-pack ~25
            # pods/node instead of ~6 — that density is the whole point of the
            # pool. We keep the overcommit here (defaults 768Mi req / 8Gi limit)
            # and instead make it SAFE at the node level: kubelet eviction sheds
            # the lowest-priority (shogo-workspace-low) pods early under memory
            # pressure, and the CNPG PriorityClass (shogo-db-critical) guarantees
            # the DB is never the victim. WARM_POOL_POD_MEM_REQUEST is left at its
            # default but exposed as an operational knob: bumping the request
            # floor caps worst-case per-node pod density during an incident
            # without a code deploy.
            - name: REGION_ID
              value: "staging"
            - name: REGION_LABEL
              value: "Staging (OCI)"
            # Home-region write routing. Staging is single-region (no
            # REGION_PEERS), so "enforce" exercises the resolver + fail-closed
            # decision paths but every write still resolves local (no peer to
            # proxy to) — behaviourally safe, and validates the enforce code
            # path on real traffic ahead of the per-region production rollout.
            # "shadow" logs only; "off" disables it entirely.
            - name: HOME_REGION_ROUTING
              value: "enforce"
            - name: WARM_POOL_MAX_AGE_MS
              value: "3600000"
            - name: PROMOTED_POD_GC_ENABLED
              value: "true"
            # 30 min: needs to be longer than typical user-think-time
            # between chat turns. With 10 min users would idle out while
            # reading/typing the next message and the next visit hit a
            # cold start, which (combined with the activator's hardcoded
            # 5-minute request timeout) was producing the
            # `eof-without-turn-complete` log lines.
            - name: PROMOTED_POD_IDLE_TIMEOUT_MS
              value: "1800000"
            - name: LOAD_TEST_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: LOAD_TEST_SECRET
                  optional: true
            - name: EVAL_CALLBACK_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: EVAL_CALLBACK_SECRET
                  optional: true
            - name: EMAIL_PROVIDER
              value: "smtp"
            - name: SMTP_HOST
              value: "smtp.resend.com"
            - name: SMTP_PORT
              value: "465"
            - name: SMTP_USER
              value: "resend"
            - name: SMTP_SECURE
              value: "true"
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: SMTP_PASSWORD
                  optional: true
            - name: CUSTOMERIO_SITE_ID
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: CUSTOMERIO_SITE_ID
                  optional: true
            - name: CUSTOMERIO_TRACKING_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: CUSTOMERIO_TRACKING_API_KEY
                  optional: true
            - name: CUSTOMERIO_APP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: CUSTOMERIO_APP_API_KEY
                  optional: true
            - name: EMAIL_FROM
              value: "noreply@updates.shogo.ai"
            - name: SMTP_FROM_EMAIL
              value: "noreply@updates.shogo.ai"
            - name: SMTP_FROM_NAME
              value: "Shogo"
          # NOTE: `lifecycle.preStop` and pod-level `terminationGracePeriodSeconds`
          # were previously declared here for graceful drain on rollout, but
          # Knative Serving rejects them with `strict decoding error: unknown
          # field` unless the cluster's knative-serving/config-defaults enables
          # `kubernetes.podspec-lifecycle` and
          # `kubernetes.podspec-terminationgraceperiodseconds`. They aren't
          # enabled in staging, so `kubectl apply -k` for this Service was
          # failing entirely on the strict-decoder — silently masked by the
          # workflow's `|| true`. The downstream `kubectl patch` (image / env
          # vars) bypasses strict decoding via JSON patch and was the *only*
          # reason new revisions kept being created, while every annotation
          # change in this manifest (notably the activator-bypass fix) was
          # being dropped.
          # If/when graceful drain becomes a priority, enable both feature
          # flags in `config-defaults` and add the stanzas back. Until then,
          # the API uses the kubelet-default 30s termination grace period.
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "2Gi"
              cpu: "1"
