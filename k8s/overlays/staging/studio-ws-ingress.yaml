# =============================================================================
# Studio Web Ingress (WebSocket-capable) — Staging
# =============================================================================
# Why this exists:
#
# A Knative DomainMapping (studio.staging.shogo.ai → studio ksvc) implements
# its underlying KIngress as a `rewriteHost` + ExternalName loopback through
# `kourier-internal`. That extra Envoy→Envoy hop is wired with HTTP/2
# cleartext on the upstream cluster and does NOT enable `extended-CONNECT`
# (RFC 8441), so it silently drops HTTP/1.1 `Upgrade: websocket` requests with
# `503 UC` after ~1s. Browsers always use HTTP/1.1 for WebSockets, so the
# in-IDE terminal (and any other browser WS) never connects, while plain HTTP
# (SPA + REST) works fine.
#
# The `kourier.knative.dev/disable-http2=true` annotation only fixes the
# HTTP/2 extended-CONNECT route (which browsers do not use), so it does not
# solve the real path.
#
# Fix: replace the DomainMapping with a direct Knative Ingress (KIngress) that
# points a regular ClusterIP Service at the studio revision's queue-proxy port
# (8012). There is no `rewriteHost` and no ExternalName loopback, so Kourier
# emits a normal Envoy upstream cluster that passes the WebSocket Upgrade over
# HTTP/1.1. This mirrors api-tunnel-ingress.yaml.
#
# Routing chain after this is applied:
#   Cloudflare (TLS, *.staging.shogo.ai cert)
#     → OCI LoadBalancer (kourier:80/443)
#     → Kourier external listener
#     → Knative Ingress `studio-web`     (no DomainMapping, no rewriteHost)
#     → Service `studio-direct`          (selector: serving.knative.dev/service=studio)
#     → studio revision Pod  port 8012   (queue-proxy → nginx → SPA / /api proxy)
#
# The Service's label selector tracks the live studio ksvc revision via the
# standard Knative label, so it converges on the current ready revision
# automatically (no external sync controller needed). TLS is terminated at
# Cloudflare, so httpOption: Enabled (plain HTTP at Kourier) is sufficient and
# the DomainMapping's certificate handling is not needed.
#
# IMPORTANT: This REPLACES the studio.staging.shogo.ai DomainMapping. The two
# cannot coexist for the same host — delete the DomainMapping when applying:
#   kubectl -n shogo-staging-system delete domainmapping studio.staging.shogo.ai
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: studio-direct
  namespace: shogo-staging-system
  labels:
    app.kubernetes.io/part-of: shogo
    app.kubernetes.io/component: studio-web
    environment: staging
spec:
  type: ClusterIP
  selector:
    serving.knative.dev/service: studio
  ports:
    - name: http
      port: 80
      targetPort: 8012  # queue-proxy ingress port (preserves Knative concurrency tracking)
      protocol: TCP
---
apiVersion: networking.internal.knative.dev/v1alpha1
kind: Ingress
metadata:
  name: studio-web
  namespace: shogo-staging-system
  annotations:
    networking.knative.dev/ingress.class: kourier.ingress.networking.knative.dev
  labels:
    app.kubernetes.io/part-of: shogo
    app.kubernetes.io/component: studio-web
    environment: staging
spec:
  httpOption: Enabled
  rules:
    - hosts:
        - studio.staging.shogo.ai
      visibility: ExternalIP
      http:
        paths:
          # Single direct split — no rewriteHost — so Kourier emits a normal
          # Envoy upstream cluster that handles WebSocket Upgrade over HTTP/1.1.
          - splits:
              - serviceName: studio-direct
                serviceNamespace: shogo-staging-system
                servicePort: 80
                percent: 100
