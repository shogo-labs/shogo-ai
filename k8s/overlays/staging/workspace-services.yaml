# =============================================================================
# Workspace Services - Staging Environment
# =============================================================================
# IMPORTANT: min-scale: 1 keeps pod always running to preserve meta-store state.
# Scaling to zero loses all loaded schemas, causing query failures until
# schemas are re-loaded by browser requests.
# =============================================================================
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: mcp-workspace-1
  namespace: shogo-staging-workspaces
  labels:
    app.kubernetes.io/part-of: shogo
    shogo.io/workspace: workspace-1
    environment: staging
spec:
  template:
    metadata:
      annotations:
        # Keep at least 1 pod running to preserve meta-store state
        # This prevents "Schema not found" errors after scale-to-zero
        autoscaling.knative.dev/min-scale: "1"
        autoscaling.knative.dev/max-scale: "3"
        autoscaling.knative.dev/target: "100"
    spec:
      timeoutSeconds: 300
      containers:
        - name: mcp
          image: shogo-mcp  # Replaced by kustomize
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: MCP_PORT
              value: "8080"
            - name: NODE_ENV
              value: "staging"
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
            - name: SCHEMAS_PATH
              value: "/app/.schemas"
            - name: WORKSPACE_ID
              value: "workspace-1"
            - name: TENANT_ID
              value: "staging-tenant"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: DATABASE_URL
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          # Startup probe: TCP check on main MCP port
          # Gives container time to initialize (DDL, seed data)
          startupProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            # Allow up to 60 seconds for startup (12 * 5s)
            failureThreshold: 12
          # Readiness probe: TCP check ensures MCP server is listening
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          # Note: After deploying new MCP with health endpoint, update to use:
          # httpGet:
          #   path: /health
          #   port: 8081
