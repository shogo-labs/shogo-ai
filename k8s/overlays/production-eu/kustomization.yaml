apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - api-service.yaml
  - api-tunnel-ingress.yaml
  - web-service.yaml
  - docs-service.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: shogo
      app.kubernetes.io/managed-by: kustomize
      environment: production
      region: eu-frankfurt-1
    includeSelectors: false

images:
  - name: shogo-api
    newName: eu-frankfurt-1.ocir.io/idin4oltblww/shogo/shogo-api
    newTag: production-latest
  - name: shogo-web
    newName: eu-frankfurt-1.ocir.io/idin4oltblww/shogo/shogo-web
    newTag: production-latest
  - name: shogo-docs
    newName: eu-frankfurt-1.ocir.io/idin4oltblww/shogo/shogo-docs
    newTag: production-latest
  - name: shogo-runtime
    newName: eu-frankfurt-1.ocir.io/idin4oltblww/shogo/shogo-runtime
    newTag: production-latest
