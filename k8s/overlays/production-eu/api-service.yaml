apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-service-account
  namespace: shogo-production-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: shogo-production-api-domainmapping-manager
rules:
  - apiGroups: ["serving.knative.dev"]
    resources: ["domainmappings"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["serving.knative.dev"]
    resources: ["services"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: shogo-production-api-domainmapping-manager
subjects:
  - kind: ServiceAccount
    name: api-service-account
    namespace: shogo-production-system
roleRef:
  kind: ClusterRole
  name: shogo-production-api-domainmapping-manager
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: shogo-api-db-secret-manager
  namespace: shogo-production-workspaces
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: shogo-api-db-secret-manager
  namespace: shogo-production-workspaces
subjects:
  - kind: ServiceAccount
    name: api-service-account
    namespace: shogo-production-system
roleRef:
  kind: Role
  name: shogo-api-db-secret-manager
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: api
  namespace: shogo-production-system
  labels:
    app.kubernetes.io/part-of: shogo
    environment: production
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/min-scale: "2"
        autoscaling.knative.dev/max-scale: "10"
    spec:
      serviceAccountName: api-service-account
      containers:
        - name: api
          image: eu-frankfurt-1.ocir.io/idin4oltblww/shogo/shogo-api:production-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8002
          env:
            - name: API_PORT
              value: "8002"
            - name: NODE_ENV
              value: "production"
            - name: SKIP_MIGRATIONS
              value: "false"
            - name: SYSTEM_NAMESPACE
              value: "shogo-production-system"
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
            - name: PROJECT_NAMESPACE
              value: "shogo-production-workspaces"
            - name: RUNTIME_IMAGE
              value: "eu-frankfurt-1.ocir.io/idin4oltblww/shogo/shogo-runtime:production-latest"
            - name: PREVIEW_BASE_DOMAIN
              value: "shogo.ai"
            - name: PREVIEW_ENVIRONMENT
              value: "production"
            - name: S3_WORKSPACES_BUCKET
              value: "shogo-workspaces-production"
            - name: S3_REGION
              value: "us-ashburn-1"
            - name: S3_ENDPOINT
              value: "https://idin4oltblww.compat.objectstorage.us-ashburn-1.oraclecloud.com"
            - name: PUBLISH_NAMESPACE
              value: "shogo-production-system"
            - name: PUBLISH_DOMAIN
              value: "shogo.one"
            - name: BETTER_AUTH_URL
              value: "https://studio.shogo.ai"
            - name: SHOGO_PUBLIC_API_URL
              value: "https://studio.shogo.ai"
            - name: ALLOWED_ORIGINS
              value: "https://studio.shogo.ai,https://eu.studio.shogo.ai,https://india.studio.shogo.ai"
            # Public hostname the desktop should use for the on-demand
            # tunnel WebSocket. Points at the regional EU api ksvc via
            # api-tunnel-ingress.yaml so the WS Upgrade bypasses the
            # DomainMapping loopback.
            - name: SHOGO_TUNNEL_WS_URL
              value: "wss://eu-tunnel.shogo.ai"
            - name: REDIS_URL
              value: "redis://redis-master.shogo-production-system:6379"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: DATABASE_URL
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: BETTER_AUTH_SECRET
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: ANTHROPIC_API_KEY
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: STRIPE_SECRET_KEY
                  optional: true
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: STRIPE_WEBHOOK_SECRET
                  optional: true
            - name: GH_APP_ID
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GH_APP_ID
                  optional: true
            - name: GH_APP_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GH_APP_CLIENT_ID
                  optional: true
            - name: GH_APP_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GH_APP_CLIENT_SECRET
                  optional: true
            - name: GH_APP_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GH_APP_PRIVATE_KEY
                  optional: true
            - name: GH_APP_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GH_APP_WEBHOOK_SECRET
                  optional: true
            - name: GH_APP_SLUG
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GH_APP_SLUG
                  optional: true
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GOOGLE_CLIENT_ID
                  optional: true
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GOOGLE_CLIENT_SECRET
                  optional: true
            - name: COMPOSIO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: COMPOSIO_API_KEY
                  optional: true
            - name: COMPOSIO_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: COMPOSIO_PROJECT_ID
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: OPENAI_API_KEY
                  optional: true
            - name: SERPER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: SERPER_API_KEY
                  optional: true
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GOOGLE_API_KEY
                  optional: true
            - name: ELEVENLABS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: ELEVENLABS_API_KEY
                  optional: true
            - name: ELEVENLABS_VOICE_MODE_AGENT_ID
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: ELEVENLABS_VOICE_MODE_AGENT_ID
                  optional: true
            - name: ELEVENLABS_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: ELEVENLABS_WEBHOOK_SECRET
                  optional: true
            - name: TWILIO_ACCOUNT_SID
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: TWILIO_ACCOUNT_SID
                  optional: true
            - name: TWILIO_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: TWILIO_AUTH_TOKEN
                  optional: true
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "https://ingest.us.signoz.cloud:443"
            - name: OTEL_SERVICE_NAME
              value: "shogo-api-production-eu"
            - name: OTEL_LOG_LEVEL
              value: "info"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "cloud.region=eu-frankfurt-1,deployment.tier=full"
            - name: SIGNOZ_INGESTION_KEY
              valueFrom:
                secretKeyRef:
                  name: signoz-credentials
                  key: SIGNOZ_INGESTION_KEY
                  optional: true
            - name: WARM_POOL_MIN_PODS
              value: "5"
            - name: REGION_ID
              value: "eu-frankfurt-1"
            - name: REGION_LABEL
              value: "EU (Frankfurt)"
            - name: REGION_PEERS
              value: '[{"id":"us-ashburn-1","label":"US (Ashburn)","url":"https://152.70.192.220"},{"id":"ap-mumbai-1","label":"India (Mumbai)","url":"https://161.118.170.159"}]'
            - name: WARM_POOL_MAX_AGE_MS
              value: "3600000"
            - name: PROMOTED_POD_GC_ENABLED
              value: "true"
            # 30 min: aligns with prod-us, long enough to keep pods warm
            # through multi-minute user think-time between chat turns.
            - name: PROMOTED_POD_IDLE_TIMEOUT_MS
              value: "1800000"
            - name: LOAD_TEST_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: LOAD_TEST_SECRET
                  optional: true
            - name: EMAIL_PROVIDER
              value: "smtp"
            - name: SMTP_HOST
              value: "smtp.resend.com"
            - name: SMTP_PORT
              value: "465"
            - name: SMTP_USER
              value: "resend"
            - name: SMTP_SECURE
              value: "true"
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: SMTP_PASSWORD
                  optional: true
            - name: EMAIL_FROM
              value: "noreply@updates.shogo.ai"
            - name: SMTP_FROM_EMAIL
              value: "noreply@updates.shogo.ai"
            - name: SMTP_FROM_NAME
              value: "Shogo"
            - name: EVAL_CALLBACK_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: EVAL_CALLBACK_SECRET
                  optional: true
            - name: BUN_JSC_forceRAMSize
              value: "5905580032"
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "15"]
          resources:
            requests:
              memory: "1Gi"
              cpu: "200m"
            limits:
              memory: "6Gi"
              cpu: "3"
      terminationGracePeriodSeconds: 630
      timeoutSeconds: 1800
