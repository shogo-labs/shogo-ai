# =============================================================================
# API Service - Production EU Environment (eu-west-1)
# =============================================================================
# Mirrors production/api-service.yaml with EU-specific values for:
#   - ECR registry (eu-west-1), S3 bucket/region, OTEL service name
#   - REGION label for cross-region awareness
# =============================================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-service-account
  namespace: shogo-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: shogo-production-eu-api-domainmapping-manager
rules:
  - apiGroups: ["serving.knative.dev"]
    resources: ["domainmappings"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["serving.knative.dev"]
    resources: ["services", "revisions", "configurations", "routes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: shogo-production-eu-api-domainmapping-manager
subjects:
  - kind: ServiceAccount
    name: api-service-account
    namespace: shogo-system
roleRef:
  kind: ClusterRole
  name: shogo-production-eu-api-domainmapping-manager
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: shogo-api-db-secret-manager
  namespace: shogo-workspaces
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: shogo-api-db-secret-manager
  namespace: shogo-workspaces
subjects:
  - kind: ServiceAccount
    name: api-service-account
    namespace: shogo-system
roleRef:
  kind: Role
  name: shogo-api-db-secret-manager
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: api
  namespace: shogo-system
  labels:
    app.kubernetes.io/part-of: shogo
    environment: production
    region: eu-west-1
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/min-scale: "1"
        autoscaling.knative.dev/max-scale: "10"
    spec:
      serviceAccountName: api-service-account
      containers:
        - name: api
          image: shogo-api
          imagePullPolicy: Always
          ports:
            - containerPort: 8002
          env:
            - name: API_PORT
              value: "8002"
            - name: NODE_ENV
              value: "production"
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
            - name: REGION
              value: "eu-west-1"
            - name: SYSTEM_NAMESPACE
              value: "shogo-system"
            - name: PROJECT_NAMESPACE
              value: "shogo-workspaces"
            - name: RUNTIME_IMAGE
              value: "097357356677.dkr.ecr.eu-west-1.amazonaws.com/shogo/shogo-runtime:production-latest"
            - name: PREVIEW_BASE_DOMAIN
              value: "shogo.ai"
            - name: PREVIEW_ENVIRONMENT
              value: "production"
            - name: S3_WORKSPACES_BUCKET
              value: "shogo-workspaces-production-eu"
            - name: S3_REGION
              value: "eu-west-1"
            - name: PUBLISH_NAMESPACE
              value: "shogo-system"
            - name: PUBLISH_DOMAIN
              value: "shogo.one"
            - name: BETTER_AUTH_URL
              value: "https://studio.shogo.ai"
            - name: ALLOWED_ORIGINS
              value: "https://studio.shogo.ai,https://api.shogo.ai,https://shogo.ai"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: REDIS_URL
                  optional: true
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: DATABASE_URL
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: BETTER_AUTH_SECRET
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: ANTHROPIC_API_KEY
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: STRIPE_SECRET_KEY
                  optional: true
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: STRIPE_WEBHOOK_SECRET
                  optional: true
            - name: GH_APP_ID
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GH_APP_ID
                  optional: true
            - name: GH_APP_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GH_APP_CLIENT_ID
                  optional: true
            - name: GH_APP_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GH_APP_CLIENT_SECRET
                  optional: true
            - name: GH_APP_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GH_APP_PRIVATE_KEY
                  optional: true
            - name: GH_APP_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GH_APP_WEBHOOK_SECRET
                  optional: true
            - name: GH_APP_SLUG
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GH_APP_SLUG
                  optional: true
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GOOGLE_CLIENT_ID
                  optional: true
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GOOGLE_CLIENT_SECRET
                  optional: true
            - name: COMPOSIO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: COMPOSIO_API_KEY
                  optional: true
            - name: COMPOSIO_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: COMPOSIO_PROJECT_ID
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: OPENAI_API_KEY
                  optional: true
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GOOGLE_API_KEY
                  optional: true
            - name: SERPER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: SERPER_API_KEY
                  optional: true
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "https://ingest.us.signoz.cloud:443"
            - name: OTEL_SERVICE_NAME
              value: "shogo-api-production-eu"
            - name: OTEL_LOG_LEVEL
              value: "info"
            - name: SIGNOZ_INGESTION_KEY
              valueFrom:
                secretKeyRef:
                  name: signoz-credentials
                  key: SIGNOZ_INGESTION_KEY
                  optional: true
            # Runtime image for warm pool
            - name: RUNTIME_IMAGE
              value: "097357356677.dkr.ecr.eu-west-1.amazonaws.com/shogo/shogo-runtime:production-latest"
            - name: PREVIEW_BASE_DOMAIN
              value: "shogo.ai"
            - name: PREVIEW_ENVIRONMENT
              value: "production"
            - name: WARM_POOL_AGENTS_PER_NODE
              value: "0"
            - name: WARM_POOL_PROJECTS_PER_NODE
              value: "0"
            - name: WARM_POOL_MIN_AGENTS
              value: "10"
            - name: WARM_POOL_MIN_PROJECTS
              value: "3"
            - name: WARM_POOL_MAX_AGE_MS
              value: "3600000"
            - name: LOAD_TEST_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: LOAD_TEST_SECRET
                  optional: true
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "15"]
          resources:
            requests:
              memory: "512Mi"
              cpu: "100m"
            limits:
              memory: "2Gi"
              cpu: "1"
      terminationGracePeriodSeconds: 630
