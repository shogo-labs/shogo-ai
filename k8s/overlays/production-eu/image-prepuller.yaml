# =============================================================================
# Image Pre-Puller DaemonSet - Production EU
# =============================================================================
# Pre-pulls agent-runtime and project-runtime images on all nodes to
# eliminate 60+ second image pull delays during cold starts.
# =============================================================================
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: image-prepuller
  namespace: shogo-system
  labels:
    app.kubernetes.io/name: image-prepuller
    app.kubernetes.io/part-of: shogo
    app.kubernetes.io/component: infrastructure
    environment: production
    region: eu-west-1
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: image-prepuller
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: image-prepuller
        app.kubernetes.io/part-of: shogo
        environment: production
        region: eu-west-1
    spec:
      tolerations:
        - operator: Exists
      priorityClassName: ""
      containers:
        - name: project-runtime-prepull
          image: shogo-project-runtime
          imagePullPolicy: Always
          command: ["sleep", "infinity"]
          resources:
            requests:
              memory: "1Mi"
              cpu: "1m"
            limits:
              memory: "8Mi"
              cpu: "10m"
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
        - name: agent-runtime-prepull
          image: shogo-agent-runtime
          imagePullPolicy: Always
          command: ["sleep", "infinity"]
          resources:
            requests:
              memory: "1Mi"
              cpu: "1m"
            limits:
              memory: "8Mi"
              cpu: "10m"
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
        - name: postgres-prepull
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          command: ["sleep", "infinity"]
          resources:
            requests:
              memory: "1Mi"
              cpu: "1m"
            limits:
              memory: "8Mi"
              cpu: "10m"
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      restartPolicy: Always
