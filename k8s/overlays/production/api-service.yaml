# =============================================================================
# API Service - Production Environment
# =============================================================================
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: api
  namespace: shogo-system
  labels:
    app.kubernetes.io/part-of: shogo
    environment: production
spec:
  template:
    metadata:
      annotations:
        # Production: always keep at least 1 replica for availability
        autoscaling.knative.dev/min-scale: "1"
        autoscaling.knative.dev/max-scale: "10"
    spec:
      containers:
        - name: api
          image: shogo-api  # Replaced by kustomize
          ports:
            - containerPort: 8002
          env:
            - name: API_PORT
              value: "8002"
            - name: NODE_ENV
              value: "production"
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
            - name: MCP_URL
              value: "http://mcp-workspace-1.shogo-workspaces.svc.cluster.local"
            - name: BETTER_AUTH_URL
              value: "https://api.shogo.ai"
            - name: ALLOWED_ORIGINS
              value: "https://studio.shogo.ai,https://api.shogo.ai,https://shogo.ai"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: REDIS_URL
                  optional: true
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: DATABASE_URL
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: BETTER_AUTH_SECRET
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: ANTHROPIC_API_KEY
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
