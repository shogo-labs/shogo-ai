# =============================================================================
# Domain Mappings - Production Environment
# =============================================================================
# Maps production domains to Knative Services
# Note: API is proxied via /api path on studio, no separate subdomain needed
# =============================================================================
apiVersion: serving.knative.dev/v1beta1
kind: DomainMapping
metadata:
  name: studio.shogo.ai
  namespace: shogo-system
spec:
  ref:
    name: studio
    kind: Service
    apiVersion: serving.knative.dev/v1
---
apiVersion: serving.knative.dev/v1beta1
kind: DomainMapping
metadata:
  name: docs.shogo.ai
  namespace: shogo-system
spec:
  ref:
    name: docs
    kind: Service
    apiVersion: serving.knative.dev/v1
---
apiVersion: serving.knative.dev/v1beta1
kind: DomainMapping
metadata:
  name: mcp.shogo.ai
  namespace: shogo-workspaces
spec:
  ref:
    name: mcp-workspace-1
    kind: Service
    apiVersion: serving.knative.dev/v1
