# =============================================================================
# Web/Studio Service - Production Environment
# =============================================================================
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: studio
  namespace: shogo-system
  labels:
    app.kubernetes.io/part-of: shogo
    environment: production
spec:
  template:
    metadata:
      annotations:
        # Production: always keep at least 1 replica for availability
        autoscaling.knative.dev/min-scale: "1"
        autoscaling.knative.dev/max-scale: "10"
    spec:
      containers:
        - name: web
          image: shogo-web  # Replaced by kustomize
          ports:
            - containerPort: 80
          env:
            - name: API_UPSTREAM
              value: "http://api.shogo-system.svc.cluster.local"
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
