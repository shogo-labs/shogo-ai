# =============================================================================
# Workspace Services - Production Environment
# =============================================================================
# Production workspaces with scale-to-zero for cost efficiency
# =============================================================================

# ---------------------------------------------------------------------------
# Workspace 1 - Default workspace
# ---------------------------------------------------------------------------
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: mcp-workspace-1
  namespace: shogo-workspaces
  labels:
    app.kubernetes.io/part-of: shogo
    shogo.io/workspace: workspace-1
    shogo.io/tenant: tenant-a
    environment: production
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/scale-to-zero-pod-retention-period: "60s"
        autoscaling.knative.dev/max-scale: "1"
        autoscaling.knative.dev/min-scale: "0"
        autoscaling.knative.dev/target: "100"
    spec:
      timeoutSeconds: 300
      containers:
        - name: mcp
          image: shogo-mcp  # Replaced by kustomize
          ports:
            - containerPort: 3100
              protocol: TCP
          env:
            - name: MCP_PORT
              value: "3100"
            - name: NODE_ENV
              value: "production"
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
            - name: SCHEMAS_PATH
              value: "/app/.schemas"
            - name: WORKSPACE_ID
              value: "workspace-1"
            - name: TENANT_ID
              value: "tenant-a"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: DATABASE_URL
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            tcpSocket:
              port: 3100
            initialDelaySeconds: 5
            periodSeconds: 10
---
