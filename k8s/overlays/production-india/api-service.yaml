apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-service-account
  namespace: shogo-production-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: shogo-production-api-domainmapping-manager
rules:
  - apiGroups: ["serving.knative.dev"]
    resources: ["domainmappings"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["serving.knative.dev"]
    resources: ["services"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: shogo-production-api-domainmapping-manager
subjects:
  - kind: ServiceAccount
    name: api-service-account
    namespace: shogo-production-system
roleRef:
  kind: ClusterRole
  name: shogo-production-api-domainmapping-manager
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: shogo-api-db-secret-manager
  namespace: shogo-production-workspaces
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: shogo-api-db-secret-manager
  namespace: shogo-production-workspaces
subjects:
  - kind: ServiceAccount
    name: api-service-account
    namespace: shogo-production-system
roleRef:
  kind: Role
  name: shogo-api-db-secret-manager
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: api
  namespace: shogo-production-system
  labels:
    app.kubernetes.io/part-of: shogo
    environment: production
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/min-scale: "2"
        autoscaling.knative.dev/max-scale: "10"
    spec:
      serviceAccountName: api-service-account
      containers:
        - name: api
          image: ap-mumbai-1.ocir.io/idin4oltblww/shogo/shogo-api:production-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8002
          env:
            - name: API_PORT
              value: "8002"
            - name: NODE_ENV
              value: "production"
            - name: SKIP_MIGRATIONS
              value: "false"
            - name: SYSTEM_NAMESPACE
              value: "shogo-production-system"
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
            - name: PROJECT_NAMESPACE
              value: "shogo-production-workspaces"
            # RUNTIME_IMAGE is patched per-deploy to an immutable
            # `:production-<git-sha>` tag. NEVER use a mutable tag here.
            # See the staging incident postmortem (2026-05-04).
            - name: RUNTIME_IMAGE
              value: "ap-mumbai-1.ocir.io/idin4oltblww/shogo/shogo-runtime:production-bootstrap"
            - name: PREVIEW_BASE_DOMAIN
              value: "shogo.ai"
            - name: PREVIEW_ENVIRONMENT
              value: "production"
            # Per-preview Cloudflare DNS: upserts a proxied A record for
            # every preview--<projectId>.shogo.ai hostname pointing at
            # this cluster's Kourier LB. Without these three vars,
            # `apps/api/src/lib/cloudflare-dns.ts` is a no-op and India
            # previews fall back to the flat `*.shogo.ai` wildcard,
            # which routes to US Kourier and returns 404 / CF 522.
            # See docs/cloudflare-dns-per-preview.md and the
            # 2026-05-21 incident.
            - name: CF_ZONE_ID
              value: "c2d56140e7de85a4ac5ab5bea8e7434f"
            - name: KOURIER_LB_IP
              value: "161.118.170.159"
            - name: CF_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflare-dns
                  key: CF_API_TOKEN
                  optional: true
            - name: S3_WORKSPACES_BUCKET
              value: "shogo-workspaces-production"
            - name: S3_REGION
              value: "us-ashburn-1"
            - name: S3_ENDPOINT
              value: "https://idin4oltblww.compat.objectstorage.us-ashburn-1.oraclecloud.com"
            # S3 credentials for OCI Object Storage (Oracle's S3-compat API).
            # Required for: project import → S3 seed (apps/api/src/routes/project-export-import.ts),
            # Storage cron, and any other S3 PUT from the API pod. NOT marked
            # optional: a missing secret is the exact silent-failure mode that
            # let imports "succeed" with empty projects in staging on
            # 2026-05-11. We'd rather crashloop than ship that again.
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: secret-key
            - name: PUBLISH_NAMESPACE
              value: "shogo-production-system"
            - name: PUBLISH_DOMAIN
              value: "shogo.one"
            - name: BETTER_AUTH_URL
              value: "https://studio.shogo.ai"
            - name: SHOGO_PUBLIC_API_URL
              value: "https://studio.shogo.ai"
            - name: ALLOWED_ORIGINS
              value: "https://studio.shogo.ai,https://eu.studio.shogo.ai,https://india.studio.shogo.ai"
            # Public hostname the desktop should use for the on-demand
            # tunnel WebSocket. Points at the regional India api ksvc via
            # api-tunnel-ingress.yaml so the WS Upgrade bypasses the
            # DomainMapping loopback.
            - name: SHOGO_TUNNEL_WS_URL
              value: "wss://india.tunnel.shogo.ai"
            - name: REDIS_URL
              value: "redis://redis-master.shogo-production-system:6379"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: DATABASE_URL
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: BETTER_AUTH_SECRET
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: ANTHROPIC_API_KEY
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: STRIPE_SECRET_KEY
                  optional: true
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: STRIPE_WEBHOOK_SECRET
                  optional: true
            - name: GH_APP_ID
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GH_APP_ID
                  optional: true
            - name: GH_APP_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GH_APP_CLIENT_ID
                  optional: true
            - name: GH_APP_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GH_APP_CLIENT_SECRET
                  optional: true
            - name: GH_APP_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GH_APP_PRIVATE_KEY
                  optional: true
            - name: GH_APP_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GH_APP_WEBHOOK_SECRET
                  optional: true
            - name: GH_APP_SLUG
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GH_APP_SLUG
                  optional: true
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GOOGLE_CLIENT_ID
                  optional: true
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GOOGLE_CLIENT_SECRET
                  optional: true
            - name: COMPOSIO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: COMPOSIO_API_KEY
                  optional: true
            - name: COMPOSIO_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: COMPOSIO_PROJECT_ID
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: OPENAI_API_KEY
                  optional: true
            - name: SERPER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: SERPER_API_KEY
                  optional: true
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GOOGLE_API_KEY
                  optional: true
            - name: ELEVENLABS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: ELEVENLABS_API_KEY
                  optional: true
            - name: ELEVENLABS_VOICE_MODE_AGENT_ID
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: ELEVENLABS_VOICE_MODE_AGENT_ID
                  optional: true
            - name: ELEVENLABS_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: ELEVENLABS_WEBHOOK_SECRET
                  optional: true
            - name: TWILIO_ACCOUNT_SID
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: TWILIO_ACCOUNT_SID
                  optional: true
            - name: TWILIO_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: TWILIO_AUTH_TOKEN
                  optional: true
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "https://ingest.us.signoz.cloud:443"
            - name: OTEL_SERVICE_NAME
              value: "shogo-api-production-india"
            - name: OTEL_LOG_LEVEL
              value: "info"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "cloud.region=ap-mumbai-1,deployment.tier=light"
            - name: SIGNOZ_INGESTION_KEY
              valueFrom:
                secretKeyRef:
                  name: signoz-credentials
                  key: SIGNOZ_INGESTION_KEY
                  optional: true
            - name: WARM_POOL_MIN_PODS
              value: "3"
            - name: REGION_ID
              value: "ap-mumbai-1"
            - name: REGION_LABEL
              value: "India (Mumbai)"
            - name: REGION_PEERS
              value: '[{"id":"us-ashburn-1","label":"US (Ashburn)","url":"https://152.70.192.220"},{"id":"eu-frankfurt-1","label":"EU (Frankfurt)","url":"https://79.76.126.115"}]'
            - name: WARM_POOL_MAX_AGE_MS
              value: "3600000"
            - name: PROMOTED_POD_GC_ENABLED
              value: "true"
            # 30 min: aligns with prod-us/eu, long enough to keep pods warm
            # through multi-minute user think-time between chat turns.
            - name: PROMOTED_POD_IDLE_TIMEOUT_MS
              value: "1800000"
            - name: LOAD_TEST_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: LOAD_TEST_SECRET
                  optional: true
            - name: EMAIL_PROVIDER
              value: "smtp"
            - name: SMTP_HOST
              value: "smtp.resend.com"
            - name: SMTP_PORT
              value: "465"
            - name: SMTP_USER
              value: "resend"
            - name: SMTP_SECURE
              value: "true"
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: SMTP_PASSWORD
                  optional: true
            - name: EMAIL_FROM
              value: "noreply@updates.shogo.ai"
            - name: SMTP_FROM_EMAIL
              value: "noreply@updates.shogo.ai"
            - name: SMTP_FROM_NAME
              value: "Shogo"
            - name: EVAL_CALLBACK_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: EVAL_CALLBACK_SECRET
                  optional: true
            - name: BUN_JSC_forceRAMSize
              value: "5905580032"
          # NOTE: `lifecycle.preStop` and pod-level `terminationGracePeriodSeconds`
          # were previously declared here for graceful drain on rollout, but
          # Knative Serving rejects them with `strict decoding error: unknown
          # field` unless the cluster's knative-serving/config-defaults enables
          # `kubernetes.podspec-lifecycle` and
          # `kubernetes.podspec-terminationgraceperiodseconds`. They aren't
          # enabled in this cluster, so `kubectl apply -k` for this Service
          # was failing entirely on the strict-decoder — silently masked by
          # the deploy workflow's `|| true` (since removed). The downstream
          # `kubectl patch` (image / env vars) bypasses strict decoding via
          # JSON patch and was the *only* reason new revisions kept being
          # created, while every annotation change in this manifest (notably
          # the activator-bypass fix) was being dropped. See the staging
          # incident postmortem and commit fdb66207 for the matching fix.
          # If/when graceful drain becomes a priority, enable both feature
          # flags in `config-defaults` and add the stanzas back. Until then,
          # the API uses the kubelet-default 30s termination grace period.
          resources:
            requests:
              memory: "1Gi"
              cpu: "200m"
            limits:
              memory: "6Gi"
              cpu: "3"
      timeoutSeconds: 1800
