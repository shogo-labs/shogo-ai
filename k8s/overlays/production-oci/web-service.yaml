# =============================================================================
# Web/Studio Service - Production Environment (OCI / OKE)
# =============================================================================
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: studio
  namespace: shogo-system
  labels:
    app.kubernetes.io/part-of: shogo
    environment: production
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/min-scale: "1"
        autoscaling.knative.dev/max-scale: "10"
    spec:
      containers:
        - name: web
          image: us-ashburn-1.ocir.io/idin4oltblww/shogo/shogo-web:production-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: API_UPSTREAM
              value: "http://api.shogo-system.svc.cluster.local"
            - name: API_HOST
              value: "api.shogo-system.svc.cluster.local"
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
