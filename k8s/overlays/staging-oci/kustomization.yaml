# =============================================================================
# Kustomize Overlay - Staging Environment (OCI / OKE)
# =============================================================================
# Usage: kubectl apply -k k8s/overlays/staging-oci/
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - api-service.yaml
  - web-service.yaml
  - ../../base/redis.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: shogo
      app.kubernetes.io/managed-by: kustomize
      environment: staging
    includeSelectors: false

images:
  - name: shogo-api
    newName: us-ashburn-1.ocir.io/idin4oltblww/shogo/shogo-api
    newTag: staging-oci-latest
  - name: shogo-web
    newName: us-ashburn-1.ocir.io/idin4oltblww/shogo/shogo-web
    newTag: staging-oci-latest
  - name: shogo-docs
    newName: us-ashburn-1.ocir.io/idin4oltblww/shogo/shogo-docs
    newTag: staging-oci-latest
  - name: shogo-runtime
    newName: us-ashburn-1.ocir.io/idin4oltblww/shogo/shogo-runtime
    newTag: staging-oci-latest
