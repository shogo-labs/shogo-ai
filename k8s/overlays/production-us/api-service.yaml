apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-service-account
  namespace: shogo-production-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: shogo-production-api-domainmapping-manager
rules:
  - apiGroups: ["serving.knative.dev"]
    resources: ["domainmappings"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["serving.knative.dev"]
    resources: ["services"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: shogo-production-api-domainmapping-manager
subjects:
  - kind: ServiceAccount
    name: api-service-account
    namespace: shogo-production-system
roleRef:
  kind: ClusterRole
  name: shogo-production-api-domainmapping-manager
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: shogo-api-db-secret-manager
  namespace: shogo-production-workspaces
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: shogo-api-db-secret-manager
  namespace: shogo-production-workspaces
subjects:
  - kind: ServiceAccount
    name: api-service-account
    namespace: shogo-production-system
roleRef:
  kind: Role
  name: shogo-api-db-secret-manager
  apiGroup: rbac.authorization.k8s.io
---
# Read-only access to the kourier-system/kourier Service so the API can
# auto-discover this cluster's externally-routable load balancer IP at
# startup (used by apps/api/src/lib/kourier-lb-discovery.ts → cloudflare-dns.ts
# to upsert per-preview CF DNS records). Scoped to the single named Service
# to keep blast radius minimal.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: shogo-api-kourier-lb-reader
  namespace: kourier-system
rules:
  - apiGroups: [""]
    resources: ["services"]
    resourceNames: ["kourier"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: shogo-api-kourier-lb-reader
  namespace: kourier-system
subjects:
  - kind: ServiceAccount
    name: api-service-account
    namespace: shogo-production-system
roleRef:
  kind: Role
  name: shogo-api-kourier-lb-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: api
  namespace: shogo-production-system
  labels:
    app.kubernetes.io/part-of: shogo
    environment: production
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/min-scale: "2"
        autoscaling.knative.dev/max-scale: "20"
    spec:
      serviceAccountName: api-service-account
      containers:
        - name: api
          image: us-ashburn-1.ocir.io/idin4oltblww/shogo/shogo-api:production-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8002
          env:
            - name: API_PORT
              value: "8002"
            - name: NODE_ENV
              value: "production"
            - name: SYSTEM_NAMESPACE
              value: "shogo-production-system"
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
            - name: PROJECT_NAMESPACE
              value: "shogo-production-workspaces"
            # RUNTIME_IMAGE is a render-time placeholder, NOT a real value. The
            # deploy's "Apply Kubernetes manifests" step replaces
            # RUNTIME_IMAGE_PLACEHOLDER with the resolved immutable
            # `:production-<git-sha>` runtime tag (same mechanism as the
            # image-prepuller) before `kubectl apply`. Shipping the token rather
            # than a literal `:production-bootstrap` — a tag that exists in no
            # OCIR — means apply can never stamp a non-existent runtime image
            # onto the api ksvc and then depend on a later patch to undo it.
            # That undo-gap bricked India on 2026-05-27 when a mid-deploy abort
            # left the placeholder live. sync-api-env.sh re-verifies the value
            # downstream as defense-in-depth.
            - name: RUNTIME_IMAGE
              value: "RUNTIME_IMAGE_PLACEHOLDER"
            - name: PREVIEW_BASE_DOMAIN
              value: "shogo.ai"
            - name: PREVIEW_ENVIRONMENT
              value: "production"
            # Per-preview Cloudflare DNS: upserts a proxied A record for
            # every preview--<projectId>.shogo.ai hostname pointing at
            # this cluster's Kourier LB. US currently works via the flat
            # `*.shogo.ai` wildcard (which points at this LB), but wiring
            # per-preview records here keeps all three regions consistent
            # and avoids surprises if we ever repoint the wildcard. The
            # Kourier LB IP is auto-discovered at API startup from
            # `Service kourier/kourier-system` via the
            # `shogo-api-kourier-lb-reader` Role above, so new regions
            # only need these two vars wired — never a region-specific
            # IP literal. Set KOURIER_LB_IP below to override discovery
            # if needed. See docs/cloudflare-dns-per-preview.md.
            - name: CF_ZONE_ID
              value: "c2d56140e7de85a4ac5ab5bea8e7434f"
            - name: CF_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflare-dns
                  key: CF_API_TOKEN
                  optional: true
            - name: S3_WORKSPACES_BUCKET
              value: "shogo-workspaces-production"
            - name: S3_REGION
              value: "us-ashburn-1"
            - name: S3_ENDPOINT
              value: "https://idin4oltblww.compat.objectstorage.us-ashburn-1.oraclecloud.com"
            # S3 credentials for OCI Object Storage (Oracle's S3-compat API).
            # Required for: project import → S3 seed (apps/api/src/routes/project-export-import.ts),
            # Storage cron, and any other S3 PUT from the API pod. NOT marked
            # optional: a missing secret is the exact silent-failure mode that
            # let imports "succeed" with empty projects in staging on
            # 2026-05-11. We'd rather crashloop than ship that again.
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: secret-key
            - name: PUBLISH_NAMESPACE
              value: "shogo-production-system"
            # OCI Object Storage bucket the *.shogo.one Cloudflare Worker
            # reads from (terraform/modules/publish-hosting-oci). MUST
            # match `shogo-published-apps-${var.environment}` for the env
            # this overlay deploys. publish.ts asserts this is set in
            # K8s mode — see the post-2026-05-26 comment there.
            - name: PUBLISH_BUCKET
              value: "shogo-published-apps-production"
            - name: PUBLISH_DOMAIN
              value: "shogo.one"
            # --- Custom domains (Cloudflare for SaaS) ----------------------
            # Bring-your-own hostnames for published apps. INERT until the
            # `custom-domains-config` secret exists in shogo-production-system:
            # the helper (cloudflare-custom-hostnames.ts) returns null config
            # when the token/zone are missing, so the API reports the feature
            # disabled and the UI hides the panel. Populate the secret from the
            # production-us terraform outputs AFTER applying with
            # `enable_custom_domains = true` + a DEDICATED `custom_domains_zone`
            # (NOT shogo.one — the module precondition enforces this; a `*/*`
            # route on shogo.one would hijack every published app + the apex).
            # Token needs SSL+Certificates:Edit on that zone and Workers KV
            # Storage:Edit on the account. See docs/custom-domains.md.
            - name: CF_CUSTOM_HOSTNAMES_TOKEN
              valueFrom:
                secretKeyRef:
                  name: custom-domains-config
                  key: CF_CUSTOM_HOSTNAMES_TOKEN
                  optional: true
            - name: CF_CUSTOM_DOMAIN_ZONE_ID
              valueFrom:
                secretKeyRef:
                  name: custom-domains-config
                  key: CF_CUSTOM_DOMAIN_ZONE_ID
                  optional: true
            - name: CF_ACCOUNT_ID
              valueFrom:
                secretKeyRef:
                  name: custom-domains-config
                  key: CF_ACCOUNT_ID
                  optional: true
            - name: CF_CUSTOM_DOMAIN_KV_NAMESPACE_ID
              valueFrom:
                secretKeyRef:
                  name: custom-domains-config
                  key: CF_CUSTOM_DOMAIN_KV_NAMESPACE_ID
                  optional: true
            - name: CUSTOM_DOMAIN_FALLBACK_ORIGIN
              valueFrom:
                secretKeyRef:
                  name: custom-domains-config
                  key: CUSTOM_DOMAIN_FALLBACK_ORIGIN
                  optional: true
            - name: BETTER_AUTH_URL
              value: "https://studio.shogo.ai"
            # User-browser-reachable frontend URL used to build links in
            # transactional emails (welcome, invites, billing, member-joined).
            # Resolved by getFrontendUrl() in apps/api/src/lib/cloud-urls.ts;
            # set explicitly so links never fall back to localhost.
            - name: APP_URL
              value: "https://studio.shogo.ai"
            - name: SHOGO_PUBLIC_API_URL
              value: "https://studio.shogo.ai"
            - name: ALLOWED_ORIGINS
              value: "https://studio.shogo.ai,https://shogo.ai,https://eu.studio.shogo.ai,https://india.studio.shogo.ai"
            # Public hostname the desktop should use for the on-demand
            # tunnel WebSocket. Routed by api-tunnel-ingress.yaml directly
            # to the api revision pod (no DomainMapping → no broken WS
            # Upgrade hop). Heartbeat traffic stays on
            # SHOGO_PUBLIC_API_URL above.
            - name: SHOGO_TUNNEL_WS_URL
              value: "wss://tunnel.shogo.ai"
            - name: REDIS_URL
              value: "redis://redis-master.shogo-production-system:6379"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: DATABASE_URL
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: BETTER_AUTH_SECRET
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: ANTHROPIC_API_KEY
            # AES-256-GCM master key for encrypting model-provider API keys
            # at rest (apps/api/src/lib/secret-crypto.ts). Optional so the API
            # still boots if unset; saving a custom-provider key 503s until it
            # is provisioned. Must match across regions sharing the primary DB.
            - name: SECRETS_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: SECRETS_ENCRYPTION_KEY
                  optional: true
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: STRIPE_SECRET_KEY
                  optional: true
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: STRIPE_WEBHOOK_SECRET
                  optional: true
            - name: STRIPE_CONNECT_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: STRIPE_CONNECT_WEBHOOK_SECRET
                  optional: true
            - name: GH_APP_ID
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GH_APP_ID
                  optional: true
            - name: GH_APP_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GH_APP_CLIENT_ID
                  optional: true
            - name: GH_APP_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GH_APP_CLIENT_SECRET
                  optional: true
            - name: GH_APP_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GH_APP_PRIVATE_KEY
                  optional: true
            - name: GH_APP_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GH_APP_WEBHOOK_SECRET
                  optional: true
            - name: GH_APP_SLUG
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GH_APP_SLUG
                  optional: true
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GOOGLE_CLIENT_ID
                  optional: true
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GOOGLE_CLIENT_SECRET
                  optional: true
            - name: COMPOSIO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: COMPOSIO_API_KEY
                  optional: true
            - name: COMPOSIO_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: COMPOSIO_PROJECT_ID
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: OPENAI_API_KEY
                  optional: true
            - name: SERPER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: SERPER_API_KEY
                  optional: true
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GOOGLE_API_KEY
                  optional: true
            - name: ELEVENLABS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: ELEVENLABS_API_KEY
                  optional: true
            - name: ELEVENLABS_VOICE_MODE_AGENT_ID
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: ELEVENLABS_VOICE_MODE_AGENT_ID
                  optional: true
            - name: ELEVENLABS_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: ELEVENLABS_WEBHOOK_SECRET
                  optional: true
            - name: TWILIO_ACCOUNT_SID
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: TWILIO_ACCOUNT_SID
                  optional: true
            - name: TWILIO_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: TWILIO_AUTH_TOKEN
                  optional: true
            # ── Native MLM affiliate program ──────────────────────────
            # Master flag. When 'true' all /api/affiliates/* routes are
            # live, the better-auth signup hook starts writing
            # AffiliateAttribution rows, and the three commission cron
            # jobs become active. Flipping back to 'false' is a safe
            # rollback (every code path short-circuits).
            - name: SHOGO_AFFILIATES_NATIVE
              value: "true"
            - name: SHOGO_AFFILIATE_MAX_DEPTH
              value: "3"
            # Pay only the direct referrer by default (MLM payouts off);
            # enrollment tree depth above is unaffected. Set to "3" to
            # re-enable full multi-level payouts.
            - name: SHOGO_AFFILIATE_PAYOUT_MAX_DEPTH
              value: "1"
            - name: SHOGO_AFFILIATE_REFUND_HOLD_DAYS
              value: "30"
            - name: SHOGO_AFFILIATE_MIN_PAYOUT_CENTS
              value: "5000"
            - name: SHOGO_AFFILIATE_COOKIE_DAYS
              value: "60"
            # Shared secret with shogo-website/functions/r/[code].ts —
            # the marketing-site Cloudflare Function calls
            # POST /api/affiliates/click with this header. The API
            # rejects the request when the value doesn't match.
            # Set in api-secrets by the deploy workflow (and on first
            # rollout via `kubectl patch secret api-secrets`).
            - name: SHOGO_INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: SHOGO_INTERNAL_SECRET
                  optional: true
            # --- Affiliate content-CPM (Instagram / TikTok view tracking) ---
            # Optional, DB-controlled feature. The master toggle, provider,
            # CPM rate, hold days, and caps are all super-admin PlatformSetting
            # rows (`affiliate.content.*`), NOT env vars — see Admin → Affiliate
            # CPM. The only env here is the EnsembleData token (a secret); the
            # encrypted PlatformSetting provider-key.ensembledata (set via the
            # admin UI) is preferred, this secretKeyRef is a fallback.
            - name: ENSEMBLEDATA_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: ENSEMBLEDATA_API_TOKEN
                  optional: true
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "https://ingest.us.signoz.cloud:443"
            - name: OTEL_SERVICE_NAME
              value: "shogo-api-production-us"
            - name: OTEL_LOG_LEVEL
              value: "info"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "cloud.region=us-ashburn-1,deployment.tier=full"
            - name: SIGNOZ_INGESTION_KEY
              valueFrom:
                secretKeyRef:
                  name: signoz-credentials
                  key: SIGNOZ_INGESTION_KEY
                  optional: true
            - name: WARM_POOL_MIN_PODS
              value: "5"
            - name: REGION_ID
              value: "us-ashburn-1"
            - name: REGION_LABEL
              value: "US (Ashburn)"
            - name: REGION_PEERS
              value: '[{"id":"eu-frankfurt-1","label":"EU (Frankfurt)","url":"https://79.76.126.115"},{"id":"ap-mumbai-1","label":"India (Mumbai)","url":"https://161.118.170.159"}]'
            - name: WARM_POOL_MAX_AGE_MS
              value: "3600000"
            - name: PROMOTED_POD_GC_ENABLED
              value: "true"
            # 30 min: needs to be longer than typical user-think-time
            # between chat turns. With 10 min users would idle out while
            # reading/typing the next message and the next visit hit a
            # cold start, which (combined with the activator's hardcoded
            # 5-minute request timeout) was producing the
            # `eof-without-turn-complete` log lines.
            - name: PROMOTED_POD_IDLE_TIMEOUT_MS
              value: "1800000"
            - name: LOAD_TEST_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: LOAD_TEST_SECRET
                  optional: true
            - name: EMAIL_PROVIDER
              value: "smtp"
            - name: SMTP_HOST
              value: "smtp.resend.com"
            - name: SMTP_PORT
              value: "465"
            - name: SMTP_USER
              value: "resend"
            - name: SMTP_SECURE
              value: "true"
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: SMTP_PASSWORD
                  optional: true
            - name: EMAIL_FROM
              value: "noreply@updates.shogo.ai"
            - name: SMTP_FROM_EMAIL
              value: "noreply@updates.shogo.ai"
            - name: SMTP_FROM_NAME
              value: "Shogo"
            - name: EVAL_CALLBACK_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: EVAL_CALLBACK_SECRET
                  optional: true
            - name: BUN_JSC_forceRAMSize
              value: "5905580032"
          # NOTE: `lifecycle.preStop` and pod-level `terminationGracePeriodSeconds`
          # were previously declared here for graceful drain on rollout, but
          # Knative Serving rejects them with `strict decoding error: unknown
          # field` unless the cluster's knative-serving/config-defaults enables
          # `kubernetes.podspec-lifecycle` and
          # `kubernetes.podspec-terminationgraceperiodseconds`. They aren't
          # enabled in this cluster, so `kubectl apply -k` for this Service
          # was failing entirely on the strict-decoder — silently masked by
          # the deploy workflow's `|| true` (since removed). The downstream
          # `kubectl patch` (image / env vars) bypasses strict decoding via
          # JSON patch and was the *only* reason new revisions kept being
          # created, while every annotation change in this manifest (notably
          # the activator-bypass fix) was being dropped. See the staging
          # incident postmortem and commit fdb66207 for the matching fix.
          # If/when graceful drain becomes a priority, enable both feature
          # flags in `config-defaults` and add the stanzas back. Until then,
          # the API uses the kubelet-default 30s termination grace period.
          resources:
            requests:
              memory: "1Gi"
              cpu: "200m"
            limits:
              memory: "6Gi"
              cpu: "3"
      timeoutSeconds: 1800
