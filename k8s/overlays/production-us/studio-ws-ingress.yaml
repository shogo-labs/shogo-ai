# =============================================================================
# Studio Web Ingress (WebSocket-capable) — Production
# =============================================================================
# Why this exists:
#
# A Knative DomainMapping (studio.shogo.ai → studio ksvc) implements its
# underlying KIngress as a `rewriteHost` + ExternalName loopback through
# `kourier-internal`. That extra Envoy→Envoy hop is wired with HTTP/2
# cleartext on the upstream cluster and does NOT enable `extended-CONNECT`
# (RFC 8441), so it silently drops HTTP/1.1 `Upgrade: websocket` requests with
# `503 UC` after ~1s. Browsers always use HTTP/1.1 for WebSockets, so the
# in-IDE terminal (and any other browser WS) never connects, while plain HTTP
# (SPA + REST) works fine.
#
# Fix: replace the DomainMapping with a direct Knative Ingress (KIngress) that
# points a regular ClusterIP Service at the studio revision's queue-proxy port
# (8012). There is no `rewriteHost` and no ExternalName loopback, so Kourier
# emits a normal Envoy upstream cluster that passes the WebSocket Upgrade over
# HTTP/1.1. This mirrors api-tunnel-ingress.yaml. TLS terminates at Cloudflare
# (external-domain-tls is not enabled), so httpOption: Enabled is sufficient.
#
# IMPORTANT: This REPLACES the studio.shogo.ai DomainMapping. The two cannot
# coexist for the same host — delete the DomainMapping when cutting over:
#   kubectl -n shogo-production-system delete domainmapping studio.shogo.ai
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: studio-direct
  namespace: shogo-production-system
  labels:
    app.kubernetes.io/part-of: shogo
    app.kubernetes.io/component: studio-web
    environment: production
spec:
  type: ClusterIP
  selector:
    serving.knative.dev/service: studio
  ports:
    - name: http
      port: 80
      targetPort: 8012  # queue-proxy ingress port (preserves Knative concurrency tracking)
      protocol: TCP
---
apiVersion: networking.internal.knative.dev/v1alpha1
kind: Ingress
metadata:
  name: studio-web
  namespace: shogo-production-system
  annotations:
    networking.knative.dev/ingress.class: kourier.ingress.networking.knative.dev
  labels:
    app.kubernetes.io/part-of: shogo
    app.kubernetes.io/component: studio-web
    environment: production
spec:
  httpOption: Enabled
  rules:
    - hosts:
        - studio.shogo.ai
      visibility: ExternalIP
      http:
        paths:
          # Single direct split — no rewriteHost — so Kourier emits a normal
          # Envoy upstream cluster that handles WebSocket Upgrade over HTTP/1.1.
          - splits:
              - serviceName: studio-direct
                serviceNamespace: shogo-production-system
                servicePort: 80
                percent: 100
