# CronJob that checks logical replication health across all subscriptions
# every 5 minutes.
#
# The job exits non-zero when something is broken so the CronJob shows up
# as failed in K8s and the alerting hooks (kube-state-metrics
# `kube_job_status_failed`) fire. Until 2026-05-26 it only printed
# "WARNING:" / "CRITICAL:" lines and exited 0, so the 2026-05-26 incident
# (3 GB of WAL backlog and 6 hour-old apply errors) ran for 15 hours
# without paging anyone. The thresholds below are tuned to surface that
# kind of incident within one polling interval.
#
# Conditions that fail the job:
#   - any subscription with pid IS NULL (apply worker not streaming)
#   - any subscription with apply_error_count > 0 (PG 18 conflict log)
#   - any inactive logical replication slot
#   - any logical slot with > 100 MB WAL lag (down from 1 GB)
#   - any table in `public` (other than `_prisma%`) missing from the
#     publication
#   - any subscription that trails the local publication by 1+ tables
#
# Deploy once per region. The job connects to the local CNPG cluster.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: replication-monitor
  namespace: shogo-production-system
  labels:
    app.kubernetes.io/part-of: shogo
    app.kubernetes.io/component: replication-monitor
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 120
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: monitor
              image: ghcr.io/cloudnative-pg/postgresql:18.3
              env:
                - name: PGHOST
                  value: platform-pg-rw.shogo-production-system
                - name: PGPORT
                  value: "5432"
                - name: PGDATABASE
                  value: shogo
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: platform-pg-app
                      key: username
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: platform-pg-app
                      key: password
              command:
                - /bin/sh
                - -ec
                - |
                  echo "=== Replication Monitor — $(date -u +%Y-%m-%dT%H:%M:%SZ) ==="

                  EXIT_RC=0

                  # Tables intentionally NOT in shogo_all_pub: region-local
                  # additive counters (running USD / byte totals) that corrupt
                  # under last_update_wins and poison-pill the apply worker on
                  # their workspaceId unique index. They are region-local until
                  # the single-writer work lands and they rejoin the mesh — see
                  # docs/runbooks/usage-wallet-single-writer-plan.md. Keep this
                  # list in sync with scripts/check-publication-drift.ts.
                  EXCLUDED_TABLES="'storage_usage','usage_wallets'"

                  echo "--- Subscription Status ---"
                  psql -X -t -A -F'|' -c "
                    SELECT subname,
                           CASE WHEN pid IS NOT NULL THEN 'streaming' ELSE 'STOPPED' END AS status,
                           received_lsn,
                           latest_end_lsn,
                           latest_end_time
                    FROM pg_stat_subscription
                    WHERE subname LIKE 'sub_from_%'
                    ORDER BY subname;
                  "

                  STOPPED=$(psql -X -t -A -c "
                    SELECT count(*)
                    FROM pg_stat_subscription
                    WHERE subname LIKE 'sub_from_%' AND pid IS NULL;
                  ")

                  if [ "$STOPPED" -gt 0 ]; then
                    echo "CRITICAL: $STOPPED subscription(s) not streaming!"
                    EXIT_RC=1
                  fi

                  echo "--- Conflict Stats (PG 18) ---"
                  psql -X -t -A -F'|' -c "
                    SELECT subname,
                           apply_error_count,
                           sync_error_count
                    FROM pg_stat_subscription_stats
                    WHERE subname LIKE 'sub_from_%'
                    ORDER BY subname;
                  " 2>/dev/null || echo "(pg_stat_subscription_stats not available)"

                  # NOTE: apply_error_count / sync_error_count are CUMULATIVE
                  # counters since the last pg_stat_reset_subscription_stats.
                  # They do NOT reset when a conflict is resolved, so after any
                  # incident (e.g. the 2026-06/07 mesh recovery left US at
                  # eu=324 / india=70) they stay > 0 forever. Gating a page on
                  # `apply_error_count > 0` would therefore fire permanently.
                  # We report them for context only; the actionable, non-
                  # cumulative signal is a subscription that is CURRENTLY
                  # disabled (an apply error with subdisableonerr=t disables the
                  # sub → pid IS NULL, caught by both the STOPPED check above and
                  # the DISABLED check below).
                  DISABLED=$(psql -X -t -A -c "
                    SELECT count(*)
                    FROM pg_subscription
                    WHERE subname LIKE 'sub_from_%' AND NOT subenabled;
                  ")

                  if [ "$DISABLED" -gt 0 ]; then
                    echo "CRITICAL: $DISABLED subscription(s) are DISABLED!"
                    psql -X -t -A -F'|' -c "
                      SELECT subname, subenabled, subdisableonerr
                      FROM pg_subscription
                      WHERE subname LIKE 'sub_from_%' AND NOT subenabled
                      ORDER BY subname;
                    "
                    echo "A disabled sub is usually a poison-pill conflict. Check the"
                    echo "publisher's pg log for the LSN, then:"
                    echo "  ALTER SUBSCRIPTION <sub> SKIP (lsn = '<X/Y>'); ALTER SUBSCRIPTION <sub> ENABLE;"
                    echo "or fix the underlying duplicate row. See"
                    echo "k8s/cnpg/logical-replication/RUNBOOK.md step 9. The conflict"
                    echo "watchdog (recon/91_conflict_watchdog.sh) automates safe skips."
                    EXIT_RC=1
                  fi

                  echo "--- Replication Slots ---"
                  psql -X -t -A -F'|' -c "
                    SELECT slot_name,
                           active,
                           pg_size_pretty(pg_wal_lsn_diff(pg_current_wal_lsn(), restart_lsn)) AS wal_lag
                    FROM pg_replication_slots
                    WHERE slot_type = 'logical'
                    ORDER BY slot_name;
                  "

                  INACTIVE_SLOTS=$(psql -X -t -A -c "
                    SELECT count(*)
                    FROM pg_replication_slots
                    WHERE slot_type = 'logical' AND NOT active;
                  ")

                  if [ "$INACTIVE_SLOTS" -gt 0 ]; then
                    echo "CRITICAL: $INACTIVE_SLOTS inactive logical replication slot(s)!"
                    EXIT_RC=1
                  fi

                  # 100 MB threshold (was 1 GB). The 2026-05-26 incident
                  # accumulated 3 GB of backlog over 15 hours; at 100 MB
                  # the first 5-minute polling interval after a stuck
                  # apply worker will already trigger a page.
                  WAL_BLOAT=$(psql -X -t -A -c "
                    SELECT count(*)
                    FROM pg_replication_slots
                    WHERE slot_type = 'logical'
                      AND pg_wal_lsn_diff(pg_current_wal_lsn(), restart_lsn) > 104857600;
                  ")

                  if [ "$WAL_BLOAT" -gt 0 ]; then
                    echo "CRITICAL: $WAL_BLOAT slot(s) with > 100MB WAL lag!"
                    psql -X -t -A -F'|' -c "
                      SELECT slot_name,
                             active,
                             pg_size_pretty(pg_wal_lsn_diff(pg_current_wal_lsn(), restart_lsn)) AS wal_lag
                      FROM pg_replication_slots
                      WHERE slot_type = 'logical'
                        AND pg_wal_lsn_diff(pg_current_wal_lsn(), restart_lsn) > 104857600
                      ORDER BY slot_name;
                    "
                    EXIT_RC=1
                  fi

                  echo "--- Publication Completeness ---"
                  # Every public table (except _prisma% and the intentionally
                  # region-local EXCLUDED_TABLES) must be in shogo_all_pub. The
                  # CR declares `tablesInSchema: public` (auto-include), but the
                  # LIVE publication is currently a hand-list (puballtables=f)
                  # that omits the EXCLUDED_TABLES — a deliberate deviation, not
                  # the #501 stale-hand-list bug. A non-zero count here means a
                  # table other than the known exclusions fell out of the
                  # publication.
                  UNPUBLISHED=$(psql -X -t -A -c "
                    SELECT count(*)
                    FROM pg_tables t
                    LEFT JOIN pg_publication_tables pt
                      ON pt.tablename = t.tablename
                      AND pt.schemaname = t.schemaname
                      AND pt.pubname = 'shogo_all_pub'
                    WHERE t.schemaname = 'public'
                      AND t.tablename NOT LIKE '_prisma%'
                      AND t.tablename NOT IN (${EXCLUDED_TABLES})
                      AND pt.tablename IS NULL;
                  ")

                  if [ "$UNPUBLISHED" -gt 0 ]; then
                    echo "CRITICAL: $UNPUBLISHED table(s) missing from publication!"
                    psql -X -t -A -c "
                      SELECT t.tablename
                      FROM pg_tables t
                      LEFT JOIN pg_publication_tables pt
                        ON pt.tablename = t.tablename
                        AND pt.schemaname = t.schemaname
                        AND pt.pubname = 'shogo_all_pub'
                      WHERE t.schemaname = 'public'
                        AND t.tablename NOT LIKE '_prisma%'
                        AND t.tablename NOT IN (${EXCLUDED_TABLES})
                        AND pt.tablename IS NULL
                      ORDER BY t.tablename;
                    "
                    EXIT_RC=1
                  fi

                  # Inverse guard: if an EXCLUDED_TABLE ever REappears in the
                  # publication (e.g. the Publication CR got re-reconciled to
                  # FOR TABLES IN SCHEMA public and re-added them), that will
                  # reintroduce the additive-counter poison pills. Page on it.
                  READDED=$(psql -X -t -A -c "
                    SELECT count(*)
                    FROM pg_publication_tables
                    WHERE pubname = 'shogo_all_pub'
                      AND tablename IN (${EXCLUDED_TABLES});
                  ")

                  if [ "$READDED" -gt 0 ]; then
                    echo "CRITICAL: $READDED region-local table(s) were re-added to the publication!"
                    echo "storage_usage / usage_wallets must stay region-local until the"
                    echo "single-writer work lands. Re-exclude them and check whether the"
                    echo "Publication CR re-reconciled. See"
                    echo "docs/runbooks/usage-wallet-single-writer-plan.md."
                    EXIT_RC=1
                  fi

                  echo "--- Subscription Refresh Staleness ---"
                  # Each subscription tracks the publisher's table set as of
                  # the last `ALTER SUBSCRIPTION ... REFRESH PUBLICATION`. If
                  # a subscription's row count in pg_subscription_rel is less
                  # than the local publication's table count, this region
                  # almost certainly missed a REFRESH after a peer migrated.
                  # Heuristic: assumes all regions run the same schema (true
                  # by design — `prisma migrate deploy` runs in every region).
                  LOCAL_PUB_COUNT=$(psql -X -t -A -c "
                    SELECT count(*)
                    FROM pg_publication_tables
                    WHERE pubname = 'shogo_all_pub';
                  ")

                  STALE_SUBS=$(psql -X -t -A -F'|' -c "
                    SELECT s.subname,
                           count(sr.srrelid) AS subscribed_tables,
                           ${LOCAL_PUB_COUNT} - count(sr.srrelid) AS missing
                    FROM pg_subscription s
                    LEFT JOIN pg_subscription_rel sr ON sr.srsubid = s.oid
                    WHERE s.subname LIKE 'sub_from_%'
                    GROUP BY s.subname
                    HAVING count(sr.srrelid) < ${LOCAL_PUB_COUNT}
                    ORDER BY s.subname;
                  ")

                  if [ -n "$STALE_SUBS" ]; then
                    echo "CRITICAL: subscription(s) trail the local publication by 1+ tables."
                    echo "Run: ALTER SUBSCRIPTION <subname> REFRESH PUBLICATION;"
                    echo "$STALE_SUBS"
                    EXIT_RC=1
                  fi

                  # `_prisma_migrations` REPLICA-trigger contract
                  # (skip-replicated-migrations.sql). A missing or
                  # mis-enabled trigger means the next migration
                  # row from a peer region poisons local Prisma state.
                  TRIGGER_OK=$(psql -X -t -A -c "
                    SELECT count(*)
                    FROM pg_trigger
                    WHERE tgrelid = '_prisma_migrations'::regclass
                      AND tgname = 'skip_replicated_migrations_trg'
                      AND tgenabled = 'R';
                  " 2>/dev/null || echo "0")
                  if [ "$TRIGGER_OK" != "1" ]; then
                    echo "CRITICAL: skip_replicated_migrations_trg missing or not in REPLICA mode."
                    echo "Reapply k8s/cnpg/logical-replication/skip-replicated-migrations.sql."
                    EXIT_RC=1
                  fi

                  echo "=== Monitor complete (exit=$EXIT_RC) ==="
                  exit "$EXIT_RC"
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "50m"
                limits:
                  memory: "128Mi"
                  cpu: "100m"
