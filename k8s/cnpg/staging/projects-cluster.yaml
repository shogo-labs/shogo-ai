# =============================================================================
# Projects PostgreSQL Cluster (Staging)
# =============================================================================
# Shared PostgreSQL for ALL user project databases.
# Replaces per-project PostgreSQL sidecars.
# Each project gets its own database: project_{uuid}
# =============================================================================
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: projects-pg
  namespace: shogo-staging-system
  labels:
    app.kubernetes.io/part-of: shogo
    environment: staging
spec:
  # Single instance for staging (no HA replica needed)
  instances: 1

  # Disable auto-created PDBs so Karpenter can drain nodes.
  # With a single instance there is no failover target anyway.
  enablePDB: false

  # PostgreSQL configuration - tuned for many small databases
  postgresql:
    parameters:
      max_connections: "600"
      shared_buffers: "512MB"
      effective_cache_size: "1536MB"
      work_mem: "4MB"
      maintenance_work_mem: "64MB"
      wal_buffers: "16MB"
      # Connection handling
      idle_in_transaction_session_timeout: "30000"  # 30s
      statement_timeout: "60000"  # 60s per query
      # Logging
      log_min_duration_statement: "2000"  # Log queries > 2s
      log_checkpoints: "on"
    pg_hba:
      # Allow connections from within the cluster (pods in any namespace)
      - host all all 10.0.0.0/8 md5
      - host all all 172.16.0.0/12 md5

  # Bootstrap: create the initial admin database
  bootstrap:
    initdb:
      database: projects_admin
      owner: projects_admin
      postInitApplicationSQL:
        - ALTER ROLE projects_admin CREATEROLE CREATEDB

  # Managed roles: ensure projects_admin always has CREATEROLE/CREATEDB
  # This survives cluster restores and failovers
  managed:
    roles:
      - name: projects_admin
        ensure: present
        login: true
        createdb: true
        createrole: true
        passwordSecret:
          name: projects-pg-app

  # Storage: EBS gp3 on EKS, local-path on bare metal
  storage:
    size: 50Gi
    storageClass: ebs-sc

  # Backup to S3 (uses node IAM role for authentication)
  backup:
    barmanObjectStore:
      destinationPath: s3://shogo-pg-backups-staging/projects/
      s3Credentials:
        inheritFromIAMRole: true
      wal:
        compression: gzip
      data:
        compression: gzip
    retentionPolicy: "30d"

  # Monitoring: Prometheus metrics
  monitoring:
    enablePodMonitor: true

  # Resources - larger than platform since it hosts many databases
  resources:
    requests:
      memory: "512Mi"
      cpu: "200m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

  # Affinity: spread across nodes for HA
  affinity:
    topologyKey: kubernetes.io/hostname
