# =============================================================================
# Platform PostgreSQL Cluster (Staging)
# =============================================================================
# Replaces AWS RDS for the Shogo platform database.
# Manages: users, workspaces, projects, sessions, billing, etc.
# =============================================================================
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: platform-pg
  namespace: shogo-staging-system
  labels:
    app.kubernetes.io/part-of: shogo
    environment: staging
spec:
  # Single instance for staging (no HA replica needed)
  instances: 1

  # Disable auto-created PDBs so Karpenter can drain nodes.
  # With a single instance there is no failover target anyway.
  enablePDB: false

  # PostgreSQL configuration
  postgresql:
    parameters:
      max_connections: "400"
      shared_buffers: "256MB"
      effective_cache_size: "768MB"
      work_mem: "4MB"
      maintenance_work_mem: "64MB"
      wal_buffers: "8MB"
      # Logging
      log_min_duration_statement: "1000"  # Log queries > 1s
      log_checkpoints: "on"
    pg_hba:
      # Allow connections from within the cluster (pods)
      - host all all 10.0.0.0/8 md5
      - host all all 172.16.0.0/12 md5

  # Bootstrap: create the initial database
  bootstrap:
    initdb:
      database: shogo
      owner: shogo

  # Storage: EBS gp3 on EKS, local-path on bare metal
  storage:
    size: 20Gi
    storageClass: ebs-sc

  # Backup to S3 (uses node IAM role for authentication)
  backup:
    barmanObjectStore:
      destinationPath: s3://shogo-pg-backups-staging/platform/
      s3Credentials:
        inheritFromIAMRole: true
      wal:
        compression: gzip
      data:
        compression: gzip
    retentionPolicy: "7d"

  # Monitoring: Prometheus metrics
  monitoring:
    enablePodMonitor: true

  # Resources
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "500m"

  # Affinity: spread across nodes for HA
  affinity:
    topologyKey: kubernetes.io/hostname
