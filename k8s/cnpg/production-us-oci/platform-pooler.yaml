# =============================================================================
# PgBouncer connection Pooler — Production US
# =============================================================================
# Fronts platform-pg with a transaction-mode PgBouncer so many short app
# connections multiplex onto a small, bounded set of Postgres backends. The
# app's DATABASE_URL points at this Pooler (platform-pg-pooler-rw.<ns>.svc:5432);
# session-scoped work that must pin a backend (advisory locks via
# withAdvisoryLock / withGlobalJobLock, and migrations) uses DATABASE_DIRECT_URL
# -> platform-pg-rw.
#
# Connection budget (platform-pg max_connections = 400 in US):
#   pooler server conns  = instances(2) x default_pool_size(40)  = 80
#   dedicated lock conns  (direct, ADVISORY_LOCK_POOL_SIZE)      ~ pods x 6
#   migrations / CNPG / monitoring / logical-replication senders ~ 60
#   ---------------------------------------------------------------------
#   < 400 with headroom
#
# NOTE: transaction pooling + prepared statements — see the staging pooler
# manifest header. Validated in staging before this region is rolled out.
# =============================================================================
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: platform-pg-pooler-rw
  namespace: shogo-production-system
  labels:
    app.kubernetes.io/part-of: shogo
    environment: production
spec:
  cluster:
    name: platform-pg
  instances: 2
  type: rw
  pgbouncer:
    poolMode: transaction
    parameters:
      max_client_conn: "1000"
      default_pool_size: "40"
      min_pool_size: "5"
      reserve_pool_size: "5"
      reserve_pool_timeout: "3"
      max_prepared_statements: "200"
      server_idle_timeout: "120"
  monitoring:
    enablePodMonitor: true
