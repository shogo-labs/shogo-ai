# Publication for bidirectional logical replication — US region.
#
# Self-maintaining: `tablesInSchema: public` makes Postgres publish every
# current and future table in the `public` schema (CREATE PUBLICATION ...
# FOR TABLES IN SCHEMA public). New tables created by `prisma migrate deploy`
# are picked up automatically — no edit to this YAML is required when the
# schema grows.
#
# `_prisma_migrations` is also published (CNPG's Publication CR doesn't
# expose row filters, and `ALTER PUBLICATION ... DROP TABLE` doesn't work
# against `FOR TABLES IN SCHEMA` publications). Replicating it would corrupt
# Prisma's per-database tracking — incident 2026-05-26 — so each subscriber
# installs a `BEFORE INSERT/UPDATE/DELETE` trigger on `_prisma_migrations`
# in `ENABLE REPLICA TRIGGER` mode that returns NULL, silently discarding
# any replicated change while leaving local `prisma migrate deploy` writes
# untouched. The trigger is installed by
# `k8s/cnpg/logical-replication/skip-replicated-migrations.sql`, applied on
# every deploy via `.github/workflows/deploy.yml`.
#
# Do not revert to a hand-listed `objects[].table` set: the CI guard
# (`bun run check:publication`) will reject any PR that does, and the
# replication-monitor CronJob warns on drift in production.
#
# LIVE DIVERGENCE (intentional, tracked): the live `shogo_all_pub` publication
# is currently a hand-list (puballtables=f) that EXCLUDES `storage_usage` and
# `usage_wallets`. Those two are additive counters that poison-pill the mesh
# under last_update_wins, so they are region-local until the single-writer work
# lands (docs/runbooks/usage-wallet-single-writer-plan.md). A `FOR TABLES IN
# SCHEMA public` publication cannot express that exclusion, so the live DB
# deviates from this CR ON PURPOSE. Do NOT "fix" it by re-adding the two tables.
# The deploy step "Re-assert region-local publication exclusion"
# (exclude-region-local-tables.sql) re-drops them each deploy and FAILS LOUD if
# CNPG ever reconciled the pub back to a schema-level publication; the
# replication-monitor READDED guard pages if they reappear.
#
# After a migration adds a new table, each subscriber must run
# `ALTER SUBSCRIPTION <name> REFRESH PUBLICATION` once. The deploy workflow
# does this automatically; see `.github/workflows/deploy.yml`.
apiVersion: postgresql.cnpg.io/v1
kind: Publication
metadata:
  name: platform-pg-pub
  namespace: shogo-production-system
spec:
  cluster:
    name: platform-pg
  dbname: shogo
  name: shogo_all_pub
  publicationReclaimPolicy: retain
  target:
    objects:
      - tablesInSchema: public
