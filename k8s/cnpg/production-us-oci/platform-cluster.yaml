# =============================================================================
# Platform PostgreSQL Cluster — Production US (Active-Active Node)
# =============================================================================
# Multi-region active-active topology using PG 18 bidirectional logical
# replication. Each region is a standalone writable cluster; CNPG-managed
# Publication/Subscription CRDs keep all 42 application tables in sync.
#
# Manages: users, workspaces, projects, sessions, billing
# Storage: OCI Block Volumes (oci-bv)
# Backups: OCI Object Storage (S3-compatible) in us-ashburn-1
# =============================================================================
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: platform-pg
  namespace: shogo-production-system
  labels:
    app.kubernetes.io/part-of: shogo
    environment: production
    region: us-ashburn-1
spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3

  postgresql:
    parameters:
      max_connections: "400"
      shared_buffers: "1GB"
      effective_cache_size: "3GB"
      work_mem: "16MB"
      maintenance_work_mem: "256MB"
      wal_buffers: "16MB"
      max_wal_senders: "10"
      max_replication_slots: "10"
      wal_level: "logical"
      track_commit_timestamp: "on"
      log_min_duration_statement: "1000"
      log_checkpoints: "on"
    pg_hba:
      - host all all 10.0.0.0/8 md5
      - host all all 172.16.0.0/12 md5
      - hostssl all all 0.0.0.0/0 md5
      - hostssl replication all 0.0.0.0/0 md5

  managed:
    roles:
      - name: logical_replicator
        login: true
        replication: true
        passwordSecret:
          name: logical-replicator-credentials

  bootstrap:
    initdb:
      database: shogo
      owner: shogo

  storage:
    size: 100Gi
    storageClass: oci-bv

  externalClusters:
    - name: eu-primary
      connectionParameters:
        host: "141.147.21.125"
        port: "5432"
        dbname: shogo
        user: logical_replicator
        sslmode: require
      password:
        name: logical-replicator-credentials
        key: password

    - name: india-primary
      connectionParameters:
        host: "144.24.113.254"
        port: "5432"
        dbname: shogo
        user: logical_replicator
        sslmode: require
      password:
        name: logical-replicator-credentials
        key: password

  # Backup disabled: OCI S3 compatibility layer rejects barman-cloud's
  # chunked PutObject (MissingContentLength). Needs MinIO gateway or
  # native OCI backup integration. See: platform-pg-1 crash-loop 2026-03-22.
  # backup:
  #   barmanObjectStore:
  #     endpointURL: https://idin4oltblww.compat.objectstorage.us-ashburn-1.oraclecloud.com
  #     destinationPath: s3://shogo-pg-backups-production/platform/
  #     s3Credentials:
  #       accessKeyId:
  #         name: cnpg-s3-credentials
  #         key: ACCESS_KEY_ID
  #       secretAccessKey:
  #         name: cnpg-s3-credentials
  #         key: SECRET_ACCESS_KEY
  #       region:
  #         name: cnpg-s3-credentials
  #         key: REGION
  #     wal:
  #       compression: gzip
  #     data:
  #       compression: gzip
  #   retentionPolicy: "30d"

  monitoring:
    enablePodMonitor: true

  resources:
    requests:
      memory: "2Gi"
      cpu: "250m"
    limits:
      memory: "4Gi"
      cpu: "2"

  affinity:
    topologyKey: kubernetes.io/hostname
