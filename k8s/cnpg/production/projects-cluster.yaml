# =============================================================================
# Projects PostgreSQL Cluster (Production)
# =============================================================================
# Shared PostgreSQL for ALL user project databases.
# Replaces per-project PostgreSQL sidecars.
# Each project gets its own database: project_{uuid}
# =============================================================================
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: projects-pg
  namespace: shogo-system
  labels:
    app.kubernetes.io/part-of: shogo
    environment: production
spec:
  # HA: 3 instances (primary + 2 replicas) for production
  instances: 3

  # PostgreSQL configuration - tuned for many databases at scale
  postgresql:
    parameters:
      max_connections: "1000"
      shared_buffers: "1GB"
      effective_cache_size: "3GB"
      work_mem: "8MB"
      maintenance_work_mem: "256MB"
      wal_buffers: "32MB"
      # Connection handling
      idle_in_transaction_session_timeout: "30000"
      statement_timeout: "60000"
      # Logging
      log_min_duration_statement: "1000"
      log_checkpoints: "on"
    pg_hba:
      - host all all 10.0.0.0/8 md5
      - host all all 172.16.0.0/12 md5

  # Bootstrap: create the initial admin database
  bootstrap:
    initdb:
      database: projects_admin
      owner: projects_admin
      postInitApplicationSQL:
        - ALTER ROLE projects_admin CREATEROLE CREATEDB

  # Managed roles: ensure projects_admin always has CREATEROLE/CREATEDB
  # This survives cluster restores and failovers
  managed:
    roles:
      - name: projects_admin
        ensure: present
        login: true
        createdb: true
        createrole: true
        passwordSecret:
          name: projects-pg-app

  # Storage: EBS gp3 on EKS, local-path on bare metal
  storage:
    size: 200Gi
    storageClass: ebs-sc

  # Backup to S3
  backup:
    barmanObjectStore:
      destinationPath: s3://shogo-pg-backups-production/projects/
      s3Credentials:
        accessKeyId:
          name: cnpg-s3-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-s3-credentials
          key: SECRET_ACCESS_KEY
        region:
          name: cnpg-s3-credentials
          key: REGION
      wal:
        compression: gzip
      data:
        compression: gzip
    retentionPolicy: "90d"

  # Monitoring
  monitoring:
    enablePodMonitor: true

  # Resources - production scale
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "4Gi"
      cpu: "2000m"

  # Pin to managed node group — never schedule on ephemeral Karpenter nodes
  affinity:
    nodeSelector:
      eks.amazonaws.com/nodegroup: shogo-production-main
    topologyKey: kubernetes.io/hostname
