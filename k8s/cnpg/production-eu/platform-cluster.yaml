# =============================================================================
# Platform PostgreSQL Cluster (Production EU - Replica)
# =============================================================================
# Read-only replica that streams WAL from the us-east-1 primary.
# Used for local reads; writes are routed to the primary region.
#
# IMPORTANT: For this to work, the primary cluster must be configured to
# accept connections from eu-west-1 VPC CIDR (10.1.0.0/16) via:
#   - VPC peering between us-east-1 and eu-west-1, OR
#   - Primary exposed via NLB with TLS
#
# Initial setup: Set replica.enabled: false and use bootstrap.initdb
# until cross-region networking is established, then switch to replica mode.
# =============================================================================
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: platform-pg
  namespace: shogo-system
  labels:
    app.kubernetes.io/part-of: shogo
    environment: production
    region: eu-west-1
    role: replica
spec:
  instances: 2

  postgresql:
    parameters:
      max_connections: "600"
      shared_buffers: "512MB"
      effective_cache_size: "1536MB"
      work_mem: "8MB"
      maintenance_work_mem: "128MB"
      wal_buffers: "16MB"
      log_min_duration_statement: "500"
      log_checkpoints: "on"
    pg_hba:
      - host all all 10.0.0.0/8 md5
      - host all all 10.1.0.0/16 md5
      - host all all 172.16.0.0/12 md5

  # Standalone bootstrap for initial deployment (before cross-region networking)
  # Switch to replica mode once VPC peering is established
  bootstrap:
    initdb:
      database: shogo
      owner: shogo

  storage:
    size: 50Gi
    storageClass: ebs-sc

  # Local S3 backups in eu-west-1
  backup:
    barmanObjectStore:
      destinationPath: s3://shogo-pg-backups-production-eu/platform/
      s3Credentials:
        accessKeyId:
          name: cnpg-s3-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-s3-credentials
          key: SECRET_ACCESS_KEY
        region:
          name: cnpg-s3-credentials
          key: REGION
      wal:
        compression: gzip
      data:
        compression: gzip
    retentionPolicy: "30d"

  monitoring:
    enablePodMonitor: true

  resources:
    requests:
      memory: "512Mi"
      cpu: "200m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

  affinity:
    topologyKey: kubernetes.io/hostname
