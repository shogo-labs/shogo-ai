# =============================================================================
# Platform PostgreSQL Cluster (Production - OCI / OKE)
# =============================================================================
# Manages: users, workspaces, projects, sessions, billing, etc.
# Uses OCI Block Volumes (oci-bv) and OCI Object Storage for backups.
# =============================================================================
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: platform-pg
  namespace: shogo-system
  labels:
    app.kubernetes.io/part-of: shogo
    environment: production
spec:
  instances: 3

  postgresql:
    parameters:
      max_connections: "600"
      shared_buffers: "512MB"
      effective_cache_size: "1536MB"
      work_mem: "8MB"
      maintenance_work_mem: "128MB"
      wal_buffers: "16MB"
      log_min_duration_statement: "500"
      log_checkpoints: "on"
    pg_hba:
      - host all all 10.0.0.0/8 md5
      - host all all 172.16.0.0/12 md5

  bootstrap:
    initdb:
      database: shogo
      owner: shogo

  storage:
    size: 50Gi
    storageClass: oci-bv

  backup:
    barmanObjectStore:
      endpointURL: https://idin4oltblww.compat.objectstorage.us-ashburn-1.oraclecloud.com
      destinationPath: s3://shogo-pg-backups-production/platform/
      s3Credentials:
        accessKeyId:
          name: cnpg-s3-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-s3-credentials
          key: SECRET_ACCESS_KEY
        region:
          name: cnpg-s3-credentials
          key: REGION
      wal:
        compression: gzip
      data:
        compression: gzip
    retentionPolicy: "30d"

  monitoring:
    enablePodMonitor: true

  resources:
    requests:
      memory: "512Mi"
      cpu: "200m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

  affinity:
    nodeSelector:
      node.kubernetes.io/purpose: system
    topologyKey: kubernetes.io/hostname
