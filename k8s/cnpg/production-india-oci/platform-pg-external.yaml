# LoadBalancer Service to expose India PostgreSQL externally for cross-region
# logical replication subscriptions from US and EU.
apiVersion: v1
kind: Service
metadata:
  name: platform-pg-external
  namespace: shogo-production-system
  labels:
    app.kubernetes.io/part-of: shogo
    cnpg.io/cluster: platform-pg
  annotations:
    oci.oraclecloud.com/load-balancer-type: "nlb"
    oci-network-load-balancer.oraclecloud.com/is-preserve-source: "false"
    oci-network-load-balancer.oraclecloud.com/internal: "true"
spec:
  type: LoadBalancer
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    cnpg.io/cluster: platform-pg
    role: primary
