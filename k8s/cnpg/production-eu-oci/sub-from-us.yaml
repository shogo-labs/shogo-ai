# EU subscribes to US's publication for bidirectional replication.
apiVersion: postgresql.cnpg.io/v1
kind: Subscription
metadata:
  name: platform-pg-sub-from-us
  namespace: shogo-production-system
spec:
  cluster:
    name: platform-pg
  dbname: shogo
  name: sub_from_us
  externalClusterName: us-primary
  publicationName: shogo_all_pub
  parameters:
    copy_data: "false"
    origin: "none"
  subscriptionReclaimPolicy: retain
