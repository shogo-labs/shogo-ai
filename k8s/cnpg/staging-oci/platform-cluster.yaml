# =============================================================================
# Platform PostgreSQL Cluster (Staging - OCI / OKE)
# =============================================================================
# Manages: users, workspaces, projects, sessions, billing, etc.
# Uses OCI Block Volumes (oci-bv) and OCI Object Storage for backups.
# =============================================================================
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: platform-pg
  namespace: shogo-staging-system
  labels:
    app.kubernetes.io/part-of: shogo
    environment: staging
spec:
  # 2 instances = primary + 1 hot standby, spread across nodes (CNPG soft
  # pod anti-affinity + the staging pool's per-node eviction protection) so a
  # single node loss never takes the database down. This MUST stay >=2: the
  # live staging cluster runs 2 and a `kubectl apply` with instances:1 would
  # scale down and delete the standby. NOTE: these staging CNPG manifests are
  # applied MANUALLY (they are not wired into .github/workflows/deploy.yml,
  # which only applies the production platform-publication.yaml).
  instances: 2

  enablePDB: false

  # Highest scheduling priority in the cluster. Under node memory pressure the
  # kubelet evicts by QoS then Pod priority; before this the DB ran at the
  # default priority (0) and shared nodes with burstable warm-pool runtime pods,
  # so a runtime memory burst could (and did, 2026-07-01) take the node — and
  # this database — down. shogo-db-critical (value 1e6) guarantees Postgres is
  # the last thing evicted and can preempt runtime pods for a slot if needed.
  # PriorityClass is defined in k8s/overlays/staging/priority-classes.yaml and
  # MUST exist in the cluster before this Cluster is (re)applied.
  priorityClassName: shogo-db-critical

  postgresql:
    parameters:
      max_connections: "400"
      shared_buffers: "256MB"
      effective_cache_size: "768MB"
      work_mem: "4MB"
      maintenance_work_mem: "64MB"
      wal_buffers: "8MB"
      log_min_duration_statement: "1000"
      log_checkpoints: "on"
    pg_hba:
      - host all all 10.0.0.0/8 md5
      - host all all 172.16.0.0/12 md5

  bootstrap:
    initdb:
      database: shogo
      owner: shogo

  storage:
    size: 20Gi
    storageClass: oci-bv

  backup:
    barmanObjectStore:
      endpointURL: https://idin4oltblww.compat.objectstorage.us-ashburn-1.oraclecloud.com
      destinationPath: s3://shogo-pg-backups-staging/platform/
      s3Credentials:
        accessKeyId:
          name: cnpg-s3-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-s3-credentials
          key: SECRET_ACCESS_KEY
        region:
          name: cnpg-s3-credentials
          key: REGION
      wal:
        compression: gzip
      data:
        compression: gzip
    retentionPolicy: "7d"

  monitoring:
    enablePodMonitor: true

  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "500m"

  affinity:
    nodeSelector:
      node.kubernetes.io/purpose: system
    topologyKey: kubernetes.io/hostname
