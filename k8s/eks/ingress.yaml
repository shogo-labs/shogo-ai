# =============================================================================
# Knative Domain Configuration for shogo.ai
# =============================================================================
# This configures Knative to use shogo.ai as the base domain
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: config-domain
  namespace: knative-serving
data:
  # Default domain for all Knative services
  shogo.ai: ""
---
# =============================================================================
# API Service (Knative - gets routing through Kourier)
# =============================================================================
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: s-api
  namespace: shogo-system
  labels:
    app.kubernetes.io/part-of: shogo
spec:
  template:
    metadata:
      annotations:
        # Don't scale to zero for API (always available)
        autoscaling.knative.dev/min-scale: "1"
        autoscaling.knative.dev/max-scale: "10"
    spec:
      containers:
        - name: api
          image: 620804327344.dkr.ecr.us-east-1.amazonaws.com/shogo/shogo-api:latest
          ports:
            - containerPort: 8002
          env:
            - name: API_PORT
              value: "8002"
            - name: NODE_ENV
              value: "production"
            - name: MCP_URL
              value: "http://mcp-workspace-1.shogo-workspaces.svc.cluster.local"
            - name: BETTER_AUTH_URL
              value: "https://s-api.shogo.ai"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: REDIS_URL
                  optional: true
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: DATABASE_URL
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: BETTER_AUTH_SECRET
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
# =============================================================================
# Web/Studio Service (Knative - gets routing through Kourier)
# =============================================================================
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: s-studio
  namespace: shogo-system
  labels:
    app.kubernetes.io/part-of: shogo
spec:
  template:
    metadata:
      annotations:
        # Don't scale to zero for web (always available)
        autoscaling.knative.dev/min-scale: "1"
        autoscaling.knative.dev/max-scale: "10"
    spec:
      containers:
        - name: web
          image: 620804327344.dkr.ecr.us-east-1.amazonaws.com/shogo/shogo-web:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
