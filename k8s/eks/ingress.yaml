# =============================================================================
# AWS ALB Ingress for EKS
# =============================================================================
# This creates an Application Load Balancer to route traffic to services.
# Requires the AWS Load Balancer Controller to be installed.
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shogo-ingress
  namespace: shogo-system
  annotations:
    # ALB annotations
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    
    # SSL/TLS (uncomment and configure for production)
    # alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    # alb.ingress.kubernetes.io/ssl-redirect: '443'
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-2:ACCOUNT_ID:certificate/CERT_ID
    
    # Health checks
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: '15'
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: '5'
    
    # Sticky sessions for API
    alb.ingress.kubernetes.io/target-group-attributes: stickiness.enabled=true,stickiness.lb_cookie.duration_seconds=3600
    
    # Timeouts for long-running MCP operations
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=300
spec:
  rules:
    - http:
        paths:
          # API routes
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: shogo-api
                port:
                  number: 8002
          # Web frontend (catch-all)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: shogo-web
                port:
                  number: 80

