# =============================================================================
# API Service for EKS
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: shogo-system
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: 620804327344.dkr.ecr.us-east-1.amazonaws.com/shogo/shogo-api:latest
          ports:
            - containerPort: 8002
          env:
            - name: API_PORT
              value: "8002"
            - name: NODE_ENV
              value: "production"
            - name: MCP_URL
              value: "http://mcp-workspace-1.shogo-workspaces.svc.cluster.local"
            - name: VITE_PORT
              value: "80"
            - name: BETTER_AUTH_URL
              value: "https://api.shogo.ai"
            - name: REDIS_URL
              value: "redis://shogo-production.cache.amazonaws.com:6379"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: DATABASE_URL
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: BETTER_AUTH_SECRET
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: shogo-system
spec:
  selector:
    app: api
  ports:
    - port: 80
      targetPort: 8002
  type: ClusterIP
