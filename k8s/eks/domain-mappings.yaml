# =============================================================================
# Maps custom domains to Knative Services
# =============================================================================
apiVersion: serving.knative.dev/v1beta1
kind: DomainMapping
metadata:
  name: s-api.shogo.ai
  namespace: shogo-system
spec:
  ref:
    name: s-api
    kind: Service
    apiVersion: serving.knative.dev/v1
---
apiVersion: serving.knative.dev/v1beta1
kind: DomainMapping
metadata:
  name: s-studio.shogo.ai
  namespace: shogo-system
spec:
  ref:
    name: s-studio
    kind: Service
    apiVersion: serving.knative.dev/v1
