# =============================================================================
# Knative Service Template - Project Runtime with PostgreSQL Sidecar
# =============================================================================
# This template defines how project runtimes are deployed in production.
#
# Architecture:
# Each project pod contains TWO containers:
# 1. project-runtime: Claude Code agent + MCP (wavesmith) + Vite
# 2. postgres: PostgreSQL 16 sidecar for per-project database
#
# Key features:
# - Scale-to-zero: Both containers scale down together after idle timeout
# - Per-project PostgreSQL: Each project has its own isolated database
# - Ephemeral project storage: Uses emptyDir for fast cold starts (~6s faster)
# - S3 sync: Project files sync to/from S3 for persistence across restarts
# - Persistent database: PostgreSQL data persists in PVC
# - Local database: PostgreSQL runs on localhost:5432 (no network latency)
#
# Storage strategy:
# - project-data: emptyDir (fast, ephemeral) - synced to S3 for persistence
# - postgres-data: PVC (persistent) - database must survive restarts
#
# PVCs created per project:
# - pvc-postgres-{id}: PostgreSQL data (1Gi)
#
# Usage:
#   This is a TEMPLATE - not applied directly. The API server uses this as a
#   reference to create actual Knative Services programmatically when a project
#   runtime is started. See: apps/api/src/lib/knative-project-manager.ts
#
# DomainMapping:
#   A separate DomainMapping CRD routes {project-id}.shogo.one to this service.
#   See: apps/api/src/routes/publish.ts for DomainMapping creation pattern.
# =============================================================================

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: project-{id}
  namespace: shogo-workspaces
  labels:
    shogo.io/component: project-runtime
    shogo.io/project: "{id}"
    app.kubernetes.io/name: project-runtime
    app.kubernetes.io/instance: "{id}"
    app.kubernetes.io/part-of: shogo-platform
spec:
  template:
    metadata:
      annotations:
        # Knative autoscaling configuration
        # min-scale: 0 enables scale-to-zero for cost savings
        # scale-to-zero-pod-retention-period: Keep pod running for 15 min after last request
        #   to reduce cold starts for actively used projects
        autoscaling.knative.dev/min-scale: "0"
        autoscaling.knative.dev/max-scale: "1"
        autoscaling.knative.dev/scale-to-zero-pod-retention-period: "900s"
        autoscaling.knative.dev/target: "10"
    spec:
      timeoutSeconds: 600
      # fsGroup 999 for PostgreSQL compatibility
      securityContext:
        fsGroup: 999
      containers:
        # ===========================================
        # Container 1: Project Runtime
        # ===========================================
        - name: project-runtime
          image: ghcr.io/shogo-ai/project-runtime:latest
          ports:
            - containerPort: 8080
              name: http1
          env:
            - name: PROJECT_ID
              value: "{id}"
            - name: PROJECT_DIR
              value: "/app/project"
            - name: SCHEMAS_PATH
              value: "/app/.schemas"
            # PostgreSQL connection - localhost since sidecar
            - name: DATABASE_URL
              value: "postgres://shogo:shogo@localhost:5432/project"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: anthropic-credentials
                  key: api-key
            # S3 sync configuration - enables file persistence with emptyDir
            - name: S3_WORKSPACES_BUCKET
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: workspaces-bucket
                  optional: true
            - name: S3_WATCH_ENABLED
              value: "true"
            - name: S3_SYNC_INTERVAL
              value: "30000"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          volumeMounts:
            - name: project-data
              mountPath: /app/project
          # Optimized probes for fast startup
          # Check every 1s instead of 2s for faster cold start detection
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 1
            timeoutSeconds: 2
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

        # ===========================================
        # Container 2: PostgreSQL Sidecar
        # ===========================================
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: "shogo"
            - name: POSTGRES_PASSWORD
              value: "shogo"
            - name: POSTGRES_DB
              value: "project"
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "250m"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "shogo", "-d", "project"]
            initialDelaySeconds: 2
            periodSeconds: 3
            timeoutSeconds: 2
            failureThreshold: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "shogo", "-d", "project"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

      volumes:
        # Project files: emptyDir for fast cold starts (~6s faster than EBS)
        # Files are synced to/from S3 for persistence across restarts
        - name: project-data
          emptyDir:
            sizeLimit: "2Gi"
        # PostgreSQL data: PVC for persistent database storage
        - name: postgres-data
          persistentVolumeClaim:
            claimName: pvc-postgres-{id}
