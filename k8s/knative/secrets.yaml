# =============================================================================
# Shared Secrets for Workspace Services
# =============================================================================
# The DATABASE_URL secret is shared from shogo-system namespace.
# In production, use External Secrets Operator or AWS Secrets Manager.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: shogo-workspaces
type: Opaque
stringData:
  DATABASE_URL: postgres://shogo:shogo_k8s_dev@postgres.shogo-system:5432/shogo

