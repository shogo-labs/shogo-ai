# =============================================================================
# Shared Secrets for Workspace Services
# =============================================================================
# The DATABASE_URL secret is shared from shogo-system namespace.
# In production, use External Secrets Operator or AWS Secrets Manager.
# This file contains placeholder values only and must be customized per deploy.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: your-workspaces-namespace
type: Opaque
stringData:
  DATABASE_URL: postgres://user:replace-me@postgres.your-system-namespace:5432/shogo

