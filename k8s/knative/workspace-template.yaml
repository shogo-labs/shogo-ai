# =============================================================================
# Knative Service Template for Workspaces
# =============================================================================
# Each workspace gets its own Knative Service that:
#   - Keeps at least 1 pod running (min-scale: 1) to preserve meta-store state
#   - Scales up to max-scale on high traffic
#   - Has its own PVC for schema storage
#
# IMPORTANT: min-scale: 1 prevents cold start delays and "Schema not found"
# errors that occur when pods scale to zero and lose loaded schemas.
#
# The Workspace Operator would create these dynamically.
# For testing, we create two sample workspaces.
# =============================================================================

# ---------------------------------------------------------------------------
# Workspace 1 - Default workspace
# ---------------------------------------------------------------------------
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: workspace-1-pvc
  namespace: shogo-workspaces
  labels:
    app.kubernetes.io/part-of: shogo
    shogo.io/workspace: workspace-1
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: mcp-workspace-1
  namespace: shogo-workspaces
  labels:
    app.kubernetes.io/part-of: shogo
    shogo.io/workspace: workspace-1
    shogo.io/tenant: tenant-a
spec:
  template:
    metadata:
      annotations:
        # Keep at least 1 pod running to preserve meta-store state
        # This prevents cold start delays and "Schema not found" errors
        autoscaling.knative.dev/min-scale: "1"
        # Maximum 3 replicas for high traffic
        autoscaling.knative.dev/max-scale: "3"
        # Target 100 concurrent requests per pod
        autoscaling.knative.dev/target: "100"
    spec:
      # Timeout for requests (important for long-running MCP operations)
      timeoutSeconds: 300
      containers:
        - name: mcp
          image: k3d-shogo-registry:5000/shogo-mcp:latest
          ports:
            - containerPort: 3100
              protocol: TCP
          env:
            - name: MCP_PORT
              value: "3100"
            - name: NODE_ENV
              value: "production"
            - name: SCHEMAS_PATH
              value: "/app/.schemas"
            - name: WORKSPACE_ID
              value: "workspace-1"
            - name: TENANT_ID
              value: "tenant-a"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: DATABASE_URL
          # Note: PVC mounting with Knative requires ReadWriteMany or
          # careful handling. For local dev, we use the bundled schemas.
          # In production, consider using S3/object storage instead.
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
