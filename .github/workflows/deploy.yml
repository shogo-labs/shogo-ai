# =============================================================================
# Shogo AI - Build, Test, and Deploy Pipeline
# =============================================================================
# Multi-environment deployment pipeline:
#   - staging branch  → staging environment
#   - main branch     → production environment
#
# Pipeline stages:
#   1. Setup - Determine environment from branch
#   2. Build & Test - Run unit tests for all packages
#   3. Build Images - Build Docker images for linux/amd64
#   4. Push to ECR - Push images to AWS ECR
#   5. Deploy to EKS - Update Knative services with new images
# =============================================================================

name: Build, Test, and Deploy

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 620804327344.dkr.ecr.us-east-1.amazonaws.com

jobs:
  # ===========================================================================
  # Stage 0: Setup - Determine Environment
  # ===========================================================================
  setup:
    name: Determine Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      eks_cluster: ${{ steps.set-env.outputs.eks_cluster }}
      namespace_system: ${{ steps.set-env.outputs.namespace_system }}
      namespace_workspaces: ${{ steps.set-env.outputs.namespace_workspaces }}
      api_domain: ${{ steps.set-env.outputs.api_domain }}
      studio_domain: ${{ steps.set-env.outputs.studio_domain }}
      mcp_domain: ${{ steps.set-env.outputs.mcp_domain }}
    steps:
      - name: Set environment variables
        id: set-env
        run: |
          # Determine environment from trigger
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            ENV="production"
          elif [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            ENV="staging"
          else
            echo "Unknown branch, defaulting to staging"
            ENV="staging"
          fi
          
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "📦 Deploying to: $ENV"
          
          # Set environment-specific variables
          if [[ "$ENV" == "production" ]]; then
            echo "eks_cluster=shogo-production" >> $GITHUB_OUTPUT
            echo "namespace_system=shogo-system" >> $GITHUB_OUTPUT
            echo "namespace_workspaces=shogo-workspaces" >> $GITHUB_OUTPUT
            echo "api_domain=api.shogo.ai" >> $GITHUB_OUTPUT
            echo "studio_domain=studio.shogo.ai" >> $GITHUB_OUTPUT
            echo "mcp_domain=mcp.shogo.ai" >> $GITHUB_OUTPUT
          else
            echo "eks_cluster=shogo-staging" >> $GITHUB_OUTPUT
            echo "namespace_system=shogo-staging-system" >> $GITHUB_OUTPUT
            echo "namespace_workspaces=shogo-staging-workspaces" >> $GITHUB_OUTPUT
            echo "api_domain=api-staging.shogo.ai" >> $GITHUB_OUTPUT
            echo "studio_domain=studio-staging.shogo.ai" >> $GITHUB_OUTPUT
            echo "mcp_domain=mcp-staging.shogo.ai" >> $GITHUB_OUTPUT
          fi

  # ===========================================================================
  # Stage 1: Build and Test
  # ===========================================================================
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build state-api
        run: cd packages/state-api && bun run build

      - name: Run tests
        run: bun test
        continue-on-error: true  # Don't fail on test errors for now

      - name: Type check
        run: bunx tsc --noEmit
        continue-on-error: true  # Don't fail on type errors for now

  # ===========================================================================
  # Stage 2: Build and Push Docker Images
  # ===========================================================================
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [setup, test]
    environment: ${{ needs.setup.outputs.environment }}
    
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push MCP image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/mcp/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/shogo/shogo-mcp:${{ needs.setup.outputs.environment }}-latest
            ${{ env.ECR_REGISTRY }}/shogo/shogo-mcp:${{ needs.setup.outputs.environment }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/shogo/shogo-api:${{ needs.setup.outputs.environment }}-latest
            ${{ env.ECR_REGISTRY }}/shogo/shogo-api:${{ needs.setup.outputs.environment }}-${{ github.sha }}
          build-args: |
            ALLOWED_ORIGINS=${{ vars.ALLOWED_ORIGINS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/shogo/shogo-web:${{ needs.setup.outputs.environment }}-latest
            ${{ env.ECR_REGISTRY }}/shogo/shogo-web:${{ needs.setup.outputs.environment }}-${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
            VITE_MCP_URL=${{ vars.VITE_MCP_URL }}
            VITE_BETTER_AUTH_URL=${{ vars.VITE_BETTER_AUTH_URL }}
            VITE_WORKSPACE=${{ vars.VITE_WORKSPACE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # Stage 3: Deploy to EKS
  # ===========================================================================
  deploy:
    name: Deploy to EKS (${{ needs.setup.outputs.environment }})
    runs-on: ubuntu-latest
    needs: [setup, build-and-push]
    environment: ${{ needs.setup.outputs.environment }}
    
    permissions:
      id-token: write
      contents: read

    env:
      ENVIRONMENT: ${{ needs.setup.outputs.environment }}
      EKS_CLUSTER: ${{ needs.setup.outputs.eks_cluster }}
      NS_SYSTEM: ${{ needs.setup.outputs.namespace_system }}
      NS_WORKSPACES: ${{ needs.setup.outputs.namespace_workspaces }}
      API_DOMAIN: ${{ needs.setup.outputs.api_domain }}
      STUDIO_DOMAIN: ${{ needs.setup.outputs.studio_domain }}
      MCP_DOMAIN: ${{ needs.setup.outputs.mcp_domain }}
      IMAGE_TAG: ${{ needs.setup.outputs.environment }}-${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Create namespaces if not exist
        run: |
          kubectl create namespace ${{ env.NS_SYSTEM }} --dry-run=client -o yaml | kubectl apply -f -
          kubectl create namespace ${{ env.NS_WORKSPACES }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Knative services
        run: |
          # Apply environment-specific overlay
          if [ -d "k8s/overlays/${{ env.ENVIRONMENT }}" ]; then
            echo "📦 Applying kustomize overlay for ${{ env.ENVIRONMENT }}"
            
            # Update image tags in overlay
            cd k8s/overlays/${{ env.ENVIRONMENT }}
            kustomize edit set image \
              shogo-mcp=${{ env.ECR_REGISTRY }}/shogo/shogo-mcp:${{ env.IMAGE_TAG }} \
              shogo-api=${{ env.ECR_REGISTRY }}/shogo/shogo-api:${{ env.IMAGE_TAG }} \
              shogo-web=${{ env.ECR_REGISTRY }}/shogo/shogo-web:${{ env.IMAGE_TAG }}
            cd -
            
            kubectl apply -k k8s/overlays/${{ env.ENVIRONMENT }}
          else
            echo "⚠️ No overlay found for ${{ env.ENVIRONMENT }}, using base with sed replacements"
            
            # Fallback: Update workspace services with new image tag and namespace
            sed -i "s|:latest|:${{ env.IMAGE_TAG }}|g" k8s/eks/workspace-services.yaml
            sed -i "s|namespace: shogo-workspaces|namespace: ${{ env.NS_WORKSPACES }}|g" k8s/eks/workspace-services.yaml
            kubectl apply -f k8s/eks/workspace-services.yaml
            
            # Update API and Web services
            sed -i "s|:latest|:${{ env.IMAGE_TAG }}|g" k8s/eks/ingress.yaml
            sed -i "s|namespace: shogo-system|namespace: ${{ env.NS_SYSTEM }}|g" k8s/eks/ingress.yaml
            sed -i "s|shogo.ai|${{ env.API_DOMAIN }}|g" k8s/eks/ingress.yaml
            kubectl apply -f k8s/eks/ingress.yaml
          fi

      - name: Apply domain mappings
        run: |
          # Create domain mappings for the environment
          cat <<EOF | kubectl apply -f -
          apiVersion: serving.knative.dev/v1beta1
          kind: DomainMapping
          metadata:
            name: ${{ env.API_DOMAIN }}
            namespace: ${{ env.NS_SYSTEM }}
          spec:
            ref:
              name: api
              kind: Service
              apiVersion: serving.knative.dev/v1
          ---
          apiVersion: serving.knative.dev/v1beta1
          kind: DomainMapping
          metadata:
            name: ${{ env.STUDIO_DOMAIN }}
            namespace: ${{ env.NS_SYSTEM }}
          spec:
            ref:
              name: studio
              kind: Service
              apiVersion: serving.knative.dev/v1
          EOF

      - name: Wait for rollout
        run: |
          echo "⏳ Waiting for service rollouts in ${{ env.ENVIRONMENT }}..."
          
          echo "Waiting for api rollout..."
          kubectl wait --for=condition=ready ksvc/api -n ${{ env.NS_SYSTEM }} --timeout=300s || true
          
          echo "Waiting for studio rollout..."
          kubectl wait --for=condition=ready ksvc/studio -n ${{ env.NS_SYSTEM }} --timeout=300s || true
          
          echo "Waiting for workspace services..."
          kubectl wait --for=condition=ready ksvc/mcp -n ${{ env.NS_WORKSPACES }} --timeout=300s || true

      - name: Verify deployment
        run: |
          echo "=== Knative Services Status (${{ env.NS_SYSTEM }}) ==="
          kubectl get ksvc -n ${{ env.NS_SYSTEM }}
          echo ""
          echo "=== Knative Services Status (${{ env.NS_WORKSPACES }}) ==="
          kubectl get ksvc -n ${{ env.NS_WORKSPACES }}
          echo ""
          echo "=== Domain Mappings ==="
          kubectl get domainmapping -n ${{ env.NS_SYSTEM }}
          echo ""
          echo "=== Pods Status (${{ env.NS_SYSTEM }}) ==="
          kubectl get pods -n ${{ env.NS_SYSTEM }}

      - name: Summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Environment: \`${{ env.ENVIRONMENT }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Services Deployed" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Image Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----------|" >> $GITHUB_STEP_SUMMARY
          echo "| MCP | \`${{ env.IMAGE_TAG }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| API | \`${{ env.IMAGE_TAG }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Web | \`${{ env.IMAGE_TAG }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Endpoints" >> $GITHUB_STEP_SUMMARY
          echo "- **Studio**: https://${{ env.STUDIO_DOMAIN }}" >> $GITHUB_STEP_SUMMARY
          echo "- **API**: https://${{ env.API_DOMAIN }}" >> $GITHUB_STEP_SUMMARY
          echo "- **MCP**: https://${{ env.MCP_DOMAIN }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Cluster" >> $GITHUB_STEP_SUMMARY
          echo "- **EKS Cluster**: \`${{ env.EKS_CLUSTER }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **System Namespace**: \`${{ env.NS_SYSTEM }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Workspaces Namespace**: \`${{ env.NS_WORKSPACES }}\`" >> $GITHUB_STEP_SUMMARY
