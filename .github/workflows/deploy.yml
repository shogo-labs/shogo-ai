# =============================================================================
# Shogo AI - Build, Test, and Deploy Pipeline
# =============================================================================
# Triggers on push to main branch
# 
# Pipeline stages:
#   1. Build & Test - Run unit tests for all packages
#   2. Build Images - Build Docker images for linux/amd64
#   3. Push to ECR - Push images to AWS ECR
#   4. Deploy to EKS - Update Knative services with new images
# =============================================================================

name: Build, Test, and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual triggers

env:
  AWS_REGION: us-east-2
  ECR_REGISTRY: 620804327344.dkr.ecr.us-east-2.amazonaws.com
  EKS_CLUSTER_NAME: shogo-production

jobs:
  # ===========================================================================
  # Stage 1: Build and Test
  # ===========================================================================
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build state-api
        run: cd packages/state-api && bun run build

      - name: Run tests
        run: bun test
        continue-on-error: true  # Don't fail on test errors for now

      - name: Type check
        run: bunx tsc --noEmit
        continue-on-error: true  # Don't fail on type errors for now

  # ===========================================================================
  # Stage 2: Build and Push Docker Images
  # ===========================================================================
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push MCP image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/mcp/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/shogo/shogo-mcp:latest
            ${{ env.ECR_REGISTRY }}/shogo/shogo-mcp:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/shogo/shogo-api:latest
            ${{ env.ECR_REGISTRY }}/shogo/shogo-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/shogo/shogo-web:latest
            ${{ env.ECR_REGISTRY }}/shogo/shogo-web:${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
            VITE_MCP_URL=${{ vars.VITE_MCP_URL }}
            VITE_BETTER_AUTH_URL=${{ vars.VITE_BETTER_AUTH_URL }}
            VITE_WORKSPACE=${{ vars.VITE_WORKSPACE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # Stage 3: Deploy to EKS
  # ===========================================================================
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push
    
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Deploy Knative services
        run: |
          # Update workspace services with new image tag
          sed -i "s|:latest|:${{ github.sha }}|g" k8s/eks/workspace-services.yaml
          kubectl apply -f k8s/eks/workspace-services.yaml
          
          # Wait for rollout to complete
          echo "Waiting for workspace-1 rollout..."
          kubectl wait --for=condition=ready ksvc/mcp-workspace-1 -n shogo-workspaces --timeout=300s || true
          
          echo "Waiting for workspace-2 rollout..."
          kubectl wait --for=condition=ready ksvc/mcp-workspace-2 -n shogo-workspaces --timeout=300s || true

      - name: Verify deployment
        run: |
          echo "=== Knative Services Status ==="
          kubectl get ksvc -n shogo-workspaces
          echo ""
          echo "=== Pods Status ==="
          kubectl get pods -n shogo-workspaces
          echo ""
          echo "=== Recent Events ==="
          kubectl get events -n shogo-workspaces --sort-by='.lastTimestamp' | tail -10

      - name: Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Image Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----------|" >> $GITHUB_STEP_SUMMARY
          echo "| MCP | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| API | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Web | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deployed to EKS cluster: \`${{ env.EKS_CLUSTER_NAME }}\`" >> $GITHUB_STEP_SUMMARY
