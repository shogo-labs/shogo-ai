# =============================================================================
# Shogo AI - Build, Test, and Deploy Pipeline
# =============================================================================
# Multi-environment deployment pipeline:
#   - staging branch  → staging environment
#   - main branch     → production environment
#
# Pipeline stages:
#   1. Setup - Determine environment from branch
#   2. Build & Test - Run unit tests for all packages
#   3. Build Images - Build Docker images for linux/amd64
#   4. Push to ECR - Push images to AWS ECR
#   5. Deploy to EKS - Update Knative services with new images
# =============================================================================

name: Build, Test, and Deploy

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  AWS_REGION: us-east-1
  # ECR_REGISTRY is set per-environment in the setup job

jobs:
  # ===========================================================================
  # Stage 0: Setup - Determine Environment
  # ===========================================================================
  setup:
    name: Determine Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      eks_cluster: ${{ steps.set-env.outputs.eks_cluster }}
      ecr_registry: ${{ steps.set-env.outputs.ecr_registry }}
      namespace_system: ${{ steps.set-env.outputs.namespace_system }}
      namespace_workspaces: ${{ steps.set-env.outputs.namespace_workspaces }}
      domain: ${{ steps.set-env.outputs.domain }}
      mcp_domain: ${{ steps.set-env.outputs.mcp_domain }}
      docs_domain: ${{ steps.set-env.outputs.docs_domain }}
    steps:
      - name: Set environment variables
        id: set-env
        run: |
          # Determine environment from trigger
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            ENV="production"
          elif [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            ENV="staging"
          else
            echo "Unknown branch, defaulting to staging"
            ENV="staging"
          fi
          
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "📦 Deploying to: $ENV"
          
          # Set environment-specific variables
          # Both environments use the same AWS account (097357356677)
          ECR_REGISTRY="097357356677.dkr.ecr.us-east-1.amazonaws.com"
          echo "ecr_registry=$ECR_REGISTRY" >> $GITHUB_OUTPUT
          
          if [[ "$ENV" == "production" ]]; then
            echo "eks_cluster=shogo-production" >> $GITHUB_OUTPUT
            echo "namespace_system=shogo-system" >> $GITHUB_OUTPUT
            echo "namespace_workspaces=shogo-workspaces" >> $GITHUB_OUTPUT
            echo "domain=studio.shogo.ai" >> $GITHUB_OUTPUT
            echo "mcp_domain=mcp.shogo.ai" >> $GITHUB_OUTPUT
            echo "docs_domain=docs.shogo.ai" >> $GITHUB_OUTPUT
          else
            echo "eks_cluster=shogo-staging" >> $GITHUB_OUTPUT
            echo "namespace_system=shogo-staging-system" >> $GITHUB_OUTPUT
            echo "namespace_workspaces=shogo-staging-workspaces" >> $GITHUB_OUTPUT
            echo "domain=studio-staging.shogo.ai" >> $GITHUB_OUTPUT
            echo "mcp_domain=mcp-staging.shogo.ai" >> $GITHUB_OUTPUT
            echo "docs_domain=docs-staging.shogo.ai" >> $GITHUB_OUTPUT
          fi

  # ===========================================================================
  # Stage 0.5: Detect Changes - Skip image builds when code hasn't changed
  # ===========================================================================
  detect-changes:
    name: Detect Changed Images
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}
      mcp_changed: ${{ steps.set-matrix.outputs.mcp_changed }}
      api_changed: ${{ steps.set-matrix.outputs.api_changed }}
      web_changed: ${{ steps.set-matrix.outputs.web_changed }}
      project_runtime_changed: ${{ steps.set-matrix.outputs.project_runtime_changed }}
      agent_runtime_changed: ${{ steps.set-matrix.outputs.agent_runtime_changed }}
      docs_changed: ${{ steps.set-matrix.outputs.docs_changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths and build matrix
        id: set-matrix
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          FORCE_ALL="${{ github.event_name == 'workflow_dispatch' }}"

          if [ "$FORCE_ALL" = "true" ]; then
            echo "🔧 workflow_dispatch — forcing all image builds"
            CHANGED=""
          elif [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            CHANGED=$(git diff --name-only "$BEFORE_SHA" HEAD)
            echo "📂 Comparing $BEFORE_SHA..HEAD (push event)"
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
            echo "📂 Comparing HEAD~1..HEAD (fallback)"
          fi

          echo ""
          echo "Changed files:"
          echo "$CHANGED"
          echo ""

          has_match() {
            [ "$FORCE_ALL" = "true" ] && { echo "true"; return; }
            echo "$CHANGED" | grep -qE "$1" && echo "true" || echo "false"
          }

          SHARED=$(has_match '^(package\.json|bun\.lock|tsconfig\.base\.json|scripts/)')
          STATE_API=$(has_match '^packages/state-api/')
          MCP_PKG=$(has_match '^packages/mcp/')
          SDK=$(has_match '^packages/sdk/')
          SHARED_RUNTIME=$(has_match '^packages/shared-runtime/')
          PROJECT_RUNTIME_PKG=$(has_match '^packages/project-runtime/')
          AGENT_RUNTIME_PKG=$(has_match '^packages/agent-runtime/')
          API_APP=$(has_match '^(apps/api/|prisma/|prisma\.config\.ts)')
          WEB_APP=$(has_match '^(apps/web/|\.claude/skills/)')
          DOCS_APP=$(has_match '^apps/docs/')

          MCP_CHANGED=false
          if [ "$SHARED" = "true" ] || [ "$STATE_API" = "true" ] || [ "$MCP_PKG" = "true" ]; then
            MCP_CHANGED=true
          fi

          API_CHANGED=false
          if [ "$SHARED" = "true" ] || [ "$STATE_API" = "true" ] || [ "$MCP_PKG" = "true" ] || [ "$SDK" = "true" ] || [ "$SHARED_RUNTIME" = "true" ] || [ "$PROJECT_RUNTIME_PKG" = "true" ] || [ "$AGENT_RUNTIME_PKG" = "true" ] || [ "$API_APP" = "true" ]; then
            API_CHANGED=true
          fi

          WEB_CHANGED=false
          if [ "$SHARED" = "true" ] || [ "$STATE_API" = "true" ] || [ "$MCP_PKG" = "true" ] || [ "$SDK" = "true" ] || [ "$WEB_APP" = "true" ]; then
            WEB_CHANGED=true
          fi

          PROJECT_RUNTIME_CHANGED=false
          if [ "$SHARED" = "true" ] || [ "$STATE_API" = "true" ] || [ "$MCP_PKG" = "true" ] || [ "$SHARED_RUNTIME" = "true" ] || [ "$PROJECT_RUNTIME_PKG" = "true" ] || [ "$SDK" = "true" ]; then
            PROJECT_RUNTIME_CHANGED=true
          fi

          AGENT_RUNTIME_CHANGED=false
          if [ "$SHARED" = "true" ] || [ "$SHARED_RUNTIME" = "true" ] || [ "$AGENT_RUNTIME_PKG" = "true" ]; then
            AGENT_RUNTIME_CHANGED=true
          fi

          # docs Dockerfile doesn't use workspace root lockfile — only triggered by its own changes
          DOCS_CHANGED=false
          if [ "$DOCS_APP" = "true" ]; then
            DOCS_CHANGED=true
          fi

          echo "mcp_changed=$MCP_CHANGED" >> $GITHUB_OUTPUT
          echo "api_changed=$API_CHANGED" >> $GITHUB_OUTPUT
          echo "web_changed=$WEB_CHANGED" >> $GITHUB_OUTPUT
          echo "project_runtime_changed=$PROJECT_RUNTIME_CHANGED" >> $GITHUB_OUTPUT
          echo "agent_runtime_changed=$AGENT_RUNTIME_CHANGED" >> $GITHUB_OUTPUT
          echo "docs_changed=$DOCS_CHANGED" >> $GITHUB_OUTPUT

          ENTRIES=""
          add_entry() {
            [ -n "$ENTRIES" ] && ENTRIES="$ENTRIES,"
            ENTRIES="$ENTRIES$1"
          }

          [ "$MCP_CHANGED" = "true" ] && add_entry '{"image":"mcp","dockerfile":"packages/mcp/Dockerfile","ecr_name":"shogo-mcp","build_args":""}'
          [ "$API_CHANGED" = "true" ] && add_entry '{"image":"api","dockerfile":"apps/api/Dockerfile","ecr_name":"shogo-api","build_args":"api"}'
          [ "$WEB_CHANGED" = "true" ] && add_entry '{"image":"web","dockerfile":"apps/web/Dockerfile","ecr_name":"shogo-web","build_args":"web"}'
          [ "$PROJECT_RUNTIME_CHANGED" = "true" ] && add_entry '{"image":"project-runtime","dockerfile":"packages/project-runtime/Dockerfile","ecr_name":"project-runtime","build_args":""}'
          [ "$AGENT_RUNTIME_CHANGED" = "true" ] && add_entry '{"image":"agent-runtime","dockerfile":"packages/agent-runtime/Dockerfile","ecr_name":"agent-runtime","build_args":""}'
          [ "$DOCS_CHANGED" = "true" ] && add_entry '{"image":"docs","dockerfile":"apps/docs/Dockerfile","ecr_name":"shogo-docs","build_args":""}'

          if [ -z "$ENTRIES" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "matrix={\"include\":[]}" >> $GITHUB_OUTPUT
            echo "✅ No image changes detected — all builds will be skipped"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "matrix={\"include\":[$ENTRIES]}" >> $GITHUB_OUTPUT
          fi

          echo ""
          echo "📊 Changes detected:"
          echo "  mcp: $MCP_CHANGED"
          echo "  api: $API_CHANGED"
          echo "  web: $WEB_CHANGED"
          echo "  project-runtime: $PROJECT_RUNTIME_CHANGED"
          echo "  agent-runtime: $AGENT_RUNTIME_CHANGED"
          echo "  docs: $DOCS_CHANGED"

  # ===========================================================================
  # Stage 1: Build and Test
  # ===========================================================================
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    if: false  # Temporarily skip tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build state-api
        run: cd packages/state-api && bun run build

      - name: Run tests
        run: bun test
        continue-on-error: true  # Don't fail on test errors for now

      - name: Type check
        run: bunx tsc --noEmit
        continue-on-error: true  # Don't fail on type errors for now

  # ===========================================================================
  # Stage 2: Build and Push Docker Images (in parallel)
  # ===========================================================================
  build-and-push:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: [setup, detect-changes]
    if: needs.detect-changes.outputs.has_changes == 'true'
    environment: ${{ needs.setup.outputs.environment }}
    timeout-minutes: 45  # project-runtime needs time for template builds
    
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Free disk space (large runtime images)
        if: matrix.image == 'project-runtime' || matrix.image == 'agent-runtime'
        uses: jlumbroso/free-disk-space@main
        with:
          # Frees ~31GB - keeps only what's needed for Docker builds
          tool-cache: false      # Keep tool cache (node, etc)
          android: true          # Remove Android SDK (~10GB)
          dotnet: true           # Remove .NET (~2GB)
          haskell: true          # Remove Haskell (~5GB)
          large-packages: true   # Remove large apt packages (~5GB)
          docker-images: true    # Remove pre-cached Docker images (~3GB)
          swap-storage: true     # Remove swap (~4GB)

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-deploy-${{ matrix.image }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.image }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ needs.setup.outputs.ecr_registry }}/shogo/${{ matrix.ecr_name }}:${{ needs.setup.outputs.environment }}-latest
            ${{ needs.setup.outputs.ecr_registry }}/shogo/${{ matrix.ecr_name }}:${{ needs.setup.outputs.environment }}-${{ github.sha }}
          build-args: |
            ${{ matrix.build_args == 'api' && format('ALLOWED_ORIGINS={0}', vars.ALLOWED_ORIGINS) || '' }}
            ${{ matrix.build_args == 'web' && format('VITE_API_URL={0}', vars.VITE_API_URL) || '' }}
            ${{ matrix.build_args == 'web' && format('VITE_MCP_URL={0}', vars.VITE_MCP_URL) || '' }}
            ${{ matrix.build_args == 'web' && format('VITE_BETTER_AUTH_URL={0}', vars.VITE_BETTER_AUTH_URL) || '' }}
            ${{ matrix.build_args == 'web' && format('VITE_WORKSPACE={0}', vars.VITE_WORKSPACE) || '' }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  # ===========================================================================
  # Stage 3: Deploy to EKS
  # ===========================================================================
  # Note: Migrations run automatically on API container startup via entrypoint.sh
  deploy:
    name: Deploy to EKS (${{ needs.setup.outputs.environment }})
    runs-on: ubuntu-latest
    needs: [setup, detect-changes, build-and-push]
    # Run even when build-and-push was skipped (no changes) — secrets/manifests still need applying
    if: |
      always() &&
      needs.setup.result == 'success' &&
      needs.detect-changes.result == 'success' &&
      (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped')
    environment: ${{ needs.setup.outputs.environment }}
    
    permissions:
      id-token: write
      contents: read

    env:
      ENVIRONMENT: ${{ needs.setup.outputs.environment }}
      EKS_CLUSTER: ${{ needs.setup.outputs.eks_cluster }}
      NS_SYSTEM: ${{ needs.setup.outputs.namespace_system }}
      NS_WORKSPACES: ${{ needs.setup.outputs.namespace_workspaces }}
      DOMAIN: ${{ needs.setup.outputs.domain }}
      MCP_DOMAIN: ${{ needs.setup.outputs.mcp_domain }}
      DOCS_DOMAIN: ${{ needs.setup.outputs.docs_domain }}
      IMAGE_TAG: ${{ needs.setup.outputs.environment }}-${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Create namespaces if not exist
        run: |
          kubectl create namespace ${{ env.NS_SYSTEM }} --dry-run=client -o yaml | kubectl apply -f -
          kubectl create namespace ${{ env.NS_WORKSPACES }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Create or update API secrets
        run: |
          # Build the api-secrets secret with all required keys
          # Optional secrets are included only when set in GitHub environment
          SECRET_ARGS=(
            --from-literal=ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}"
          )
          
          # Better Auth secret (optional)
          if [ -n "${{ secrets.BETTER_AUTH_SECRET }}" ]; then
            SECRET_ARGS+=(--from-literal=BETTER_AUTH_SECRET="${{ secrets.BETTER_AUTH_SECRET }}")
          fi
          
          # Stripe secrets (optional)
          if [ -n "${{ secrets.STRIPE_SECRET_KEY }}" ]; then
            SECRET_ARGS+=(--from-literal=STRIPE_SECRET_KEY="${{ secrets.STRIPE_SECRET_KEY }}")
          fi
          if [ -n "${{ secrets.STRIPE_WEBHOOK_SECRET }}" ]; then
            SECRET_ARGS+=(--from-literal=STRIPE_WEBHOOK_SECRET="${{ secrets.STRIPE_WEBHOOK_SECRET }}")
          fi
          
          # GitHub App secrets (optional - for Git sync integration)
          # Note: Uses GH_ prefix because GitHub Actions reserves the GITHUB_ prefix
          if [ -n "${{ secrets.GH_APP_ID }}" ]; then
            SECRET_ARGS+=(--from-literal=GH_APP_ID="${{ secrets.GH_APP_ID }}")
          fi
          if [ -n "${{ secrets.GH_APP_CLIENT_ID }}" ]; then
            SECRET_ARGS+=(--from-literal=GH_APP_CLIENT_ID="${{ secrets.GH_APP_CLIENT_ID }}")
          fi
          if [ -n "${{ secrets.GH_APP_CLIENT_SECRET }}" ]; then
            SECRET_ARGS+=(--from-literal=GH_APP_CLIENT_SECRET="${{ secrets.GH_APP_CLIENT_SECRET }}")
          fi
          if [ -n "${{ secrets.GH_APP_PRIVATE_KEY }}" ]; then
            SECRET_ARGS+=(--from-literal=GH_APP_PRIVATE_KEY="${{ secrets.GH_APP_PRIVATE_KEY }}")
          fi
          if [ -n "${{ secrets.GH_APP_WEBHOOK_SECRET }}" ]; then
            SECRET_ARGS+=(--from-literal=GH_APP_WEBHOOK_SECRET="${{ secrets.GH_APP_WEBHOOK_SECRET }}")
          fi
          if [ -n "${{ secrets.GH_APP_SLUG }}" ]; then
            SECRET_ARGS+=(--from-literal=GH_APP_SLUG="${{ secrets.GH_APP_SLUG }}")
          fi
          
          kubectl create secret generic api-secrets \
            --namespace=${{ env.NS_SYSTEM }} \
            "${SECRET_ARGS[@]}" \
            --dry-run=client -o yaml | kubectl apply -f -
          
          echo "✅ API secrets created/updated in ${{ env.NS_SYSTEM }} namespace"
          
          # Create anthropic-credentials secret for project pods in workspaces namespace
          # This is used by project-runtime containers for Claude Code agent
          kubectl create secret generic anthropic-credentials \
            --namespace=${{ env.NS_WORKSPACES }} \
            --from-literal=api-key="${{ secrets.ANTHROPIC_API_KEY }}" \
            --dry-run=client -o yaml | kubectl apply -f -
          
          echo "✅ Anthropic credentials created/updated in ${{ env.NS_WORKSPACES }} namespace"

      - name: Apply Kubernetes manifests
        run: |
          # Apply RBAC and other configurations from kustomize overlay
          # This ensures ServiceAccounts, ClusterRoles, and ClusterRoleBindings are created
          echo "📦 Applying Kubernetes manifests for ${{ env.ENVIRONMENT }}"
          
          # Apply the staging overlay which includes RBAC for publish feature
          kubectl apply -k k8s/overlays/${{ env.ENVIRONMENT }}/ || true
          
          echo "✅ Kubernetes manifests applied"

      - name: Deploy Knative services
        env:
          ECR_REGISTRY: ${{ needs.setup.outputs.ecr_registry }}
          WEB_CHANGED: ${{ needs.detect-changes.outputs.web_changed }}
          API_CHANGED: ${{ needs.detect-changes.outputs.api_changed }}
          MCP_CHANGED: ${{ needs.detect-changes.outputs.mcp_changed }}
          DOCS_CHANGED: ${{ needs.detect-changes.outputs.docs_changed }}
        run: |
          echo "📦 Updating images for ${{ env.ENVIRONMENT }}"
          
          if [ "$WEB_CHANGED" = "true" ]; then
            kubectl patch ksvc studio -n ${{ env.NS_SYSTEM }} --type='json' -p="[
              {\"op\": \"replace\", \"path\": \"/spec/template/spec/containers/0/image\", \"value\": \"${ECR_REGISTRY}/shogo/shogo-web:${{ env.IMAGE_TAG }}\"}
            ]" || echo "Studio service not found, may need terraform apply first"
          else
            echo "⏭️ Skipping studio (no web changes)"
          fi
          
          if [ "$API_CHANGED" = "true" ]; then
            kubectl patch ksvc api -n ${{ env.NS_SYSTEM }} --type='json' -p="[
              {\"op\": \"replace\", \"path\": \"/spec/template/spec/containers/0/image\", \"value\": \"${ECR_REGISTRY}/shogo/shogo-api:${{ env.IMAGE_TAG }}\"}
            ]" || echo "API service not found, may need terraform apply first"
          else
            echo "⏭️ Skipping api (no api changes)"
          fi
          
          if [ "$MCP_CHANGED" = "true" ]; then
            kubectl patch ksvc mcp-workspace -n ${{ env.NS_WORKSPACES }} --type='json' -p="[
              {\"op\": \"replace\", \"path\": \"/spec/template/spec/containers/0/image\", \"value\": \"${ECR_REGISTRY}/shogo/shogo-mcp:${{ env.IMAGE_TAG }}\"}
            ]" || echo "MCP service not found, may need terraform apply first"
          else
            echo "⏭️ Skipping mcp (no mcp changes)"
          fi
          
          if [ "$DOCS_CHANGED" = "true" ]; then
            kubectl patch ksvc docs -n ${{ env.NS_SYSTEM }} --type='json' -p="[
              {\"op\": \"replace\", \"path\": \"/spec/template/spec/containers/0/image\", \"value\": \"${ECR_REGISTRY}/shogo/shogo-docs:${{ env.IMAGE_TAG }}\"}
            ]" || echo "Docs service not found, may need terraform apply first"
          else
            echo "⏭️ Skipping docs (no docs changes)"
          fi

      - name: Wait for rollout
        env:
          WEB_CHANGED: ${{ needs.detect-changes.outputs.web_changed }}
          API_CHANGED: ${{ needs.detect-changes.outputs.api_changed }}
          MCP_CHANGED: ${{ needs.detect-changes.outputs.mcp_changed }}
          DOCS_CHANGED: ${{ needs.detect-changes.outputs.docs_changed }}
        run: |
          echo "⏳ Waiting for service rollouts in ${{ env.ENVIRONMENT }}..."
          
          if [ "$WEB_CHANGED" = "true" ]; then
            echo "Waiting for studio rollout..."
            kubectl wait --for=condition=ready ksvc/studio -n ${{ env.NS_SYSTEM }} --timeout=300s || true
          fi
          
          if [ "$API_CHANGED" = "true" ]; then
            echo "Waiting for api rollout..."
            kubectl wait --for=condition=ready ksvc/api -n ${{ env.NS_SYSTEM }} --timeout=300s || true
          fi
          
          if [ "$MCP_CHANGED" = "true" ]; then
            echo "Waiting for mcp rollout..."
            kubectl wait --for=condition=ready ksvc/mcp-workspace -n ${{ env.NS_WORKSPACES }} --timeout=300s || true
          fi
          
          if [ "$DOCS_CHANGED" = "true" ]; then
            echo "Waiting for docs rollout..."
            kubectl wait --for=condition=ready ksvc/docs -n ${{ env.NS_SYSTEM }} --timeout=300s || true
          fi

      - name: Restart image prepuller
        if: needs.detect-changes.outputs.project_runtime_changed == 'true' || needs.detect-changes.outputs.agent_runtime_changed == 'true'
        run: |
          echo "🔄 Restarting image-prepuller to pull new runtime images..."
          kubectl rollout restart daemonset/image-prepuller -n ${{ env.NS_SYSTEM }} || echo "Image prepuller not found, skipping"
          
          echo "⏳ Waiting for image-prepuller rollout..."
          kubectl rollout status daemonset/image-prepuller -n ${{ env.NS_SYSTEM }} --timeout=300s || echo "Prepuller rollout timeout (may still be pulling large image)"

      - name: Verify deployment
        run: |
          echo "=== Knative Services Status (${{ env.NS_SYSTEM }}) ==="
          kubectl get ksvc -n ${{ env.NS_SYSTEM }}
          echo ""
          echo "=== Knative Services Status (${{ env.NS_WORKSPACES }}) ==="
          kubectl get ksvc -n ${{ env.NS_WORKSPACES }}
          echo ""
          echo "=== Domain Mappings ==="
          kubectl get domainmapping -n ${{ env.NS_SYSTEM }}
          echo ""
          echo "=== Pods Status (${{ env.NS_SYSTEM }}) ==="
          kubectl get pods -n ${{ env.NS_SYSTEM }}
          echo ""
          echo "=== Image Prepuller Status ==="
          kubectl get pods -n ${{ env.NS_SYSTEM }} -l app.kubernetes.io/name=image-prepuller -o wide

      - name: Post-deploy health check
        if: env.ENVIRONMENT == 'staging'
        run: |
          echo "=== Post-deploy health checks ==="
          
          # Wait for API to be ready
          echo "Waiting for API health..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://api-staging.shogo.ai/api/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "API healthy (attempt $i)"
              break
            fi
            echo "API not ready ($STATUS), waiting... (attempt $i/30)"
            sleep 10
          done
          
          # Verify warm pool pods are running
          echo ""
          echo "=== Warm Pool Status ==="
          kubectl get ksvc -n ${{ env.NS_WORKSPACES }} -l shogo.io/warm-pool=true 2>/dev/null || echo "No warm pool services found"
          
          # Check for broken services
          echo ""
          echo "=== Broken Services ==="
          BROKEN=$(kubectl get ksvc -n ${{ env.NS_WORKSPACES }} 2>/dev/null | grep "False" | wc -l || echo "0")
          echo "Broken Knative services: $BROKEN"
          if [ "$BROKEN" -gt "5" ]; then
            echo "::warning::$BROKEN Knative services are in failed state"
          fi

      - name: Summary
        env:
          MCP_CHANGED: ${{ needs.detect-changes.outputs.mcp_changed }}
          API_CHANGED: ${{ needs.detect-changes.outputs.api_changed }}
          WEB_CHANGED: ${{ needs.detect-changes.outputs.web_changed }}
          PROJECT_RUNTIME_CHANGED: ${{ needs.detect-changes.outputs.project_runtime_changed }}
          AGENT_RUNTIME_CHANGED: ${{ needs.detect-changes.outputs.agent_runtime_changed }}
          DOCS_CHANGED: ${{ needs.detect-changes.outputs.docs_changed }}
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Environment: \`${{ env.ENVIRONMENT }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Database Migrations" >> $GITHUB_STEP_SUMMARY
          echo "🔄 Migrations run automatically on API container startup" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Services" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          [ "$MCP_CHANGED" = "true" ] && echo "| MCP | 🟢 Deployed \`${{ env.IMAGE_TAG }}\` |" >> $GITHUB_STEP_SUMMARY || echo "| MCP | ⏭️ Skipped (no changes) |" >> $GITHUB_STEP_SUMMARY
          [ "$API_CHANGED" = "true" ] && echo "| API | 🟢 Deployed \`${{ env.IMAGE_TAG }}\` |" >> $GITHUB_STEP_SUMMARY || echo "| API | ⏭️ Skipped (no changes) |" >> $GITHUB_STEP_SUMMARY
          [ "$WEB_CHANGED" = "true" ] && echo "| Web | 🟢 Deployed \`${{ env.IMAGE_TAG }}\` |" >> $GITHUB_STEP_SUMMARY || echo "| Web | ⏭️ Skipped (no changes) |" >> $GITHUB_STEP_SUMMARY
          [ "$PROJECT_RUNTIME_CHANGED" = "true" ] && echo "| Project Runtime | 🟢 Deployed \`${{ env.IMAGE_TAG }}\` |" >> $GITHUB_STEP_SUMMARY || echo "| Project Runtime | ⏭️ Skipped (no changes) |" >> $GITHUB_STEP_SUMMARY
          [ "$AGENT_RUNTIME_CHANGED" = "true" ] && echo "| Agent Runtime | 🟢 Deployed \`${{ env.IMAGE_TAG }}\` |" >> $GITHUB_STEP_SUMMARY || echo "| Agent Runtime | ⏭️ Skipped (no changes) |" >> $GITHUB_STEP_SUMMARY
          [ "$DOCS_CHANGED" = "true" ] && echo "| Docs | 🟢 Deployed \`${{ env.IMAGE_TAG }}\` |" >> $GITHUB_STEP_SUMMARY || echo "| Docs | ⏭️ Skipped (no changes) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Endpoints" >> $GITHUB_STEP_SUMMARY
          echo "- **Studio**: https://${{ env.DOMAIN }}" >> $GITHUB_STEP_SUMMARY
          echo "- **API**: https://${{ env.DOMAIN }}/api" >> $GITHUB_STEP_SUMMARY
          echo "- **MCP**: https://${{ env.MCP_DOMAIN }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Docs**: https://${{ env.DOCS_DOMAIN }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Cluster" >> $GITHUB_STEP_SUMMARY
          echo "- **EKS Cluster**: \`${{ env.EKS_CLUSTER }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **System Namespace**: \`${{ env.NS_SYSTEM }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Workspaces Namespace**: \`${{ env.NS_WORKSPACES }}\`" >> $GITHUB_STEP_SUMMARY
