# =============================================================================
# E2E — Test User Cleanup
# =============================================================================
# Drains Playwright test users (e2e-*@mailnull.com) older than 7 days
# from the target environment's database. Runs nightly at 09:00 UTC
# (right after e2e-hosted) so each run's fresh accounts get ~24h before
# being swept.
#
# Can also be triggered on demand via workflow_dispatch with a chosen
# target and --execute toggle.
# =============================================================================

name: E2E Cleanup

on:
  schedule:
    - cron: '0 9 * * *' # 09:00 UTC nightly (after e2e-hosted at 08:00)
  workflow_dispatch:
    inputs:
      target:
        description: 'Target environment'
        type: choice
        required: true
        default: staging
        options:
          - staging
          - production-us
          - production-eu
          - production-india
      execute:
        description: 'Actually delete (off = dry-run)'
        type: boolean
        required: false
        default: false
      olderThanDays:
        description: 'Minimum age in days for user rows'
        type: string
        required: false
        default: '7'

permissions: {}

concurrency:
  group: e2e-cleanup-${{ github.event.inputs.target || 'staging' }}
  cancel-in-progress: false

jobs:
  cleanup:
    name: Cleanup (${{ github.event.inputs.target || 'staging' }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    # Use the regional GitHub Actions environment so DATABASE_URL is
    # pulled from the right secret store.
    environment: ${{ github.event.inputs.target || 'staging' }}

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Cache bun dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.bun/install/cache
          key: bun-cleanup-${{ hashFiles('bun.lock') }}
          restore-keys: bun-cleanup-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Run cleanup (dry-run by default)
        run: >
          bun scripts/cleanup-e2e-test-users.ts
          --older-than-days ${{ github.event.inputs.olderThanDays || '7' }}
          ${{ github.event.inputs.execute == 'true' && '--execute' || '' }}
