# =============================================================================
# Android Build & Update Pipeline
# =============================================================================
# Environments:
#   staging    — push to main branch (auto OTA to staging channel)
#   production — push v* (unified release tag, e.g. v1.0.0) or android-v* (Android-only)
#                or manual dispatch with environment=production
#
# Automatic (push to main):
#   - Resolves native fingerprint to detect if native deps changed
#   - If fingerprint matches the last successful build → OTA update (eas update)
#   - If fingerprint changed → full native build (expo prebuild + Gradle)
#
# Manual (workflow_dispatch):
#   mode=full → fingerprint check, then build or OTA, with Play Store submit
#   mode=ota  → fingerprint check, OTA update only (skips build)
#   environment=staging|production → controls OTA branch + build channel
#   Production builds always auto-submit to production track on Google Play.
#   Staging builds submit to internal track (can be toggled off with submit=false).
#
# Both build and OTA run on the same GitHub runner environment, so the
# fingerprint hash is always consistent (no EAS server mismatch).
# Fingerprint caches are per-environment so staging and production are independent.
#
# Required GitHub Secrets:
#   EXPO_TOKEN                  - Expo token for eas update / eas submit
#   KEYSTORE_BASE64             - Base64-encoded Android release signing keystore
#   KEYSTORE_PASSWORD           - Keystore password
#   KEY_ALIAS                   - Key alias within the keystore
#   KEY_PASSWORD                - Key password
#   GOOGLE_SERVICES_JSON_BASE64 - Base64-encoded Play Store service account key
# =============================================================================

name: Android Build & Update

on:
  push:
    branches:
      - main
    tags:
      - 'android-v*'
      - 'v[0-9]*'
    paths:
      - 'apps/mobile/**'
      - 'packages/domain-stores/**'
      - 'packages/shared-app/**'
      - 'packages/shared-ui/**'
      - 'packages/ui-kit/**'
      - 'packages/sdk/**'
  workflow_dispatch:
    inputs:
      mode:
        description: 'full = build or OTA + submit · ota = OTA update only'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - ota
      environment:
        description: 'Target environment (staging or production)'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      submit:
        description: 'Submit to Play Store — full mode only (staging→internal, production→production track)'
        required: false
        default: true
        type: boolean

jobs:
  # ===========================================================================
  # Check if native code changed
  # ===========================================================================
  check-fingerprint:
    name: Check Native Fingerprint
    runs-on: ubuntu-latest
    outputs:
      needs_build: ${{ steps.decide.outputs.needs_build }}
      runtime_version: ${{ steps.fingerprint.outputs.runtime_version }}
      environment: ${{ steps.resolve-env.outputs.environment }}
      app_version: ${{ steps.resolve-version.outputs.version }}

    steps:
      - name: Resolve environment
        id: resolve-env
        run: |
          if [ -n "${{ github.event.inputs.environment }}" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [[ "${{ github.ref }}" =~ ^refs/tags/(android-v|v[0-9]) ]]; then
            ENV="production"
          elif [ "${{ github.ref_name }}" = "main" ]; then
            ENV="staging"
          else
            ENV="staging"
          fi
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "Resolved environment: $ENV"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve app version from tag
        id: resolve-version
        run: |
          VERSION=$(node -p "JSON.parse(require('fs').readFileSync('apps/mobile/app.json','utf8')).expo.version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Using app.json version: $VERSION"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install

      - name: Resolve fingerprint
        id: fingerprint
        working-directory: apps/mobile
        run: |
          RAW=$(npx expo-updates runtimeversion:resolve --platform android 2>/dev/null || echo "")

          if [ -z "$RAW" ]; then
            echo "Could not resolve runtime version"
            echo "runtime_version=unknown" >> $GITHUB_OUTPUT
          else
            RUNTIME_VERSION=$(echo "$RAW" | sha256sum | cut -d' ' -f1)
            echo "Raw output: $RAW"
            echo "Fingerprint hash: $RUNTIME_VERSION"
            echo "runtime_version=$RUNTIME_VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Restore cached fingerprint
        if: steps.fingerprint.outputs.runtime_version != 'unknown'
        id: cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .fingerprint-android
          key: android-fingerprint-${{ steps.resolve-env.outputs.environment }}-${{ steps.fingerprint.outputs.runtime_version }}

      # NOTE: cache is only saved from the build job after a SUCCESSFUL AAB build.
      # Seeding here previously caused failed builds to poison the cache and force
      # unintended OTA updates on subsequent runs at the same fingerprint.

      - name: Determine if build is needed
        id: decide
        run: |
          if [[ "${{ github.ref }}" =~ ^refs/tags/(android-v|v[0-9]) ]]; then
            echo "Tag push (${{ github.ref_name }}) → release event, forcing full build + submit"
            echo "needs_build=true" >> $GITHUB_OUTPUT
          elif [ "${{ steps.fingerprint.outputs.runtime_version }}" = "unknown" ]; then
            echo "Could not resolve fingerprint → forcing full build"
            echo "needs_build=true" >> $GITHUB_OUTPUT
          elif [ "${{ steps.cache.outputs.cache-hit }}" = "true" ]; then
            echo "Fingerprint cached from a previous successful build → OTA update only"
            echo "needs_build=false" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.inputs.mode }}" = "ota" ]; then
            echo "OTA mode: trusting no native changes"
            echo "needs_build=false" >> $GITHUB_OUTPUT
          else
            echo "New fingerprint → full build required"
            echo "needs_build=true" >> $GITHUB_OUTPUT
          fi

  # ===========================================================================
  # OTA Update — JS/asset changes only (no native changes)
  # ===========================================================================
  update:
    name: EAS Update (OTA)
    runs-on: ubuntu-latest
    needs: check-fingerprint
    if: >
      needs.check-fingerprint.result == 'success' &&
      needs.check-fingerprint.outputs.needs_build == 'false'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install

      - name: Sync app version
        working-directory: apps/mobile
        run: |
          node -e "
            const fs = require('fs');
            const appJson = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            const newVersion = '${{ needs.check-fingerprint.outputs.app_version }}';
            if (newVersion && appJson.expo.version !== newVersion) {
              console.log('Syncing version: ' + appJson.expo.version + ' → ' + newVersion);
              appJson.expo.version = newVersion;
              fs.writeFileSync('app.json', JSON.stringify(appJson, null, 2) + '\n');
            } else {
              console.log('Version already matches: ' + appJson.expo.version);
            }
          "

      - name: Build workspace packages
        run: bun run build

      - name: Setup EAS
        uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e # v8.2.1
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Resolve API URL for environment
        id: api-url
        run: |
          if [ "${{ needs.check-fingerprint.outputs.environment }}" = "production" ]; then
            echo "url=https://studio.shogo.ai" >> $GITHUB_OUTPUT
          else
            echo "url=https://studio.staging.shogo.ai" >> $GITHUB_OUTPUT
          fi

      - name: Publish OTA update
        working-directory: apps/mobile
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message || format('Manual OTA from {0}', github.sha) }}
          EXPO_PUBLIC_API_URL: ${{ steps.api-url.outputs.url }}
          EXPO_PUBLIC_APP_ENV: ${{ needs.check-fingerprint.outputs.environment }}_app
          EXPO_PUBLIC_SENTRY_DSN_ANDROID: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN_ANDROID }}
          # Becomes the `release` tag for every Sentry event captured from
          # this OTA bundle (see apps/mobile/app/_layout.tsx). Without it
          # everything collapses into the `dev` release and sourcemaps never
          # match.
          EXPO_PUBLIC_BUILD_HASH: ${{ github.sha }}
        run: |
          SUBJECT=$(printf '%s' "$COMMIT_MSG" | head -n1)
          eas update \
            --branch ${{ needs.check-fingerprint.outputs.environment }} \
            --message "$SUBJECT" \
            --non-interactive

      - name: Upload OTA sourcemaps to Sentry (optional, non-fatal)
        # Re-bundles the Android JS app with `expo export:embed` (same Metro
        # invocation EAS uses internally) and uploads the bundle + map to
        # Sentry under the SHA we baked in above. dist=`android` keeps it
        # disjoint from the iOS upload at the same SHA.
        #
        # Non-fatal: a Sentry misconfiguration must not block an OTA roll-out.
        working-directory: apps/mobile
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: shogo-ai
          SENTRY_PROJECT: shogo-android
          SENTRY_LOG_LEVEL: info
          EXPO_PUBLIC_API_URL: ${{ steps.api-url.outputs.url }}
          EXPO_PUBLIC_APP_ENV: ${{ needs.check-fingerprint.outputs.environment }}_app
          EXPO_PUBLIC_SENTRY_DSN_ANDROID: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN_ANDROID }}
          EXPO_PUBLIC_BUILD_HASH: ${{ github.sha }}
        run: |
          set +e
          if [ -z "$SENTRY_AUTH_TOKEN" ]; then
            echo "::notice title=Sentry sourcemap upload (Android OTA)::SENTRY_AUTH_TOKEN secret not configured — skipping."
            exit 0
          fi
          BUNDLE_DIR="$RUNNER_TEMP/ota-android-bundle"
          mkdir -p "$BUNDLE_DIR"
          bunx expo export:embed \
            --platform android \
            --dev false \
            --reset-cache \
            --bundle-output "$BUNDLE_DIR/index.android.bundle" \
            --sourcemap-output "$BUNDLE_DIR/index.android.bundle.map" \
            --assets-dest "$BUNDLE_DIR/assets" \
            --entry-file apps/mobile/index.js
          EXPORT_RC=$?
          if [ "$EXPORT_RC" -ne 0 ]; then
            echo "::warning title=Sentry sourcemap upload (Android OTA)::expo export:embed exited $EXPORT_RC — skipping upload."
            exit 0
          fi
          SENTRY_CLI="./node_modules/.bin/sentry-cli"
          [ -x "$SENTRY_CLI" ] || SENTRY_CLI="bunx @sentry/cli"
          # `--ext bundle --ext map` is required because RN's Android bundle
          # extension (`.bundle`) isn't part of sentry-cli's default file
          # filter — without it, inject/upload would silently skip the
          # bundle and only ship the map (and Sentry would refuse to match).
          $SENTRY_CLI sourcemaps inject --release "$EXPO_PUBLIC_BUILD_HASH" \
            --ext bundle --ext map "$BUNDLE_DIR"
          $SENTRY_CLI sourcemaps upload \
            --release "$EXPO_PUBLIC_BUILD_HASH" \
            --dist android \
            --ext bundle --ext map \
            --strip-prefix "$GITHUB_WORKSPACE" \
            "$BUNDLE_DIR"
          UPLOAD_RC=$?
          if [ "$UPLOAD_RC" -ne 0 ]; then
            echo "::warning title=Sentry sourcemap upload (Android OTA)::sentry-cli exited $UPLOAD_RC — release continuing without symbolication."
          fi
          exit 0

      - name: Summary
        run: |
          echo "## OTA Update Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ needs.check-fingerprint.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ needs.check-fingerprint.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Runtime Version:** ${{ needs.check-fingerprint.outputs.runtime_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Sentry release:** \`${{ github.sha }}\` (dist=\`android\`)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Devices running a ${{ needs.check-fingerprint.outputs.environment }} build will receive this update automatically." >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Full Native Build — native deps changed (not used in ota mode)
  # Uses expo prebuild + Gradle instead of EAS Build so the fingerprint
  # stays consistent with the OTA update environment.
  # ===========================================================================
  build:
    name: Android Build (Gradle)
    runs-on: ubuntu-latest
    needs: check-fingerprint
    if: >
      needs.check-fingerprint.outputs.needs_build == 'true' &&
      github.event.inputs.mode != 'ota'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve API URL for environment
        id: api-url
        run: |
          if [ "${{ needs.check-fingerprint.outputs.environment }}" = "production" ]; then
            echo "url=https://studio.shogo.ai" >> $GITHUB_OUTPUT
          else
            echo "url=https://studio.staging.shogo.ai" >> $GITHUB_OUTPUT
          fi
          echo "Resolved API URL for ${{ needs.check-fingerprint.outputs.environment }}: $(grep url= $GITHUB_OUTPUT | tail -1)"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.11

      - name: Cache bun dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-

      - name: Install dependencies
        run: bun install

      - name: Build workspace packages
        run: bun run build

      - name: Setup Java 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2

      - name: Cache Gradle dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('apps/mobile/android/gradle/wrapper/gradle-wrapper.properties') }}-${{ hashFiles('apps/mobile/android/**/build.gradle') }}
          restore-keys: gradle-

      - name: Setup EAS
        uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e # v8.2.1
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Sync app version and versionCode
        working-directory: apps/mobile
        env:
          VERSION_CODE_OFFSET: 100
        run: |
          node -e "
            const fs = require('fs');
            const appJson = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            const newVersion = '${{ needs.check-fingerprint.outputs.app_version }}';
            if (newVersion && appJson.expo.version !== newVersion) {
              console.log('Syncing version: ' + appJson.expo.version + ' → ' + newVersion);
              appJson.expo.version = newVersion;
            }
            const versionCode = ${{ github.run_number }} + parseInt(process.env.VERSION_CODE_OFFSET);
            appJson.expo.android.versionCode = versionCode;
            fs.writeFileSync('app.json', JSON.stringify(appJson, null, 2) + '\n');
            console.log('Set version=' + appJson.expo.version + ' versionCode=' + versionCode);
          "

      - name: Expo Prebuild
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_UPDATES_CHANNEL: ${{ needs.check-fingerprint.outputs.environment }}
          EXPO_PUBLIC_API_URL: ${{ steps.api-url.outputs.url }}
          EXPO_PUBLIC_APP_ENV: ${{ needs.check-fingerprint.outputs.environment }}_app
          EXPO_PUBLIC_SENTRY_DSN_ANDROID: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN_ANDROID }}
          EXPO_PUBLIC_BUILD_HASH: ${{ github.sha }}

      - name: Tune Gradle for CI
        working-directory: apps/mobile/android
        run: |
          cat >> gradle.properties <<'PROPS'
          org.gradle.parallel=true
          org.gradle.caching=true
          org.gradle.configureondemand=true
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError
          ksp.incremental=false
          PROPS

      - name: Verify signing secrets
        run: |
          [ -z "$KEYSTORE_PASSWORD" ] && echo "::error::KEYSTORE_PASSWORD is empty!" && exit 1
          [ -z "$KEY_PASSWORD" ] && echo "::error::KEY_PASSWORD is empty!" && exit 1
          [ -z "$KEY_ALIAS" ] && echo "::error::KEY_ALIAS is empty!" && exit 1
          [ -z "$KEYSTORE_BASE64" ] && echo "::error::KEYSTORE_BASE64 is empty!" && exit 1
          echo "KEYSTORE_PASSWORD length: ${#KEYSTORE_PASSWORD}"
          echo "KEY_PASSWORD length: ${#KEY_PASSWORD}"
          echo "KEY_ALIAS value: $KEY_ALIAS"
          echo "KEYSTORE_BASE64 length: ${#KEYSTORE_BASE64}"
          echo "All signing secrets are set"
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Decode signing keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > apps/mobile/android/app/release.keystore

      - name: Inject release signing config
        working-directory: apps/mobile/android/app
        run: |
          sed -i '/android {/a \
              signingConfigs {\
                  release {\
                      storeFile file("release.keystore")\
                      storePassword System.getenv("KEYSTORE_PASSWORD")\
                      keyAlias System.getenv("KEY_ALIAS")\
                      keyPassword System.getenv("KEY_PASSWORD")\
                  }\
              }' build.gradle

          sed -i 's/signingConfig signingConfigs.debug/signingConfig signingConfigs.release/' build.gradle

          sed -i '/defaultConfig {/a\
                  ndk {\
                      abiFilters "armeabi-v7a", "arm64-v8a"\
                  }' build.gradle

      - name: Ensure Sentry CLI binary
        working-directory: apps/mobile
        run: |
          SENTRY_CLI="node_modules/@sentry/cli/bin/sentry-cli"
          if [ -x "$SENTRY_CLI" ] && "$SENTRY_CLI" --version 2>/dev/null; then
            echo "Sentry CLI binary works"
          else
            echo "Sentry CLI binary missing or broken, creating no-op stub..."
            mkdir -p "$(dirname "$SENTRY_CLI")"
            printf '#!/bin/bash\necho "sentry-cli stub: skipping upload"\nexit 0\n' > "$SENTRY_CLI"
            chmod +x "$SENTRY_CLI"
            echo "Stub created at $SENTRY_CLI"
            "$SENTRY_CLI" --version
          fi

      - name: Build AAB
        working-directory: apps/mobile/android
        run: ./gradlew bundleRelease -x lintVitalAnalyzeRelease -x lintVitalRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          EXPO_PUBLIC_API_URL: ${{ steps.api-url.outputs.url }}
          EXPO_PUBLIC_APP_ENV: ${{ needs.check-fingerprint.outputs.environment }}_app
          EXPO_PUBLIC_SENTRY_DSN_ANDROID: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN_ANDROID }}
          # Sentry release tag that gets baked into the JS bundle inside the
          # AAB. Must match the release we upload sourcemaps for below.
          EXPO_PUBLIC_BUILD_HASH: ${{ github.sha }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Upload JS sourcemaps to Sentry (optional, non-fatal)
        # The Sentry-injected Gradle bundle task is replaced with a no-op
        # stub above ("Ensure Sentry CLI binary"), so the AAB ships without
        # debug-id-stamped JS. We re-run Metro post-build to regenerate the
        # bundle + packager map, compose with the Hermes bytecode map (which
        # `bundleRelease` already produced), and upload to Sentry.
        #
        # Without this, Android stack frames for native release `${SHA}`
        # arrive as fully-minified `index.android.bundle 1:NNNNN` columns
        # in events — see Sentry JAVASCRIPT-REACT-K (Worklets initialization
        # fatal) for an example we couldn't symbolicate without it.
        #
        # Non-fatal: same rationale as the iOS dSYM step.
        working-directory: apps/mobile
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: shogo-ai
          SENTRY_PROJECT: shogo-android
          SENTRY_LOG_LEVEL: info
          EXPO_PUBLIC_API_URL: ${{ steps.api-url.outputs.url }}
          EXPO_PUBLIC_APP_ENV: ${{ needs.check-fingerprint.outputs.environment }}_app
          EXPO_PUBLIC_SENTRY_DSN_ANDROID: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN_ANDROID }}
          EXPO_PUBLIC_BUILD_HASH: ${{ github.sha }}
        run: |
          set +e
          if [ -z "$SENTRY_AUTH_TOKEN" ]; then
            echo "::notice title=Sentry sourcemap upload (Android)::SENTRY_AUTH_TOKEN secret not configured — skipping."
            {
              echo "## Sentry sourcemap upload (Android)"
              echo ""
              echo "_Skipped — \`SENTRY_AUTH_TOKEN\` secret not configured._"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # 1. Regenerate bundle + Metro packager map (the Gradle build's
          #    intermediate artifacts get cleaned by gradle on subsequent
          #    invocations, and the Sentry stub means none of them have
          #    debug-ids anyway — easier to redo than to scavenge).
          BUNDLE_DIR="$RUNNER_TEMP/android-bundle"
          mkdir -p "$BUNDLE_DIR"
          bunx expo export:embed \
            --platform android \
            --dev false \
            --reset-cache \
            --bundle-output "$BUNDLE_DIR/index.android.bundle" \
            --sourcemap-output "$BUNDLE_DIR/index.android.bundle.packager.map" \
            --assets-dest "$BUNDLE_DIR/assets" \
            --entry-file apps/mobile/index.js
          EXPORT_RC=$?
          if [ "$EXPORT_RC" -ne 0 ]; then
            echo "::warning title=Sentry sourcemap upload (Android)::expo export:embed exited $EXPORT_RC — skipping upload."
            {
              echo "## Sentry sourcemap upload (Android)"
              echo ""
              echo "_Skipped — \`expo export:embed\` exited $EXPORT_RC._"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # 2. If Hermes is enabled (the project default for RN 0.81), the
          #    Gradle build produced an `index.android.bundle.hbc.map` that
          #    maps Hermes bytecode columns -> packager-map columns. Compose
          #    it with the packager map from step 1 to get a single
          #    bytecode-to-source map that Sentry can consume directly.
          HBC_MAP=$(find android/app/build/generated/sourcemaps -name 'index.android.bundle.hbc.map' | head -1)
          MAP_TO_UPLOAD="$BUNDLE_DIR/index.android.bundle.map"
          if [ -n "$HBC_MAP" ] && [ -f "$HBC_MAP" ]; then
            echo "Composing packager map + Hermes bytecode map: $HBC_MAP"
            node ./node_modules/react-native/scripts/compose-source-maps.js \
              "$BUNDLE_DIR/index.android.bundle.packager.map" \
              "$HBC_MAP" \
              -o "$MAP_TO_UPLOAD"
            COMPOSE_RC=$?
            if [ "$COMPOSE_RC" -ne 0 ]; then
              echo "::warning title=Sentry sourcemap upload (Android)::compose-source-maps.js exited $COMPOSE_RC; falling back to packager map."
              cp "$BUNDLE_DIR/index.android.bundle.packager.map" "$MAP_TO_UPLOAD"
            fi
          else
            echo "Hermes hbc.map not found — uploading raw packager map (assumes JSC, not Hermes)."
            cp "$BUNDLE_DIR/index.android.bundle.packager.map" "$MAP_TO_UPLOAD"
          fi
          rm -f "$BUNDLE_DIR/index.android.bundle.packager.map"

          SENTRY_CLI="./node_modules/.bin/sentry-cli"
          [ -x "$SENTRY_CLI" ] || SENTRY_CLI="bunx @sentry/cli"
          # See android.yml OTA step for the `--ext bundle` rationale.
          $SENTRY_CLI sourcemaps inject --release "$EXPO_PUBLIC_BUILD_HASH" \
            --ext bundle --ext map "$BUNDLE_DIR"
          $SENTRY_CLI sourcemaps upload \
            --release "$EXPO_PUBLIC_BUILD_HASH" \
            --dist android \
            --ext bundle --ext map \
            --strip-prefix "$GITHUB_WORKSPACE" \
            "$BUNDLE_DIR"
          UPLOAD_RC=$?
          if [ "$UPLOAD_RC" -eq 0 ]; then
            {
              echo "## Sentry sourcemap upload (Android)"
              echo ""
              echo "Uploaded JS bundle + composed sourcemap to Sentry (release=\`$EXPO_PUBLIC_BUILD_HASH\`, dist=\`android\`)."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning title=Sentry sourcemap upload (Android)::sentry-cli exited $UPLOAD_RC — release continuing."
            {
              echo "## Sentry sourcemap upload (Android)"
              echo ""
              echo "_Failed (sentry-cli exit $UPLOAD_RC)._"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          exit 0

      - name: Upload AAB artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: app-release.aab
          path: apps/mobile/android/app/build/outputs/bundle/release/app-release.aab

      - name: Save fingerprint to cache
        run: |
          RUNTIME_VERSION="${{ needs.check-fingerprint.outputs.runtime_version }}"
          if [ -z "$RUNTIME_VERSION" ] || [ "$RUNTIME_VERSION" = "unknown" ]; then
            RAW=$(cd apps/mobile && npx expo-updates runtimeversion:resolve --platform android 2>/dev/null || echo "manual-build")
            RUNTIME_VERSION=$(echo "$RAW" | sha256sum | cut -d' ' -f1)
          fi
          echo "$RUNTIME_VERSION" > .fingerprint-android

      - name: Cache fingerprint
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .fingerprint-android
          key: android-fingerprint-${{ needs.check-fingerprint.outputs.environment }}-${{ needs.check-fingerprint.outputs.runtime_version || 'manual' }}

      - name: Resolve submit decision
        id: submit-decision
        run: |
          ENV="${{ needs.check-fingerprint.outputs.environment }}"
          SUBMIT_INPUT="${{ github.event.inputs.submit }}"
          if [ "$ENV" = "production" ]; then
            echo "should_submit=true" >> $GITHUB_OUTPUT
            echo "track=production" >> $GITHUB_OUTPUT
            echo "Production build → always submitting to production track"
          elif [ "$SUBMIT_INPUT" != "false" ]; then
            echo "should_submit=true" >> $GITHUB_OUTPUT
            echo "track=internal" >> $GITHUB_OUTPUT
            echo "Staging build → submitting to internal track"
          else
            echo "should_submit=false" >> $GITHUB_OUTPUT
            echo "track=none" >> $GITHUB_OUTPUT
            echo "Submit skipped by user"
          fi

      - name: Decode Google service account key
        if: steps.submit-decision.outputs.should_submit == 'true'
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > apps/mobile/google-services.json

      - name: Submit to Play Store
        if: steps.submit-decision.outputs.should_submit == 'true'
        working-directory: apps/mobile
        run: |
          echo "Submitting to ${{ steps.submit-decision.outputs.track }} track via profile ${{ needs.check-fingerprint.outputs.environment }}"
          eas submit \
            --platform android \
            --profile ${{ needs.check-fingerprint.outputs.environment }} \
            --path ./android/app/build/outputs/bundle/release/app-release.aab \
            --non-interactive

      - name: Summary
        run: |
          echo "## Android Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ needs.check-fingerprint.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Channel:** ${{ needs.check-fingerprint.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **versionCode:** ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Submit:** ${{ steps.submit-decision.outputs.should_submit == 'true' && format('Play Store ({0} track)', steps.submit-decision.outputs.track) || 'Skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "AAB is available as a workflow artifact." >> $GITHUB_STEP_SUMMARY

          
# Staging OTA
# gh workflow run android.yml --ref android-build -f mode=ota -f environment=staging

# Staging full build + submit
# gh workflow run android.yml --ref staging -f mode=full -f environment=staging

# Production OTA
# gh workflow run android.yml --ref main -f mode=ota -f environment=production

# Production full build + submit
# gh workflow run android.yml --ref main -f mode=full -f environment=production

# Full build, skip Play Store submit
# gh workflow run android.yml --ref staging -f mode=full -f environment=staging -f submit=false