# =============================================================================
# Android Build & Update Pipeline
# =============================================================================
# Environments:
#   staging    — push to main branch (auto OTA to staging channel)
#   production — push android-v* tag or manual dispatch with environment=production
#
# Automatic (push to main):
#   - Resolves native fingerprint to detect if native deps changed
#   - If fingerprint matches the last successful build → OTA update (eas update)
#   - If fingerprint changed → full native build (expo prebuild + Gradle)
#
# Manual (workflow_dispatch):
#   mode=full → fingerprint check, then build or OTA, with Play Store submit
#   mode=ota  → fingerprint check, OTA update only (skips build)
#   environment=staging|production → controls OTA branch + build channel
#   Production builds always auto-submit to production track on Google Play.
#   Staging builds submit to internal track (can be toggled off with submit=false).
#
# Both build and OTA run on the same GitHub runner environment, so the
# fingerprint hash is always consistent (no EAS server mismatch).
# Fingerprint caches are per-environment so staging and production are independent.
#
# Required GitHub Secrets:
#   EXPO_TOKEN                  - Expo token for eas update / eas submit
#   KEYSTORE_BASE64             - Base64-encoded Android release signing keystore
#   KEYSTORE_PASSWORD           - Keystore password
#   KEY_ALIAS                   - Key alias within the keystore
#   KEY_PASSWORD                - Key password
#   GOOGLE_SERVICES_JSON_BASE64 - Base64-encoded Play Store service account key
# =============================================================================

name: Android Build & Update

on:
  push:
    branches:
      - main
    tags:
      - 'android-v*'
    paths:
      - 'apps/mobile/**'
      - 'packages/domain-stores/**'
      - 'packages/shared-app/**'
      - 'packages/shared-ui/**'
      - 'packages/ui-kit/**'
      - 'packages/sdk/**'
  workflow_dispatch:
    inputs:
      mode:
        description: 'full = build or OTA + submit · ota = OTA update only'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - ota
      environment:
        description: 'Target environment (staging or production)'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      submit:
        description: 'Submit to Play Store — full mode only (staging→internal, production→production track)'
        required: false
        default: true
        type: boolean

jobs:
  # ===========================================================================
  # Check if native code changed
  # ===========================================================================
  check-fingerprint:
    name: Check Native Fingerprint
    runs-on: ubuntu-latest
    outputs:
      needs_build: ${{ steps.decide.outputs.needs_build }}
      runtime_version: ${{ steps.fingerprint.outputs.runtime_version }}
      environment: ${{ steps.resolve-env.outputs.environment }}
      app_version: ${{ steps.resolve-version.outputs.version }}

    steps:
      - name: Resolve environment
        id: resolve-env
        run: |
          if [ -n "${{ github.event.inputs.environment }}" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [[ "${{ github.ref }}" == refs/tags/android-v* ]]; then
            ENV="production"
          elif [ "${{ github.ref_name }}" = "main" ]; then
            ENV="staging"
          else
            ENV="staging"
          fi
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "Resolved environment: $ENV"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve app version from tag
        id: resolve-version
        run: |
          VERSION=$(node -p "JSON.parse(require('fs').readFileSync('apps/mobile/app.json','utf8')).expo.version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Using app.json version: $VERSION"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Resolve fingerprint
        id: fingerprint
        working-directory: apps/mobile
        run: |
          RAW=$(npx expo-updates runtimeversion:resolve --platform android 2>/dev/null || echo "")

          if [ -z "$RAW" ]; then
            echo "Could not resolve runtime version"
            echo "runtime_version=unknown" >> $GITHUB_OUTPUT
          else
            RUNTIME_VERSION=$(echo "$RAW" | sha256sum | cut -d' ' -f1)
            echo "Raw output: $RAW"
            echo "Fingerprint hash: $RUNTIME_VERSION"
            echo "runtime_version=$RUNTIME_VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Restore cached fingerprint
        if: steps.fingerprint.outputs.runtime_version != 'unknown'
        id: cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .fingerprint-android
          key: android-fingerprint-${{ steps.resolve-env.outputs.environment }}-${{ steps.fingerprint.outputs.runtime_version }}

      - name: Seed cache if missing
        if: steps.cache.outputs.cache-hit != 'true' && steps.fingerprint.outputs.runtime_version != 'unknown'
        run: echo "${{ steps.fingerprint.outputs.runtime_version }}" > .fingerprint-android

      - name: Save fingerprint cache
        if: steps.cache.outputs.cache-hit != 'true' && steps.fingerprint.outputs.runtime_version != 'unknown'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .fingerprint-android
          key: android-fingerprint-${{ steps.resolve-env.outputs.environment }}-${{ steps.fingerprint.outputs.runtime_version }}

      - name: Determine if build is needed
        id: decide
        run: |
          if [ "${{ steps.fingerprint.outputs.runtime_version }}" = "unknown" ]; then
            echo "Could not resolve fingerprint → forcing full build"
            echo "needs_build=true" >> $GITHUB_OUTPUT
          elif [ "${{ steps.cache.outputs.cache-hit }}" = "true" ]; then
            echo "Fingerprint cached from previous build → OTA update only"
            echo "needs_build=false" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.inputs.mode }}" = "ota" ]; then
            echo "OTA mode: trusting no native changes, seeding cache"
            echo "needs_build=false" >> $GITHUB_OUTPUT
          else
            echo "New fingerprint → full build required"
            echo "needs_build=true" >> $GITHUB_OUTPUT
          fi

  # ===========================================================================
  # OTA Update — JS/asset changes only (no native changes)
  # ===========================================================================
  update:
    name: EAS Update (OTA)
    runs-on: ubuntu-latest
    needs: check-fingerprint
    if: >
      needs.check-fingerprint.result == 'success' &&
      needs.check-fingerprint.outputs.needs_build == 'false'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Sync app version
        working-directory: apps/mobile
        run: |
          node -e "
            const fs = require('fs');
            const appJson = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            const newVersion = '${{ needs.check-fingerprint.outputs.app_version }}';
            if (newVersion && appJson.expo.version !== newVersion) {
              console.log('Syncing version: ' + appJson.expo.version + ' → ' + newVersion);
              appJson.expo.version = newVersion;
              fs.writeFileSync('app.json', JSON.stringify(appJson, null, 2) + '\n');
            } else {
              console.log('Version already matches: ' + appJson.expo.version);
            }
          "

      - name: Build workspace packages
        run: bun run build

      - name: Setup EAS
        uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e # v8.2.1
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Resolve API URL for environment
        id: api-url
        run: |
          if [ "${{ needs.check-fingerprint.outputs.environment }}" = "production" ]; then
            echo "url=https://studio.shogo.ai" >> $GITHUB_OUTPUT
          else
            echo "url=https://studio.staging.shogo.ai" >> $GITHUB_OUTPUT
          fi

      - name: Publish OTA update
        working-directory: apps/mobile
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message || format('Manual OTA from {0}', github.sha) }}
          EXPO_PUBLIC_API_URL: ${{ steps.api-url.outputs.url }}
          EXPO_PUBLIC_APP_ENV: ${{ needs.check-fingerprint.outputs.environment }}_app
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
        run: |
          SUBJECT=$(printf '%s' "$COMMIT_MSG" | head -n1)
          eas update \
            --branch ${{ needs.check-fingerprint.outputs.environment }} \
            --message "$SUBJECT" \
            --non-interactive

      - name: Summary
        run: |
          echo "## OTA Update Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ needs.check-fingerprint.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ needs.check-fingerprint.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Runtime Version:** ${{ needs.check-fingerprint.outputs.runtime_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Devices running a ${{ needs.check-fingerprint.outputs.environment }} build will receive this update automatically." >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Full Native Build — native deps changed (not used in ota mode)
  # Uses expo prebuild + Gradle instead of EAS Build so the fingerprint
  # stays consistent with the OTA update environment.
  # ===========================================================================
  build:
    name: Android Build (Gradle)
    runs-on: ubuntu-latest
    needs: check-fingerprint
    if: >
      needs.check-fingerprint.outputs.needs_build == 'true' &&
      github.event.inputs.mode != 'ota'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve API URL for environment
        id: api-url
        run: |
          if [ "${{ needs.check-fingerprint.outputs.environment }}" = "production" ]; then
            echo "url=https://studio.shogo.ai" >> $GITHUB_OUTPUT
          else
            echo "url=https://studio.staging.shogo.ai" >> $GITHUB_OUTPUT
          fi
          echo "Resolved API URL for ${{ needs.check-fingerprint.outputs.environment }}: $(grep url= $GITHUB_OUTPUT | tail -1)"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-

      - name: Install dependencies
        run: bun install

      - name: Build workspace packages
        run: bun run build

      - name: Setup Java 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2

      - name: Cache Gradle dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('apps/mobile/android/gradle/wrapper/gradle-wrapper.properties') }}-${{ hashFiles('apps/mobile/android/**/build.gradle') }}
          restore-keys: gradle-

      - name: Setup EAS
        uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e # v8.2.1
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Sync app version and versionCode
        working-directory: apps/mobile
        env:
          VERSION_CODE_OFFSET: 100
        run: |
          node -e "
            const fs = require('fs');
            const appJson = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            const newVersion = '${{ needs.check-fingerprint.outputs.app_version }}';
            if (newVersion && appJson.expo.version !== newVersion) {
              console.log('Syncing version: ' + appJson.expo.version + ' → ' + newVersion);
              appJson.expo.version = newVersion;
            }
            const versionCode = ${{ github.run_number }} + parseInt(process.env.VERSION_CODE_OFFSET);
            appJson.expo.android.versionCode = versionCode;
            fs.writeFileSync('app.json', JSON.stringify(appJson, null, 2) + '\n');
            console.log('Set version=' + appJson.expo.version + ' versionCode=' + versionCode);
          "

      - name: Expo Prebuild
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_UPDATES_CHANNEL: ${{ needs.check-fingerprint.outputs.environment }}
          EXPO_PUBLIC_API_URL: ${{ steps.api-url.outputs.url }}
          EXPO_PUBLIC_APP_ENV: ${{ needs.check-fingerprint.outputs.environment }}_app
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}

      - name: Tune Gradle for CI
        working-directory: apps/mobile/android
        run: |
          cat >> gradle.properties <<'PROPS'
          org.gradle.parallel=true
          org.gradle.caching=true
          org.gradle.configureondemand=true
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError
          ksp.incremental=false
          PROPS

      - name: Verify signing secrets
        run: |
          [ -z "$KEYSTORE_PASSWORD" ] && echo "::error::KEYSTORE_PASSWORD is empty!" && exit 1
          [ -z "$KEY_PASSWORD" ] && echo "::error::KEY_PASSWORD is empty!" && exit 1
          [ -z "$KEY_ALIAS" ] && echo "::error::KEY_ALIAS is empty!" && exit 1
          [ -z "$KEYSTORE_BASE64" ] && echo "::error::KEYSTORE_BASE64 is empty!" && exit 1
          echo "KEYSTORE_PASSWORD length: ${#KEYSTORE_PASSWORD}"
          echo "KEY_PASSWORD length: ${#KEY_PASSWORD}"
          echo "KEY_ALIAS value: $KEY_ALIAS"
          echo "KEYSTORE_BASE64 length: ${#KEYSTORE_BASE64}"
          echo "All signing secrets are set"
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Decode signing keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > apps/mobile/android/app/release.keystore

      - name: Inject release signing config
        working-directory: apps/mobile/android/app
        run: |
          sed -i '/android {/a \
              signingConfigs {\
                  release {\
                      storeFile file("release.keystore")\
                      storePassword System.getenv("KEYSTORE_PASSWORD")\
                      keyAlias System.getenv("KEY_ALIAS")\
                      keyPassword System.getenv("KEY_PASSWORD")\
                  }\
              }' build.gradle

          sed -i 's/signingConfig signingConfigs.debug/signingConfig signingConfigs.release/' build.gradle

          sed -i '/defaultConfig {/a\
                  ndk {\
                      abiFilters "armeabi-v7a", "arm64-v8a"\
                  }' build.gradle

      - name: Ensure Sentry CLI binary
        working-directory: apps/mobile
        run: |
          SENTRY_CLI="node_modules/@sentry/cli/bin/sentry-cli"
          if [ -x "$SENTRY_CLI" ] && "$SENTRY_CLI" --version 2>/dev/null; then
            echo "Sentry CLI binary works"
          else
            echo "Sentry CLI binary missing or broken, creating no-op stub..."
            mkdir -p "$(dirname "$SENTRY_CLI")"
            printf '#!/bin/bash\necho "sentry-cli stub: skipping upload"\nexit 0\n' > "$SENTRY_CLI"
            chmod +x "$SENTRY_CLI"
            echo "Stub created at $SENTRY_CLI"
            "$SENTRY_CLI" --version
          fi

      - name: Build AAB
        working-directory: apps/mobile/android
        run: ./gradlew bundleRelease -x lintVitalAnalyzeRelease -x lintVitalRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          EXPO_PUBLIC_API_URL: ${{ steps.api-url.outputs.url }}
          EXPO_PUBLIC_APP_ENV: ${{ needs.check-fingerprint.outputs.environment }}_app
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: app-release.aab
          path: apps/mobile/android/app/build/outputs/bundle/release/app-release.aab

      - name: Save fingerprint to cache
        run: |
          RUNTIME_VERSION="${{ needs.check-fingerprint.outputs.runtime_version }}"
          if [ -z "$RUNTIME_VERSION" ] || [ "$RUNTIME_VERSION" = "unknown" ]; then
            RAW=$(cd apps/mobile && npx expo-updates runtimeversion:resolve --platform android 2>/dev/null || echo "manual-build")
            RUNTIME_VERSION=$(echo "$RAW" | sha256sum | cut -d' ' -f1)
          fi
          echo "$RUNTIME_VERSION" > .fingerprint-android

      - name: Cache fingerprint
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .fingerprint-android
          key: android-fingerprint-${{ needs.check-fingerprint.outputs.environment }}-${{ needs.check-fingerprint.outputs.runtime_version || 'manual' }}

      - name: Resolve submit decision
        id: submit-decision
        run: |
          ENV="${{ needs.check-fingerprint.outputs.environment }}"
          SUBMIT_INPUT="${{ github.event.inputs.submit }}"
          if [ "$ENV" = "production" ]; then
            echo "should_submit=true" >> $GITHUB_OUTPUT
            echo "track=production" >> $GITHUB_OUTPUT
            echo "Production build → always submitting to production track"
          elif [ "$SUBMIT_INPUT" != "false" ]; then
            echo "should_submit=true" >> $GITHUB_OUTPUT
            echo "track=internal" >> $GITHUB_OUTPUT
            echo "Staging build → submitting to internal track"
          else
            echo "should_submit=false" >> $GITHUB_OUTPUT
            echo "track=none" >> $GITHUB_OUTPUT
            echo "Submit skipped by user"
          fi

      - name: Decode Google service account key
        if: steps.submit-decision.outputs.should_submit == 'true'
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > apps/mobile/google-services.json

      - name: Submit to Play Store
        if: steps.submit-decision.outputs.should_submit == 'true'
        working-directory: apps/mobile
        run: |
          echo "Submitting to ${{ steps.submit-decision.outputs.track }} track via profile ${{ needs.check-fingerprint.outputs.environment }}"
          eas submit \
            --platform android \
            --profile ${{ needs.check-fingerprint.outputs.environment }} \
            --path ./android/app/build/outputs/bundle/release/app-release.aab \
            --non-interactive

      - name: Summary
        run: |
          echo "## Android Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ needs.check-fingerprint.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Channel:** ${{ needs.check-fingerprint.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **versionCode:** ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Submit:** ${{ steps.submit-decision.outputs.should_submit == 'true' && format('Play Store ({0} track)', steps.submit-decision.outputs.track) || 'Skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "AAB is available as a workflow artifact." >> $GITHUB_STEP_SUMMARY

          
# Staging OTA
# gh workflow run android.yml --ref android-build -f mode=ota -f environment=staging

# Staging full build + submit
# gh workflow run android.yml --ref staging -f mode=full -f environment=staging

# Production OTA
# gh workflow run android.yml --ref main -f mode=ota -f environment=production

# Production full build + submit
# gh workflow run android.yml --ref main -f mode=full -f environment=production

# Full build, skip Play Store submit
# gh workflow run android.yml --ref staging -f mode=full -f environment=staging -f submit=false