name: Desktop Release (Windows)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0)'
        required: true
        type: string
  push:
    tags:
      - 'desktop-v*'

env:
  BUN_VERSION: '1.3.11'
  NODE_VERSION: '24'

jobs:
  build-web:
    name: Build Expo Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache bun dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.bun/install/cache
          key: bun-web-${{ hashFiles('bun.lock') }}
          restore-keys: bun-web-

      - name: Install dependencies
        run: bun install

      - name: Build workspace packages
        run: cd packages/sdk && bun run build

      - name: Build web
        run: bun run web:build
        env:
          EXPO_PUBLIC_LOCAL_MODE: 'true'
          EXPO_PUBLIC_API_URL: 'http://localhost:8002'

      - name: Upload web build
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: web-dist-windows
          path: apps/mobile/dist/

  build-desktop:
    name: Build Desktop (Windows x64)
    needs: build-web
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache bun dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.bun/install/cache
          key: bun-desktop-win32-x64-${{ hashFiles('bun.lock') }}
          restore-keys: bun-desktop-win32-x64-

      - name: Download web build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: web-dist-windows
          path: apps/mobile/dist/

      - name: Download Bun binary (for bundling in app)
        shell: bash
        run: |
          mkdir -p apps/desktop/resources/bun
          cd apps/desktop/resources/bun
          curl -fSL -o bun.zip "https://github.com/oven-sh/bun/releases/download/bun-v${{ env.BUN_VERSION }}/bun-windows-x64.zip"
          7z x bun.zip || unzip bun.zip
          mv bun-windows-x64/bun* . || true
          rm -rf bun-windows-x64 bun.zip
          ls -la

      - name: Install monorepo dependencies
        shell: bash
        run: bun install --linker=isolated

      - name: Build workspace packages
        shell: bash
        run: cd packages/sdk && bun run build

      - name: Generate Prisma clients (PG + SQLite)
        shell: bash
        run: bun run db:generate:all

      - name: Copy web build into resources
        shell: bash
        run: |
          mkdir -p apps/desktop/resources/web
          cp -r apps/mobile/dist/* apps/desktop/resources/web/

      - name: Bundle API server into resources
        shell: bash
        run: node apps/desktop/scripts/bundle-api.mjs

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm install

      - name: Build TypeScript
        working-directory: apps/desktop
        run: npx tsc

      - name: Prepare Windows Code Signing
        shell: bash
        env:
          WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          if [ -n "$WINDOWS_CERT_BASE64" ]; then
            echo "$WINDOWS_CERT_BASE64" | base64 -d > "apps/desktop/windows-cert.pfx"
            echo "WINDOWS_CERT_PATH=apps/desktop/windows-cert.pfx" >> $GITHUB_ENV
            echo "WINDOWS_CERT_PASSWORD=$WINDOWS_CERT_PASSWORD" >> $GITHUB_ENV
          else
            echo "No code signing certificate provided. Skipping code signing."
          fi

      - name: Package with Electron Forge
        working-directory: apps/desktop
        run: npx electron-forge make --arch=x64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: desktop-win32-x64
          path: apps/desktop/out/make/**/*

  release:
    name: Create Release
    needs: build-desktop
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts/
          pattern: desktop-win32-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          name: Shogo Desktop ${{ github.ref_name }}
          draft: false
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
