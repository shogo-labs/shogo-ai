name: Desktop Release (Windows)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0)'
        required: true
        type: string
  push:
    tags:
      - 'v[0-9]*'

env:
  BUN_VERSION: '1.3.11'
  NODE_VERSION: '24'
  QEMU_VERSION: '9.2.0'

jobs:
  preflight:
    # Release-blocking sanity checks that have no platform dependencies.
    # Runs FIRST and gates every downstream job. The intent is that a
    # broken migration (or any other check we add here) stops the
    # release before we spend ~20 build-minutes on Windows / macOS
    # runners producing an installer nobody can use anyway.
    #
    # PR CI runs the same checks via .github/workflows/ci.yml; this job
    # is the backstop for the case where a regression sneaks in via
    # direct main push, merge-queue race, or out-of-PR tag push.
    name: Preflight checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Replay desktop SQLite migrations against an empty DB
        # Catches the "shipped a migration without its prerequisite"
        # bug class that bricked v1.7.8 for every existing user. See
        # scripts/check-migrations.ts for the full background.
        # No dependency install needed — the script uses bun:sqlite
        # which is statically linked into the bun binary.
        run: bun scripts/check-migrations.ts

      - name: Install dependencies (for prisma migrate diff)
        # The drift check shells out to `prisma migrate diff`, which
        # needs the `prisma` package installed. We install with
        # --frozen-lockfile to avoid recomputing the lock during a
        # release and skip postinstall scripts for speed (db
        # generation isn't needed for a CLI invocation).
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Check desktop SQLite migrations match schema.local.prisma
        # Backstop for the other half of the v1.7.8 bug class — see the
        # equivalent step in .github/workflows/ci.yml for the full
        # narrative. Gates the release the same way ci.yml gates the PR.
        run: bun run check:desktop-schema-drift

  build-web:
    name: Build Expo Web
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache bun dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.bun/install/cache
          key: bun-web-${{ hashFiles('bun.lock') }}
          restore-keys: bun-web-

      - name: Install dependencies
        # `GITHUB_TOKEN` is required so that `@vscode/ripgrep`'s postinstall
        # authenticates its `api.github.com/repos/microsoft/ripgrep-prebuilt`
        # lookup. Without it, GitHub-hosted runners share the 60/hr anon quota
        # and the install intermittently fails with `Request failed: 403` —
        # the root cause of the flaky Windows tagged builds (e.g. v1.7.14).
        run: bun install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build workspace packages
        run: bun run build:packages

      - name: Build web
        run: bun run web:build
        env:
          EXPO_PUBLIC_LOCAL_MODE: 'true'
          EXPO_PUBLIC_API_URL: 'http://localhost:8002'
          # Pass the desktop Sentry DSN into the renderer build so the
          # existing `@sentry/react-native` init in apps/mobile/app/_layout.tsx
          # activates inside the Electron BrowserWindow. The renderer is a
          # web build (`Platform.OS === 'web'`), so `_layout.tsx` reads
          # `EXPO_PUBLIC_SENTRY_DSN_WEB`. Renderer events land in the
          # `shogo-desktop` Sentry project (same as main-process events,
          # separate from `shogo-ios` / `shogo-android` / `javascript-react`).
          # Falls back to empty (Sentry self-disables) on forks / branches
          # without the secret.
          EXPO_PUBLIC_SENTRY_DSN_WEB: ${{ secrets.SHOGO_DESKTOP_SENTRY_DSN }}

      - name: Upload web build
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: web-dist-windows
          path: apps/mobile/dist/

  build-desktop:
    name: Build Desktop (Windows x64)
    needs: [preflight, build-web]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set app version from tag
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"
          cd apps/desktop
          node -e "const p=require('./package.json'); p.version='$VERSION'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n')"
          echo "Set desktop app version to $VERSION"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache bun dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.bun/install/cache
          key: bun-desktop-win32-x64-${{ hashFiles('bun.lock') }}
          restore-keys: bun-desktop-win32-x64-

      - name: Download web build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: web-dist-windows
          path: apps/mobile/dist/

      - name: Download Bun binary (for bundling in app)
        shell: bash
        run: |
          mkdir -p apps/desktop/resources/bun
          cd apps/desktop/resources/bun
          curl -fSL -o bun.zip "https://github.com/oven-sh/bun/releases/download/bun-v${{ env.BUN_VERSION }}/bun-windows-x64.zip"
          7z x bun.zip || unzip bun.zip
          mv bun-windows-x64/bun* . || true
          rm -rf bun-windows-x64 bun.zip
          # Bun's Windows zip ships only `bun.exe`; create a hardlink so
          # `bunx` (without .exe) and `bunx.exe` both resolve. Required for
          # `bunx shogo generate` invoked from package.json scripts when the
          # bundled bun directory is added to PATH.
          if [ -f bun.exe ]; then
            cp bun.exe bunx.exe
          fi
          ls -la

      - name: Install monorepo dependencies
        shell: bash
        run: bun install --linker=isolated
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build workspace packages
        shell: bash
        run: bun run build:packages

      # `apps/api/src/generated/admin-routes.ts` is git-ignored and produced
      # by `bun run generate:routes`. The root postinstall tries to run this
      # during `bun install`, but `@shogo-ai/cli` (which `packages/sdk/bin/shogo.ts`
      # imports as `@shogo-ai/cli/pkg`) isn't built yet at that point —
      # especially under `bun install --linker=isolated` on Windows — so it
      # silently no-ops. Re-running it here — after `build:packages` has built
      # the CLI — guarantees the generated files exist before `bundle-api.mjs`
      # imports them at apps/api/src/server.ts:81. Without this, the bundler
      # fails with `Could not resolve "./generated/admin-routes"`.
      - name: Generate Hono routes
        shell: bash
        run: bun run generate:routes

      - name: Generate Prisma clients (PG + SQLite)
        shell: bash
        run: bun run db:generate:all

      - name: Copy web build into resources
        shell: bash
        run: |
          mkdir -p apps/desktop/resources/web
          cp -r apps/mobile/dist/* apps/desktop/resources/web/

      - name: Bundle API server into resources
        shell: bash
        run: node apps/desktop/scripts/bundle-api.mjs

      - name: Create seed database (SQLite)
        shell: bash
        run: bunx prisma db push --schema=prisma/schema.local.prisma --accept-data-loss
        env:
          DATABASE_URL: file:./apps/desktop/resources/seed.db

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm install

      - name: Build TypeScript
        working-directory: apps/desktop
        # `npx tsc` emits dist/{main,preload,...}.js. The follow-up
        # `bundle:main` step re-bundles dist/main.js with `bun build` so
        # workspace TS imports (notably @shogo-ai/worker/cloud-login)
        # get inlined; tsc on its own can't resolve them because
        # apps/desktop is npm-installed, not a bun workspace member.
        # See apps/desktop/scripts/bundle-main.mjs for details.
        run: npx tsc && npm run bundle:main
        env:
          # Baked into dist/main.js via `--define` in bundle-main.mjs
          # so the packaged app reports main-process crashes without
          # needing a runtime config file. Empty on forks / branches
          # without the secret — Sentry self-disables in that case.
          SHOGO_DESKTOP_SENTRY_DSN: ${{ secrets.SHOGO_DESKTOP_SENTRY_DSN }}

      - name: Prepare Windows Code Signing
        shell: bash
        env:
          WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          if [ -n "$WINDOWS_CERT_BASE64" ]; then
            echo "$WINDOWS_CERT_BASE64" | base64 -d > "apps/desktop/windows-cert.pfx"
            echo "WINDOWS_CERT_PATH=apps/desktop/windows-cert.pfx" >> $GITHUB_ENV
            echo "WINDOWS_CERT_PASSWORD=$WINDOWS_CERT_PASSWORD" >> $GITHUB_ENV
          else
            echo "No code signing certificate provided. Skipping code signing."
          fi

      - name: Package with Electron Forge
        working-directory: apps/desktop
        run: npx electron-forge make --arch=x64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: desktop-win32-x64
          path: apps/desktop/out/make/**/*

  release:
    name: Create Release
    needs: build-desktop
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts/
          pattern: desktop-win32-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          name: Shogo Desktop ${{ github.ref_name }}
          draft: false
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
