name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0)'
        required: true
        type: string
  push:
    tags:
      - 'desktop-v*'

env:
  BUN_VERSION: '1.2.4'
  NODE_VERSION: '22'

jobs:
  build-web:
    name: Build Expo Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache bun dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.bun/install/cache
          key: bun-web-${{ hashFiles('bun.lock') }}
          restore-keys: bun-web-

      - name: Install dependencies
        run: bun install

      - name: Build workspace packages
        run: cd packages/sdk && bun run build

      - name: Build web
        run: bun run web:build
        env:
          EXPO_PUBLIC_LOCAL_MODE: 'true'
          EXPO_PUBLIC_API_URL: 'http://localhost:8002'

      - name: Upload web build
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: web-dist
          path: apps/mobile/dist/

  build-desktop:
    name: Build Desktop (${{ matrix.os }})
    needs: build-web
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: darwin
            arch: arm64
            bun-target: bun-darwin-aarch64
          - os: macos-14
            platform: darwin
            arch: x64
            bun-target: bun-darwin-x64
          - os: windows-latest
            platform: win32
            arch: x64
            bun-target: bun-windows-x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache bun dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.bun/install/cache
          key: bun-desktop-${{ matrix.platform }}-${{ matrix.arch }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-desktop-${{ matrix.platform }}-${{ matrix.arch }}-

      - name: Download web build
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: web-dist
          path: apps/mobile/dist/

      - name: Download Bun binary (for bundling in app)
        shell: bash
        run: |
          mkdir -p apps/desktop/resources/bun
          cd apps/desktop/resources/bun
          curl -fSL -o bun.zip "https://github.com/oven-sh/bun/releases/download/bun-v${{ env.BUN_VERSION }}/${{ matrix.bun-target }}.zip"
          if [ "${{ matrix.platform }}" = "win32" ]; then
            7z x bun.zip || unzip bun.zip
          else
            unzip bun.zip
          fi
          mv ${{ matrix.bun-target }}/bun* . || true
          rm -rf ${{ matrix.bun-target }} bun.zip
          ls -la

      - name: Install monorepo dependencies
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "win32" ]; then
            bun install --linker=isolated
          else
            bun install
          fi

      - name: Build workspace packages
        shell: bash
        run: |
          cd packages/sdk && bun run build && cd ../..

      - name: Generate Prisma client (SQLite)
        shell: bash
        run: |
          SHOGO_LOCAL_MODE=true \
          DATABASE_URL="file:./placeholder.db" \
            bunx prisma generate --schema=prisma/schema.local.prisma

      - name: Copy web build into resources
        shell: bash
        run: |
          mkdir -p apps/desktop/resources/web
          cp -r apps/mobile/dist/* apps/desktop/resources/web/

      - name: Bundle API server into resources
        shell: bash
        run: node apps/desktop/scripts/bundle-api.mjs

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm install

      - name: Build TypeScript
        working-directory: apps/desktop
        run: npx tsc

      - name: Prepare macOS Code Signing
        if: matrix.platform == 'darwin'
        shell: bash
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -n "$APPLE_CERTIFICATE_BASE64" ]; then
            KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
            KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
            CERT_PATH="$RUNNER_TEMP/certificate.p12"

            echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"

            security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
              -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
            security set-key-partition-list -S apple-tool:,apple: \
              -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security list-keychain -d user -s "$KEYCHAIN_PATH"

            rm "$CERT_PATH"
            echo "Apple certificate imported into temporary keychain."
          else
            echo "No Apple certificate provided. Skipping macOS code signing."
          fi

      - name: Prepare Windows Code Signing
        if: matrix.platform == 'win32'
        shell: bash
        env:
          WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          if [ -n "$WINDOWS_CERT_BASE64" ]; then
            echo "$WINDOWS_CERT_BASE64" | base64 -d > "apps/desktop/windows-cert.pfx"
            echo "WINDOWS_CERT_PATH=apps/desktop/windows-cert.pfx" >> $GITHUB_ENV
            echo "WINDOWS_CERT_PASSWORD=$WINDOWS_CERT_PASSWORD" >> $GITHUB_ENV
          else
            echo "No code signing certificate provided. Skipping code signing."
          fi

      - name: Package with Electron Forge
        working-directory: apps/desktop
        run: npx electron-forge make --arch=${{ matrix.arch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Cleanup macOS Signing Keychain
        if: matrix.platform == 'darwin' && always()
        shell: bash
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: apps/desktop/out/make/**/*

  release:
    name: Create Release
    needs: build-desktop
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts/
          pattern: desktop-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          name: Shogo Desktop ${{ github.ref_name }}
          draft: false
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
