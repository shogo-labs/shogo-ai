# =============================================================================
# EAS Build & Update Pipeline
# =============================================================================
# Automatic (push to staging):
#   - Resolves native fingerprint to detect if native deps changed
#   - If a build with the current fingerprint exists → OTA update (eas update)
#   - If no matching build exists → full native build (eas build)
#
# Manual (workflow_dispatch):
#   - Always runs a full native build with the chosen profile
#   - Optionally submits to Play Store
# =============================================================================

name: EAS Build & Update

on:
  push:
    branches:
      - staging
    paths:
      - 'apps/mobile/**'
      - 'packages/domain-stores/**'
      - 'packages/shared-app/**'
      - 'packages/shared-ui/**'
      - 'packages/ui-kit/**'
      - 'packages/sdk/**'
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'production'
        type: choice
        options:
          - development
          - preview
          - production
      submit:
        description: 'Submit to Play Store (internal track)'
        required: false
        default: true
        type: boolean

jobs:
  # ===========================================================================
  # Check if native code changed (push events only)
  # ===========================================================================
  check-fingerprint:
    name: Check Native Fingerprint
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      needs_build: ${{ steps.check.outputs.needs_build }}
      runtime_version: ${{ steps.check.outputs.runtime_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Resolve fingerprint and check for existing build
        id: check
        working-directory: apps/mobile
        run: |
          RUNTIME_VERSION=$(npx expo-updates runtimeversion:resolve --platform android 2>/dev/null || echo "")

          if [ -z "$RUNTIME_VERSION" ]; then
            echo "Could not resolve runtime version, forcing full build"
            echo "needs_build=true" >> $GITHUB_OUTPUT
            echo "runtime_version=unknown" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Runtime version (fingerprint): $RUNTIME_VERSION"
          echo "runtime_version=$RUNTIME_VERSION" >> $GITHUB_OUTPUT

          BUILD_COUNT=$(eas build:list \
            --platform android \
            --runtimeVersion "$RUNTIME_VERSION" \
            --status finished \
            --limit 1 \
            --non-interactive \
            --json 2>/dev/null | jq 'length' 2>/dev/null || echo "0")

          if [ "$BUILD_COUNT" -gt "0" ]; then
            echo "Build exists for fingerprint $RUNTIME_VERSION → OTA update"
            echo "needs_build=false" >> $GITHUB_OUTPUT
          else
            echo "No build for fingerprint $RUNTIME_VERSION → full build required"
            echo "needs_build=true" >> $GITHUB_OUTPUT
          fi

  # ===========================================================================
  # OTA Update — JS/asset changes only (no native changes)
  # ===========================================================================
  update:
    name: EAS Update (OTA)
    runs-on: ubuntu-latest
    needs: check-fingerprint
    if: >
      needs.check-fingerprint.result == 'success' &&
      needs.check-fingerprint.outputs.needs_build == 'false'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build workspace packages
        run: bun run build

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update
        working-directory: apps/mobile
        run: |
          eas update \
            --branch production \
            --message "${{ github.event.head_commit.message }}" \
            --non-interactive

      - name: Summary
        run: |
          echo "## 📲 OTA Update Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** production" >> $GITHUB_STEP_SUMMARY
          echo "- **Runtime Version:** ${{ needs.check-fingerprint.outputs.runtime_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Devices running a production build will receive this update automatically." >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Full Native Build — native deps changed or manual trigger
  # ===========================================================================
  build:
    name: EAS Build (Android)
    runs-on: ubuntu-latest
    needs: check-fingerprint
    if: >
      always() && (
        github.event_name == 'workflow_dispatch' ||
        (needs.check-fingerprint.result == 'success' && needs.check-fingerprint.outputs.needs_build == 'true')
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android
        working-directory: apps/mobile
        run: |
          PROFILE="${{ github.event.inputs.profile || 'production' }}"
          echo "Building with profile: $PROFILE"
          eas build \
            --platform android \
            --profile "$PROFILE" \
            --non-interactive

      - name: Submit to Play Store (internal track)
        if: github.event.inputs.submit != 'false'
        working-directory: apps/mobile
        run: |
          eas submit \
            --platform android \
            --latest \
            --non-interactive

      - name: Summary
        run: |
          PROFILE="${{ github.event.inputs.profile || 'production' }}"
          echo "## 🏗️ Android Build Triggered" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Profile:** $PROFILE" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Submit:** Play Store (internal track)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Build is running on EAS servers. Check progress at [expo.dev](https://expo.dev)." >> $GITHUB_STEP_SUMMARY
