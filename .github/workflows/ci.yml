# =============================================================================
# CI - Lint, Typecheck, and Test
# =============================================================================
# Runs on every pull request to main. No secrets required, safe for fork PRs.
# =============================================================================

name: CI

on:
  pull_request:
    branches: [main]
  # Also run on every push to main so a partial test refactor that slips
  # through (e.g. via a directly-merged feature branch with no PR CI
  # against the post-merge HEAD) shows up attributable to the offending
  # commit, instead of silently red-ing every downstream PR.
  push:
    branches: [main]

permissions: {}

concurrency:
  group: ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Typecheck, Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Cache bun dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.bun/install/cache
          key: bun-ci-${{ hashFiles('bun.lock') }}
          restore-keys: bun-ci-

      - name: Install dependencies
        # `bun install --frozen-lockfile` triggers `scripts/postinstall.ts`
        # which runs `db-generate-all.ts` to produce both the PG-backed
        # Prisma client (`apps/api/src/generated/prisma-pg`) and the
        # SQLite one (`apps/api/src/generated/prisma-sqlite`) and links
        # the default `prisma/` symlink to `prisma-pg`. Without this,
        # `@prisma/client` imports in apps/api fail to resolve under
        # typecheck and test.
        run: bun install --frozen-lockfile

      - name: Build workspace packages
        # Required before typecheck so cross-package imports of
        # `@shogo-ai/sdk`, `@shogo-ai/agent`, etc. resolve to compiled
        # `dist/` artifacts. Without this step, `packages/sdk` (which
        # re-exports from `@shogo-ai/agent`, `@shogo-ai/core`, etc.)
        # and downstream packages (`packages/shogo-worker`,
        # `packages/cli`) fail typecheck with TS2307 module-not-found.
        # The `paths` aliases in `tsconfig.base.json` only redirect a
        # subset of workspace packages to source; published-shape
        # imports still need `dist/`.
        run: bun run build:packages

      - name: Build runtime-template (Vite dist for workspace-seeding tests)
        # `templates/runtime-template/dist/` is gitignored — it's a Vite
        # build artifact. Several agent-runtime tests (notably
        # workspace-seeding.test.ts) assert that `seedRuntimeTemplate`
        # copies `dist/index.html` into a fresh workspace. Without the
        # build the tests see an empty source tree and fail. The
        # template has its own `bun install` because it's outside the
        # root workspaces glob.
        #
        # The template pins `@shogo-ai/sdk` as the `workspace:*` sentinel,
        # which can't resolve in this standalone install — materialize it to
        # the latest published `^X.Y.Z` first (GitHub runners have npm + net).
        # Plain `bun install` (not --frozen-lockfile): the rewrite makes the
        # template's checked-in bun.lock drift from its package.json.
        run: |
          bun run scripts/materialize-runtime-template.ts templates/runtime-template/package.json
          cd templates/runtime-template
          bun install
          bun run build

      - name: Build one agent template (sales-bdr-pipeline) for overlay tests
        # `packages/agent-runtime/templates/<id>/dist/` is also gitignored.
        # workspace-seeding.test.ts > "overlays the template-shipped
        # pre-built dist over the runtime-template stub" depends on
        # `sales-bdr-pipeline`'s dist existing (it cps it onto the runtime
        # template stub and asserts the bundle text changes). The script
        # below stages the runtime-template + agent template src in a
        # tmpdir and runs vite build into the right output. We pass a
        # specific id so CI doesn't pay for all ~30 templates — that's
        # the build-templates.sh job in deploy.yml, which is too heavy
        # for PR CI.
        run: bun run packages/agent-runtime/scripts/build-template-dists.ts sales-bdr-pipeline

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Verify SDK license isolation (no AGPL leak)
        # Fails if @shogo-ai/sdk (MIT) declares or imports any @shogo/*
        # AGPL workspace package from a published code path. See
        # packages/sdk/scripts/verify-license-isolation.mjs for details.
        run: bun run --filter @shogo-ai/sdk verify:license-isolation

      - name: Check replication publication is self-maintaining
        run: bun run check:publication

      - name: Check multi-region cron locks + unique-key classification
        # Guards against the 2026-05-21 analytics_digests poison-pill class
        # of failure: an in-process cron upserting on a non-PK unique index
        # in every API replica in every region, where logical replication's
        # `last_update_wins` cannot resolve the conflict and the apply
        # worker halts until manual intervention.
        #
        # The check has two halves:
        #   1. Every cron entry point in apps/api/src/jobs/ (and the two
        #      directly-invoked-from-server.ts ones — recalculateAllStorageUsage,
        #      generateDigest) must EITHER wrap its body in
        #      `withGlobalJobLock('<name>', ...)` AND register `<name>` in
        #      KNOWN_JOB_IDS in apps/api/src/lib/global-job-lock.ts, OR be
        #      listed in INTENTIONALLY_REGIONAL with a regionKeyColumn that
        #      the schema actually proves out.
        #   2. Every @unique / @@unique in prisma/schema.prisma must be
        #      classified in ACCEPTED_UNIQUE_KEYS with one of
        #      random_secret | external_global_id | request_scoped |
        #      single_tenant_upsert | cron_locked | cron_regional, plus a
        #      one-line justification.
        #
        # Both halves cross-reference: a cron_locked classification has to
        # point at a real KNOWN_JOB_IDS entry, a cron_regional at a real
        # INTENTIONALLY_REGIONAL entry, and stale allowlist entries fail
        # the check loudly so a model rename can't silently bypass the
        # guard. The friction is intentional — this is the human review
        # gate that would have caught the storage_usage shape at PR time.
        run: bun run check:multiregion

      - name: Replay desktop SQLite migrations against an empty DB
        # Guards against the "shipped a migration without its prerequisite"
        # failure mode — e.g. an ALTER TABLE whose CREATE TABLE was never
        # mirrored from prisma/migrations/ into apps/desktop/prisma/migrations/.
        # That bug class can't be caught by typecheck or test (which use a
        # fresh DB built from the current schema, not the migration history)
        # and silently bricks every customer's packaged desktop app on the
        # next launch with Prisma's P3009 "failed migration" lock.
        run: bun run check:migrations

      - name: Check desktop SQLite migrations match schema.local.prisma
        # Catches the OTHER half of the v1.7.8 bug class: schema.local.prisma
        # has a model (CreatorProfile, MarketplaceListing, ...) but the
        # migration tree never CREATE TABLEs it, so a follow-up ALTER lands
        # with no base — and the packaged desktop app silently exits on
        # first launch with `no such table: X` -> P3009 lock.
        #
        # This is the highest-leverage of our three migration checks. It
        # uses Prisma's own `migrate diff --from-migrations --to-schema`
        # (which already knows the full SQLite dialect, FK inlining,
        # partial-index translation, etc.) — no custom translator needed.
        # See scripts/check-desktop-schema-drift.ts for the allow-list
        # of pre-existing drift; the goal is to drain that to empty and
        # then add `--strict` here.
        run: bun run check:desktop-schema-drift

      - name: Test
        run: bun run test
