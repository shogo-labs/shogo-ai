# =============================================================================
# CI - Lint, Typecheck, and Test
# =============================================================================
# Runs on every pull request to main. No secrets required, safe for fork PRs.
# =============================================================================

name: CI

on:
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Typecheck, Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Cache bun dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.bun/install/cache
          key: bun-ci-${{ hashFiles('bun.lock') }}
          restore-keys: bun-ci-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Check replication publication is self-maintaining
        run: bun run check:publication

      - name: Test
        run: bun run test
