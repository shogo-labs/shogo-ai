# =============================================================================
# CI - Lint, Typecheck, and Test
# =============================================================================
# Runs on every pull request to main. No secrets required, safe for fork PRs.
# =============================================================================

name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Typecheck, Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@735343b667d3e6a283c1b00a516b2e9ed620a6c0 # v2.0.2
        with:
          bun-version: '1.3.6'

      - name: Cache bun dependencies
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.bun/install/cache
          key: bun-ci-${{ hashFiles('bun.lock') }}
          restore-keys: bun-ci-

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun test
