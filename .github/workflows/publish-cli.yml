# SPDX-License-Identifier: Apache-2.0
# Builds the @shogo-ai/worker CLI into single-file binaries for
# darwin-arm64, darwin-x64, linux-x64, linux-arm64, win-x64
# using Bun's --compile target, then publishes them as a GitHub Release.
#
# Triggered on tags matching `shogo-cli-v*` (e.g. shogo-cli-v0.1.0).

name: Publish CLI

on:
  push:
    tags:
      - "shogo-cli-v*"
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel (stable or beta)"
        default: "beta"
        required: false

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            bun-target: bun-darwin-arm64
            ext: ""
            archive: tar.gz
          - target: darwin-x64
            bun-target: bun-darwin-x64
            ext: ""
            archive: tar.gz
          - target: linux-x64
            bun-target: bun-linux-x64
            ext: ""
            archive: tar.gz
          - target: linux-arm64
            bun-target: bun-linux-arm64
            ext: ""
            archive: tar.gz
          - target: win-x64
            bun-target: bun-windows-x64
            ext: ".exe"
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        working-directory: packages/shogo-worker
        run: bun install --frozen-lockfile || bun install

      - name: Compile binary
        working-directory: packages/shogo-worker
        run: |
          mkdir -p dist
          bun build --compile --minify \
            --target=${{ matrix.bun-target }} \
            src/cli.ts \
            --outfile dist/shogo${{ matrix.ext }}

      - name: Package
        working-directory: packages/shogo-worker/dist
        run: |
          if [ "${{ matrix.archive }}" = "tar.gz" ]; then
            tar -czf shogo-${{ matrix.target }}.tar.gz shogo
            sha256sum shogo-${{ matrix.target }}.tar.gz > shogo-${{ matrix.target }}.tar.gz.sha256
          else
            zip -9 shogo-${{ matrix.target }}.zip shogo.exe
            sha256sum shogo-${{ matrix.target }}.zip > shogo-${{ matrix.target }}.zip.sha256
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shogo-${{ matrix.target }}
          path: |
            packages/shogo-worker/dist/shogo-${{ matrix.target }}.*
          retention-days: 14

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Build release notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Previous CLI tag reachable from this commit (excluding the
          # current one). Falls back to the root commit on the first
          # ever CLI tag so the commit list still renders.
          if PREV=$(git describe --tags --abbrev=0 --match 'shogo-cli-v*' --exclude "$GITHUB_REF_NAME" "$GITHUB_SHA^" 2>/dev/null); then
            echo "Previous CLI tag: $PREV"
          else
            PREV=$(git rev-list --max-parents=0 HEAD | head -n1)
            echo "No previous CLI tag found; using root commit $PREV"
          fi

          PR_NOTES=$(gh api -X POST "repos/$GITHUB_REPOSITORY/releases/generate-notes" \
            -f tag_name="$GITHUB_REF_NAME" \
            -f previous_tag_name="$PREV" \
            --jq .body)

          COMMITS=$(git log --first-parent --no-merges \
            --pretty=format:'- %s (%h)' \
            "$PREV..$GITHUB_SHA")

          {
            echo "body<<NOTES_EOF"
            printf '%s\n' "$PR_NOTES"
            echo
            echo "## Commits"
            printf '%s\n' "$COMMITS"
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          # Create as a DRAFT so the release stays hidden until every asset has
          # finished uploading. softprops uploads assets after creating the
          # release, so a non-draft create would briefly expose an asset-less
          # release. The publish step below flips it to published once this
          # action (and thus all uploads) completes.
          draft: true
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          body: ${{ steps.notes.outputs.body }}

      - name: Publish release (assets finished uploading)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "$GITHUB_REF_NAME" --draft=false
