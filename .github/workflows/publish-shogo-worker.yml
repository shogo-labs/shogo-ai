# =============================================================================
# Publish @shogo-ai/worker (npm + per-platform tarballs)
# =============================================================================
# Triggered on the same `v*` tags as the desktop app and the agent-runtime,
# so the worker version is in lock-step with the rest of the platform. Two
# artifact families ship from this workflow:
#
#   1. npm package: @shogo-ai/worker@<version>
#      - Source TS + Node-loadable bundle (dist/cli.mjs).
#      - Falls back to spawning bun/tsx for `bun link`ed monorepo dev.
#      - Pure JS — no native binaries — so any Node 20+ install works.
#      - Version in packages/shogo-worker/package.json is rewritten from
#        the tag at CI time, so the source value is a sentinel and the
#        published version always matches the tag.
#
#   2. Per-platform tarballs *appended* to the `v<version>` GitHub Release
#      that the desktop-release-{macos,windows} and publish-agent-runtime
#      workflows also write to:
#        shogo-darwin-arm64.tar.gz   (+ .sha256)
#        shogo-darwin-x64.tar.gz     (+ .sha256)
#        shogo-linux-arm64.tar.gz    (+ .sha256)
#        shogo-linux-x64.tar.gz      (+ .sha256)
#      Each contains a single self-contained `shogo` binary built via
#      `bun build --compile`. Used by install.sh / install.ps1 +
#      releases.shogo.ai resolver so users without Bun on PATH can still
#      get a one-shot install.
#
# Release uploads use softprops/action-gh-release with no `name:` so the
# three workflows hitting the same `v*` tag don't race on the title —
# whichever wins the create wins the title, everyone else just appends
# files. softprops never deletes assets it didn't upload.
#
# Both artifact families are MIT-licensed (matches packages/shogo-worker
# source) and they spawn the AGPL agent-runtime as a separate OS process.
# =============================================================================

name: Publish shogo-worker

on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to publish (e.g. v0.5.3)'
        required: true
        type: string
      channel:
        description: 'npm dist-tag (latest | beta | nightly). Normally driven by the tag suffix; override here only if needed.'
        required: false
        default: 'latest'
        type: choice
        options:
          - latest
          - beta
          - nightly
      dry_run:
        description: 'Build only — do not publish to npm or upload to release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write # for the GitHub Release
  id-token: write # for npm provenance

concurrency:
  group: publish-shogo-worker-${{ github.ref_name }}
  cancel-in-progress: false

env:
  BUN_VERSION: '1.3.11'
  TARGETS: 'darwin-arm64 darwin-x64 linux-arm64 linux-x64'

jobs:
  publish:
    name: Build + publish worker
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Cache bun dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.bun/install/cache
          key: bun-worker-${{ hashFiles('bun.lock') }}
          restore-keys: bun-worker-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve version + channel from tag
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag '$TAG' is not a valid app version tag (expected vX.Y.Z[-prerelease])"
            exit 1
          fi
          VERSION="${TAG#v}"

          # Channel detection mirrors publish-agent-runtime.yml so the
          # worker, runtime, and desktop builds all classify the same tag
          # the same way:
          #   X.Y.Z              -> latest  (stable on npm)
          #   X.Y.Z-nightly.N    -> nightly
          #   X.Y.Z-anything     -> beta    (any other prerelease suffix)
          # workflow_dispatch can override.
          INPUT_CHANNEL="${{ github.event.inputs.channel }}"
          if [ -n "$INPUT_CHANNEL" ]; then
            CHANNEL="$INPUT_CHANNEL"
          elif [[ "$VERSION" == *-nightly* ]]; then
            CHANNEL="nightly"
          elif [[ "$VERSION" == *-* ]]; then
            CHANNEL="beta"
          else
            CHANNEL="latest"
          fi
          echo "tag=$TAG"          >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"  >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL"  >> "$GITHUB_OUTPUT"

      - name: Write tag version into packages/shogo-worker/package.json
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          # The committed `version` in packages/shogo-worker/package.json
          # is a sentinel (see file). CI rewrites it from the tag so npm
          # publishes the right version without needing manual bumps in
          # PRs. Mirrors the pattern used in desktop-release-windows.yml.
          node -e "const p=require('./packages/shogo-worker/package.json'); p.version=process.env.VERSION; require('fs').writeFileSync('packages/shogo-worker/package.json', JSON.stringify(p, null, 2)+'\n')"
          echo "Set @shogo-ai/worker version to $VERSION"

      # The worker `Typecheck` step below runs `tsc --noEmit`, which resolves
      # the workspace dep `@shogo-ai/sdk` via its `exports.types` field —
      # `./dist/index.d.ts`. Without an explicit build, that file doesn't
      # exist in CI and every `import ... from '@shogo-ai/sdk'` blows up
      # with TS2307 "Cannot find module" (which in turn surfaces downstream
      # implicit-any errors). `build:packages` builds the SDK and its
      # transitive workspace deps in dependency order so the typecheck —
      # and the subsequent `build:js` / `bun build --compile` steps — have
      # the type information they need.
      - name: Build workspace packages (so @shogo-ai/sdk types resolve)
        run: bun run build:packages

      - name: Typecheck
        run: bun run --filter @shogo-ai/worker typecheck

      - name: Build Node bundle (dist/cli.mjs)
        working-directory: packages/shogo-worker
        run: bun run build:js

      - name: Build per-platform compiled binaries
        working-directory: packages/shogo-worker
        run: |
          set -euo pipefail
          for TARGET in $TARGETS; do
            echo "::group::compile shogo-$TARGET"
            bun build src/cli.ts \
              --compile \
              --minify \
              --target="bun-$TARGET" \
              --outfile "dist/shogo-$TARGET"
            ls -lh "dist/shogo-$TARGET"
            echo "::endgroup::"
          done

      - name: Tarball + sha256 sidecars
        working-directory: packages/shogo-worker
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist/release
          for TARGET in $TARGETS; do
            BIN="shogo-$TARGET"
            STAGE="dist/stage-$TARGET"
            mkdir -p "$STAGE"
            cp "dist/$BIN" "$STAGE/shogo"
            chmod +x "$STAGE/shogo"
            cat > "$STAGE/VERSION" <<EOF
          version=$VERSION
          target=$TARGET
          built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          source=https://github.com/${{ github.repository }}/tree/${{ steps.version.outputs.tag }}/packages/shogo-worker
          license=MIT
          EOF
            TARBALL="dist/release/$BIN.tar.gz"
            tar -C "$STAGE" -czf "$TARBALL" shogo VERSION
            (cd dist/release && sha256sum "$BIN.tar.gz" > "$BIN.tar.gz.sha256")
          done

      - name: Upload build artifacts (workflow scope)
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: shogo-worker-${{ steps.version.outputs.version }}
          path: packages/shogo-worker/dist/release/*
          retention-days: 30

      - name: Rewrite workspace:* deps in package.json for npm publish
        working-directory: packages/shogo-worker
        run: |
          set -euo pipefail
          # `npm publish` (unlike `bun publish`) does NOT rewrite
          # `workspace:*` specifiers. If we ship the manifest as-is,
          # `npm install -g @shogo-ai/worker` fails with
          # `EUNSUPPORTEDPROTOCOL Unsupported URL Type "workspace:"`
          # because npm sees the literal `workspace:*` in the registry
          # tarball. (This is exactly what happened on 1.7.14 — see
          # `npm view @shogo-ai/worker dependencies`.)
          #
          # `publish-sdk.yml` solves the same problem by lockstep-pinning
          # every `@shogo-ai/*` workspace dep to the tag version. The
          # worker ships independently of @shogo-ai/sdk, so we instead
          # resolve each `@shogo-ai/*` workspace dep to whatever is
          # currently on the npm `latest` dist-tag and pin with a `^`
          # range. Non-`@shogo-ai/*` workspace deps are stripped (they
          # can't be installed from the public registry anyway).
          node -e '
            const fs = require("fs");
            const { execSync } = require("child_process");
            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
            const cache = new Map();
            const lookup = (name) => {
              if (cache.has(name)) return cache.get(name);
              const v = execSync(`npm view ${name} version`, { encoding: "utf8" }).trim();
              if (!v) throw new Error(`npm view ${name} version returned empty`);
              cache.set(name, v);
              return v;
            };
            for (const key of ["dependencies", "devDependencies", "peerDependencies", "optionalDependencies"]) {
              if (!pkg[key]) continue;
              for (const [name, spec] of Object.entries(pkg[key])) {
                if (typeof spec !== "string" || !spec.startsWith("workspace:")) continue;
                if (name.startsWith("@shogo-ai/")) {
                  const v = lookup(name);
                  pkg[key][name] = `^${v}`;
                  console.log(`Rewrote ${key}.${name}: ${spec} -> ^${v}`);
                } else {
                  delete pkg[key][name];
                  console.log(`Stripped ${key}.${name} (${spec})`);
                }
              }
            }
            fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2) + "\n");
          '
          echo "--- Final packages/shogo-worker/package.json ---"
          cat package.json
          # Hard guard: refuse to publish if any `workspace:` made it
          # through (e.g. a future dep type we forgot to handle).
          if grep -q '"workspace:' package.json; then
            echo "::error::workspace: specifier still present in published manifest — refusing to publish"
            exit 1
          fi

      - name: Publish to npm
        if: github.event.inputs.dry_run != 'true'
        working-directory: packages/shogo-worker
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          CHANNEL: ${{ steps.version.outputs.channel }}
        run: |
          set -euo pipefail
          # When npm sees a published version on `latest`, lower channels
          # like `beta`/`nightly` should NOT overwrite it — pass --tag.
          npm publish --access public --provenance --tag "$CHANNEL"

      - name: Append worker tarballs to v* GitHub Release
        if: github.event.inputs.dry_run != 'true'
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          # NB: deliberately no `name:` — desktop-release-{macos,windows}
          # and publish-agent-runtime also publish to this same tag.
          # softprops leaves the name + body alone when the release
          # already exists, so whoever wins the create-race owns the
          # title and the rest of us just append files.
          tag_name: ${{ steps.version.outputs.tag }}
          prerelease: ${{ steps.version.outputs.channel != 'latest' }}
          body: |
            Includes prebuilt `shogo` worker binaries (channel: ${{ steps.version.outputs.channel }}, MIT).

            Install via:

            ```
            curl -fsSL https://install.shogo.ai | bash
            # or
            npm i -g @shogo-ai/worker
            ```
          files: packages/shogo-worker/dist/release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: always()
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          CHANNEL: ${{ steps.version.outputs.channel }}
          DRY: ${{ github.event.inputs.dry_run }}
          REPO: ${{ github.repository }}
        run: |
          {
            echo "## shogo-worker publish"
            echo "- Tag: \`$TAG\`"
            echo "- Version: \`$VERSION\`"
            echo "- Channel: \`$CHANNEL\`"
            echo "- Dry run: \`${DRY:-false}\`"
            echo
            echo "### Built artifacts"
            echo "- npm: \`@shogo-ai/worker@$VERSION\`"
            for TARGET in $TARGETS; do
              echo "- \`shogo-$TARGET.tar.gz\` (+ \`.sha256\`)"
            done
            if [ "${DRY:-false}" != "true" ]; then
              echo
              echo "Release: https://github.com/$REPO/releases/tag/$TAG"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
