# =============================================================================
# E2E — Hosted Environment (Playwright)
# =============================================================================
# Runs the hosted-env Playwright suite (e2e/staging/*.test.ts) against a
# deployed environment. Triggered:
#   1. Nightly at 08:00 UTC against staging (smoke signal on the current
#      main branch since the last deploy).
#   2. On demand via workflow_dispatch — pick `staging` or `production`.
#
# The suite signs up real accounts (`e2e-<prefix>-<ts>@mailnull.com`) in
# the target environment's database. The companion `e2e-cleanup.yml`
# workflow drains those nightly.
# =============================================================================

name: E2E Hosted

on:
  schedule:
    - cron: '0 8 * * *' # 08:00 UTC nightly
  workflow_dispatch:
    inputs:
      target:
        description: 'Target environment'
        type: choice
        required: true
        default: staging
        options:
          - staging
          - production

permissions: {}

concurrency:
  group: e2e-hosted-${{ github.event.inputs.target || 'staging' }}
  cancel-in-progress: false

jobs:
  playwright:
    name: Playwright (${{ github.event.inputs.target || 'staging' }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    env:
      E2E_TARGET_URL: ${{ github.event.inputs.target == 'production' && 'https://studio.shogo.ai' || 'https://studio.staging.shogo.ai' }}
      E2E_STRIPE_MODE: ${{ github.event.inputs.target == 'production' && 'live' || 'test' }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache bun dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.bun/install/cache
          key: bun-e2e-${{ hashFiles('bun.lock') }}
          restore-keys: bun-e2e-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install Playwright Chromium
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Run hosted e2e suite
        run: bun run test:e2e:hosted
        env:
          CI: 'true'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ github.event.inputs.target || 'staging' }}-${{ github.run_id }}
          path: test-results/
          retention-days: 14
