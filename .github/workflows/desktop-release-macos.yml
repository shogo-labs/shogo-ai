name: Desktop Release (macOS)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0)'
        required: true
        type: string
  push:
    tags:
      - 'desktop-v*'

env:
  BUN_VERSION: '1.3.11'
  NODE_VERSION: '24'
  GO_VERSION: '1.22'

jobs:
  build-web:
    name: Build Expo Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache bun dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.bun/install/cache
          key: bun-web-${{ hashFiles('bun.lock') }}
          restore-keys: bun-web-

      - name: Install dependencies
        run: bun install

      - name: Build workspace packages
        run: cd packages/sdk && bun run build

      - name: Build web
        run: bun run web:build
        env:
          EXPO_PUBLIC_LOCAL_MODE: 'true'
          EXPO_PUBLIC_API_URL: 'http://localhost:8002'

      - name: Upload web build
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: web-dist-macos
          path: apps/mobile/dist/

  build-desktop:
    name: Build Desktop (macOS ${{ matrix.arch }})
    needs: build-web
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            bun-target: bun-darwin-aarch64
          - arch: x64
            bun-target: bun-darwin-x64

    runs-on: macos-14
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set app version from tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/desktop-v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/desktop-v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"
          cd apps/desktop
          node -e "const p=require('./package.json'); p.version='$VERSION'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n')"
          echo "Set desktop app version to $VERSION"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache bun dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.bun/install/cache
          key: bun-desktop-darwin-${{ matrix.arch }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-desktop-darwin-${{ matrix.arch }}-

      - name: Download web build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: web-dist-macos
          path: apps/mobile/dist/

      - name: Download Bun binary (for bundling in app)
        run: |
          mkdir -p apps/desktop/resources/bun
          cd apps/desktop/resources/bun
          curl -fSL -o bun.zip "https://github.com/oven-sh/bun/releases/download/bun-v${{ env.BUN_VERSION }}/${{ matrix.bun-target }}.zip"
          unzip bun.zip
          mv ${{ matrix.bun-target }}/bun* . || true
          rm -rf ${{ matrix.bun-target }} bun.zip
          ls -la

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Go VM helper
        working-directory: apps/desktop/native/shogo-vm
        run: |
          GO_ARCH=${{ matrix.arch == 'arm64' && 'arm64' || 'amd64' }}
          CGO_ENABLED=1 GOOS=darwin GOARCH=$GO_ARCH go build -o shogo-vm-$GO_ARCH .
          mkdir -p ../../resources/vm-helper
          cp shogo-vm-$GO_ARCH ../../resources/vm-helper/
          ls -la ../../resources/vm-helper/

      - name: Install monorepo dependencies
        run: bun install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build workspace packages
        run: cd packages/sdk && bun run build

      - name: Generate Prisma clients (PG + SQLite)
        run: bun run db:generate:all

      - name: Copy web build into resources
        run: |
          mkdir -p apps/desktop/resources/web
          cp -r apps/mobile/dist/* apps/desktop/resources/web/

      - name: Bundle API server into resources
        run: node apps/desktop/scripts/bundle-api.mjs

      - name: Create seed database (SQLite)
        run: bunx prisma db push --schema=prisma/schema.local.prisma --accept-data-loss
        env:
          DATABASE_URL: file:./apps/desktop/resources/seed.db

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm install

      - name: Build TypeScript
        working-directory: apps/desktop
        run: npx tsc

      - name: Prepare macOS Code Signing
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -n "$APPLE_CERTIFICATE_BASE64" ]; then
            KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
            KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
            CERT_PATH="$RUNNER_TEMP/certificate.p12"

            echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"

            security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
              -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
            security set-key-partition-list -S apple-tool:,apple:,codesign: \
              -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
            security default-keychain -d user -s "$KEYCHAIN_PATH"

            rm "$CERT_PATH"
            echo "Apple certificate imported into temporary keychain."
            security find-identity -v -p codesigning "$KEYCHAIN_PATH"
            echo "SIGNING_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          else
            echo "No Apple certificate provided. Skipping macOS code signing."
          fi

      - name: Codesign Go VM helper
        if: env.APPLE_CERTIFICATE_BASE64 != ''
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
        run: |
          GO_ARCH=${{ matrix.arch == 'arm64' && 'arm64' || 'amd64' }}
          VM_HELPER="apps/desktop/resources/vm-helper/shogo-vm-$GO_ARCH"
          if [ -f "$VM_HELPER" ]; then
            codesign --force --options runtime \
              --entitlements apps/desktop/entitlements.plist \
              --sign - "$VM_HELPER"
            echo "Go VM helper codesigned with virtualization entitlement"
          fi

      - name: Package Electron app
        working-directory: apps/desktop
        run: npx electron-forge package --arch=${{ matrix.arch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Codesign app bundle
        if: env.SIGNING_KEYCHAIN != ''
        working-directory: apps/desktop
        run: |
          set -euo pipefail
          HASH=$(security find-identity -v -p codesigning "$SIGNING_KEYCHAIN" | head -1 | awk '{print $2}')
          echo "Signing identity: $HASH"
          APP_PATH=$(find out -name "Shogo.app" -maxdepth 4 -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Shogo.app not found in out/"
            find out -name "*.app" -maxdepth 4
            exit 1
          fi
          echo "App bundle: $APP_PATH"
          SIGN_ARGS=(--sign "$HASH" --keychain "$SIGNING_KEYCHAIN" --force --timestamp --options runtime)

          # 1) Sign all .dylib and .so files
          find "$APP_PATH" -type f \( -name "*.dylib" -o -name "*.so" \) | while read -r f; do
            echo "  signing lib: $f"
            codesign "${SIGN_ARGS[@]}" "$f"
          done

          # 2) Sign Mach-O binaries inside Frameworks and Resources (NOT Contents/MacOS — main binary is signed with the app bundle)
          find "$APP_PATH/Contents/Frameworks" "$APP_PATH/Contents/Resources" -type f -perm +111 ! -name "*.dylib" ! -name "*.so" 2>/dev/null | while read -r f; do
            if file "$f" | grep -q "Mach-O"; then
              echo "  signing binary: $f"
              codesign "${SIGN_ARGS[@]}" "$f"
            fi
          done

          # 3) Sign helper apps (deepest first)
          find "$APP_PATH/Contents/Frameworks" -name "*.app" -type d -depth | while read -r helper; do
            echo "  signing helper: $helper"
            codesign "${SIGN_ARGS[@]}" "$helper"
          done

          # 4) Sign frameworks (deepest first)
          find "$APP_PATH/Contents/Frameworks" -name "*.framework" -type d -depth | while read -r fw; do
            echo "  signing framework: $fw"
            codesign "${SIGN_ARGS[@]}" "$fw"
          done

          # 5) Sign the main app bundle (signs Contents/MacOS/* and validates all subcomponents)
          echo "  signing app: $APP_PATH"
          codesign "${SIGN_ARGS[@]}" --entitlements ./entitlements.plist "$APP_PATH"

          echo "Verifying signature..."
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          echo "Codesign complete."

      - name: Notarize app bundle
        if: env.SIGNING_KEYCHAIN != ''
        working-directory: apps/desktop
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          APP_PATH=$(find out -name "Shogo.app" -maxdepth 4 -type d | head -1)
          ZIP_PATH="/tmp/Shogo-notarize.zip"
          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"
          echo "Submitting for notarization..."
          xcrun notarytool submit "$ZIP_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 10m
          echo "Stapling notarization ticket..."
          xcrun stapler staple "$APP_PATH"
          echo "Notarization complete."

      - name: Build distribution artifacts
        working-directory: apps/desktop
        run: npx electron-forge make --arch=${{ matrix.arch }} --skip-package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup macOS Signing Keychain
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: desktop-darwin-${{ matrix.arch }}
          path: apps/desktop/out/make/**/*

  release:
    name: Create Release
    needs: build-desktop
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts/
          pattern: desktop-darwin-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          name: Shogo Desktop ${{ github.ref_name }}
          draft: false
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
