name: Desktop Release (macOS)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0)'
        required: true
        type: string
  push:
    tags:
      - 'v[0-9]*'

env:
  BUN_VERSION: '1.3.11'
  # PINNED, do not float to '24'. Node 24.16.0 silently breaks
  # @electron/packager 18.4.4: packaging runs through "Copying files /
  # Finalizing package" and exits 0 without producing Shogo.app, bricking the
  # release. v1.8.16 packaged fine on 24.15.0; v1.8.17–v1.8.19 failed on 24.16.0
  # (the only environmental change between them). Pin to the last known-good
  # until @electron-forge/@electron/packager ships a Node 24.16+-compatible
  # release. See the build-desktop "Package Electron app" step.
  NODE_VERSION: '24.15.0'
  GO_VERSION: '1.22'

jobs:
  preflight:
    # Release-blocking sanity checks that have no platform dependencies.
    # Runs FIRST and gates every downstream job — see the matching
    # `preflight` job in desktop-release-windows.yml for the
    # narrative. Identical step set on purpose: a release is only ever
    # promoted when both platforms' tagged builds succeed, so any drift
    # in what we check between the two workflows would be a bug.
    name: Preflight checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Replay desktop SQLite migrations against an empty DB
        run: bun scripts/check-migrations.ts

      - name: Install dependencies (for prisma migrate diff)
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Check desktop SQLite migrations match schema.local.prisma
        run: bun run check:desktop-schema-drift

  build-web:
    name: Build Expo Web
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache bun dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.bun/install/cache
          key: bun-web-${{ hashFiles('bun.lock') }}
          restore-keys: bun-web-

      - name: Install dependencies
        # See desktop-release-windows.yml for why GITHUB_TOKEN is required:
        # `@vscode/ripgrep` postinstall hits api.github.com unauthenticated
        # otherwise and gets 403'd on the shared-IP runner pool.
        run: bun install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build workspace packages
        run: bun run build:packages

      - name: Build web
        run: bun run web:build
        env:
          EXPO_PUBLIC_LOCAL_MODE: 'true'
          EXPO_PUBLIC_API_URL: 'http://localhost:8002'
          # Pass the desktop Sentry DSN into the renderer build so the
          # existing `@sentry/react-native` init in apps/mobile/app/_layout.tsx
          # activates inside the Electron BrowserWindow. The renderer is a
          # web build (`Platform.OS === 'web'`), so `_layout.tsx` reads
          # `EXPO_PUBLIC_SENTRY_DSN_WEB`. Renderer events land in the
          # `shogo-desktop` Sentry project (same as main-process events,
          # separate from `shogo-ios` / `shogo-android` / `javascript-react`).
          # Falls back to empty (Sentry self-disables) on forks / branches
          # without the secret.
          EXPO_PUBLIC_SENTRY_DSN_WEB: ${{ secrets.SHOGO_DESKTOP_SENTRY_DSN }}

      - name: Upload web build
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: web-dist-macos
          path: apps/mobile/dist/

  build-desktop:
    name: Build Desktop (macOS ${{ matrix.arch }})
    needs: [preflight, build-web]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            bun-target: bun-darwin-aarch64
          - arch: x64
            bun-target: bun-darwin-x64

    runs-on: macos-14
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set app version from tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"
          cd apps/desktop
          node -e "const p=require('./package.json'); p.version='$VERSION'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n')"
          echo "Set desktop app version to $VERSION"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache bun dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.bun/install/cache
          key: bun-desktop-darwin-${{ matrix.arch }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-desktop-darwin-${{ matrix.arch }}-

      - name: Download web build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: web-dist-macos
          path: apps/mobile/dist/

      - name: Download Bun binary (for bundling in app)
        run: |
          mkdir -p apps/desktop/resources/bun
          cd apps/desktop/resources/bun
          curl -fSL -o bun.zip "https://github.com/oven-sh/bun/releases/download/bun-v${{ env.BUN_VERSION }}/${{ matrix.bun-target }}.zip"
          unzip bun.zip
          mv ${{ matrix.bun-target }}/bun* . || true
          rm -rf ${{ matrix.bun-target }} bun.zip
          # Bun's macOS/Linux zip ships only `bun`; `bunx` is conventionally a
          # hardlink/symlink to the same binary (Bun reads argv[0] to decide
          # its mode). Without this, every `bunx shogo generate` inside a
          # project workspace fails with `bunx: command not found`
          # (PreviewManager invokes scripts through /bin/sh, which has no
          # built-in `bun x` alias). This breaks prisma generate →
          # server.tsx crashes on first project open. electron-packager
          # preserves hardlinks as independent files, so this survives
          # `.app` packaging cleanly. We do not exec the binary here:
          # macos-14 runners are arm64 and cannot run the bun-darwin-x64
          # binary natively, so a `--version` self-check would SIGILL
          # (exit 132) on the x64 matrix leg.
          ln bun bunx
          chmod +x bun bunx
          ls -la

      - name: Bundle QEMU for VM isolation
        if: matrix.arch == 'arm64'
        run: |
          brew install qemu dylibbundler
          mkdir -p apps/desktop/resources/vm
          QEMU_PREFIX=$(brew --prefix qemu)
          cp "$QEMU_PREFIX/bin/qemu-system-aarch64" apps/desktop/resources/vm/
          cp "$QEMU_PREFIX/bin/qemu-img" apps/desktop/resources/vm/
          cd apps/desktop/resources/vm
          dylibbundler -of -b -cd -x qemu-system-aarch64 -d lib/ -p @executable_path/lib/
          dylibbundler -of -b -cd -x qemu-img -d lib/ -p @executable_path/lib/
          echo "=== Verifying no absolute Homebrew paths remain ==="
          ! otool -L qemu-system-aarch64 | grep /opt/homebrew
          ! otool -L qemu-img | grep /opt/homebrew
          echo "=== Bundled QEMU binaries ==="
          ls -lhR .

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Go VM helper
        working-directory: apps/desktop/native/shogo-vm
        run: |
          GO_ARCH=${{ matrix.arch == 'arm64' && 'arm64' || 'amd64' }}
          CGO_ENABLED=1 GOOS=darwin GOARCH=$GO_ARCH go build -o shogo-vm-$GO_ARCH .
          mkdir -p ../../resources/vm-helper
          cp shogo-vm-$GO_ARCH ../../resources/vm-helper/
          ls -la ../../resources/vm-helper/

      - name: Build shogo-sysaudio (macOS system audio helper)
        working-directory: apps/desktop/native/shogo-sysaudio
        run: |
          SWIFT_ARCH=${{ matrix.arch == 'arm64' && 'arm64' || 'amd64' }}
          make build-$SWIFT_ARCH
          mkdir -p ../../resources/shogo-sysaudio
          cp shogo-sysaudio-$SWIFT_ARCH ../../resources/shogo-sysaudio/
          ls -la ../../resources/shogo-sysaudio/

      - name: Install monorepo dependencies
        run: bun install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build workspace packages
        run: bun run build:packages

      # `apps/api/src/generated/admin-routes.ts` is git-ignored and produced
      # by `bun run generate:routes`. The root postinstall tries to run this
      # during `bun install`, but `@shogo-ai/cli` (which `packages/sdk/bin/shogo.ts`
      # imports as `@shogo-ai/cli/pkg`) isn't built yet at that point, so it
      # silently no-ops. Re-running it here — after `build:packages` has built
      # the CLI — guarantees the generated files exist before `bundle-api.mjs`
      # imports them at apps/api/src/server.ts:81. Without this, the bundler
      # fails with `Could not resolve "./generated/admin-routes"`.
      - name: Generate Hono routes
        run: bun run generate:routes

      - name: Generate Prisma clients (PG + SQLite)
        run: bun run db:generate:all

      # resources/web/ is materialised by `apps/desktop/scripts/sync-web.mjs`,
      # invoked automatically by the `prePackage` hook in
      # `apps/desktop/forge.config.ts`. We set SKIP_MOBILE_BUILD=1 in the
      # packaging step below so the hook reuses the apps/mobile/dist/
      # artifact we just downloaded instead of rebuilding it.
      #
      # The previous design (manual `cp -r apps/mobile/dist/* …`) shipped
      # a Monaco-less bundle in v1.8.12 / v1.8.13 because `bun run web:build`
      # at the root skipped `copy-monaco-vs.mjs`. sync-web.mjs now drives
      # both the mirror AND the post-copy integrity check (vs/loader.js +
      # vs/editor/editor.main.js are required and non-truncated).

      - name: Bundle API server into resources
        # SHOGO_TARGET_ARCH tells bundle-api.mjs which arch the .app is for, so
        # it installs target-arch optional native deps (e.g. sqlite-vec-darwin-
        # x64) instead of the arm64-runner's host arch. See bundle-api.mjs.
        env:
          SHOGO_TARGET_ARCH: ${{ matrix.arch }}
        run: node apps/desktop/scripts/bundle-api.mjs

      - name: Create seed database (SQLite)
        run: bunx prisma db push --schema=prisma/schema.local.prisma --accept-data-loss
        env:
          DATABASE_URL: file:./apps/desktop/resources/seed.db

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm install

      # @electron/get caches downloaded Electron zips here. Caching it across
      # runs means a flaky network on any single run can't leave us without a
      # binary — see the next step. Keyed on the lockfile so an electron bump
      # invalidates it.
      - name: Cache Electron binaries
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/Library/Caches/electron
          key: electron-cache-darwin-${{ matrix.arch }}-${{ hashFiles('apps/desktop/package-lock.json') }}
          restore-keys: electron-cache-darwin-${{ matrix.arch }}-

      - name: Ensure Electron binary is downloaded (prevent silent empty package)
        # ROOT CAUSE of the v1.8.17/v1.8.18 release failures: Electron's npm
        # postinstall downloads the prebuilt binary into node_modules/electron/
        # dist via @electron/get. On a flaky runner that download can fail/return
        # empty WITHOUT failing `npm install` (the same runs show ETIMEDOUT on
        # the Playwright Chromium download). @electron/packager then "Copies
        # files" from an empty dist in milliseconds and exits 0 having produced
        # NO Shogo.app — bricking the tagged release with no error. v1.8.16
        # simply got a healthy network and worked.
        #
        # We make the binary non-optional: force a clean re-download of the
        # TARGET arch (electron's install.js honours npm_config_arch, so the x64
        # leg pre-warms the x64 cache that @electron/packager later reads on this
        # arm64 runner), retry on failure, and HARD-VERIFY the real Mach-O exists
        # before packaging. If it still can't be fetched we fail loudly here
        # rather than shipping an empty app.
        working-directory: apps/desktop
        env:
          # Lets @electron/get use the GitHub API without hitting the
          # unauthenticated shared-runner rate limit when resolving releases.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          DIST="node_modules/electron/dist"
          BIN="$DIST/Electron.app/Contents/MacOS/Electron"
          for attempt in 1 2 3 4 5; do
            if [ -f "$BIN" ]; then
              echo "Electron binary present: $BIN"
              break
            fi
            echo "=== Electron binary missing — clean download attempt $attempt (arch=${{ matrix.arch }}) ==="
            rm -rf "$DIST" node_modules/electron/path.txt
            # Set both arch envs: older electron reads npm_config_arch at
            # postinstall, newer builds read ELECTRON_INSTALL_ARCH. The x64 leg
            # runs on this arm64 host, so without an explicit arch it would
            # fetch arm64 and the x64 package would still copy a wrong/host dist.
            npm_config_arch=${{ matrix.arch }} ELECTRON_INSTALL_ARCH=${{ matrix.arch }} \
              node node_modules/electron/install.js \
              || echo "  (electron install.js exited non-zero on attempt $attempt)"
            [ "$attempt" -lt 5 ] && [ ! -f "$BIN" ] && sleep 10
          done
          if [ ! -f "$BIN" ]; then
            echo "::error::Electron ${{ matrix.arch }} binary could not be downloaded after 5 attempts. @electron/packager would silently produce an empty app, so failing the build now."
            exit 1
          fi
          echo "Electron binary ready ($(du -sh "$DIST" | cut -f1)) for ${{ matrix.arch }}."

      - name: Build TypeScript
        working-directory: apps/desktop
        # `npx tsc` emits dist/{main,preload,...}.js. The follow-up
        # `bundle:main` step re-bundles dist/main.js with `bun build` so
        # workspace TS imports (notably @shogo-ai/worker/cloud-login)
        # get inlined; tsc on its own can't resolve them because
        # apps/desktop is npm-installed, not a bun workspace member.
        # See apps/desktop/scripts/bundle-main.mjs for details.
        #
        # `bundle:pty-host` is the matching step for the PTY utility
        # process. pty-host-client.ts forks `dist/pty-host.js` at the
        # flat dist root (not dist/pty-host/pty-host.js where tsc would
        # put it), AND inlines `@shogo/pty-core` which tsc cannot
        # resolve. Without this step, the packaged desktop terminal
        # fails at runtime with MODULE_NOT_FOUND on first spawn.
        # See apps/desktop/scripts/bundle-pty-host.mjs for details.
        run: npx tsc && npm run bundle:main && npm run bundle:pty-host
        env:
          # Baked into dist/main.js via `--define` in bundle-main.mjs
          # so the packaged app reports main-process crashes without
          # needing a runtime config file. Empty on forks / branches
          # without the secret — Sentry self-disables in that case.
          SHOGO_DESKTOP_SENTRY_DSN: ${{ secrets.SHOGO_DESKTOP_SENTRY_DSN }}

      # Desktop notarization (xcrun notarytool) requires a "Developer ID
      # Application" certificate, which is distinct from the "Apple
      # Distribution" cert used by `.github/workflows/ios.yml` for App Store
      # submissions. We keep them as separate GitHub secrets so the two
      # pipelines never collide: iOS keeps using APPLE_CERTIFICATE_BASE64
      # (Apple Distribution); macOS desktop uses
      # APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 (Developer ID Application).
      # If anyone ever reuses APPLE_CERTIFICATE_BASE64 here, notarization
      # will reject every Mach-O in the .app with "The binary is not signed
      # with a valid Developer ID certificate."
      - name: Prepare macOS Code Signing
        env:
          APPLE_DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          if [ -n "$APPLE_DEVELOPER_ID_CERTIFICATE_BASE64" ]; then
            KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
            KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
            CERT_PATH="$RUNNER_TEMP/certificate.p12"

            echo "$APPLE_DEVELOPER_ID_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"

            security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security import "$CERT_PATH" -P "$APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD" \
              -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
            security set-key-partition-list -S apple-tool:,apple:,codesign: \
              -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
            security default-keychain -d user -s "$KEYCHAIN_PATH"

            rm "$CERT_PATH"
            echo "Apple certificate imported into temporary keychain."
            echo "--- All codesigning identities in keychain ---"
            security find-identity -v -p codesigning "$KEYCHAIN_PATH"

            # Fail fast (saves ~10 min of CI) if the secret holds the wrong
            # cert type — e.g. "Apple Distribution" (App Store), "Apple
            # Development" (local), or "Developer ID Installer" (pkg only).
            # Only "Developer ID Application" passes notarization for the
            # direct-distribution .app/.dmg this workflow ships.
            DEVELOPER_ID_LINE=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
              | grep -E '"Developer ID Application: ' \
              | head -1 || true)
            if [ -z "$DEVELOPER_ID_LINE" ]; then
              echo "::error title=Wrong macOS signing certificate::APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 must contain a 'Developer ID Application' certificate. Apple notarization will reject anything else."
              echo "::error::See https://developer.apple.com/account/resources/certificates → '+' → 'Developer ID Application' to generate the correct cert type."
              exit 1
            fi
            DEVELOPER_ID_HASH=$(echo "$DEVELOPER_ID_LINE" | awk '{print $2}')
            DEVELOPER_ID_NAME=$(echo "$DEVELOPER_ID_LINE" | sed -E 's/^[[:space:]]*[0-9]+\)[[:space:]]+[A-F0-9]+[[:space:]]+"(Developer ID Application: [^"]+)".*/\1/')
            echo "Using Developer ID identity: $DEVELOPER_ID_NAME ($DEVELOPER_ID_HASH)"

            echo "SIGNING_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
            echo "SIGNING_IDENTITY_HASH=$DEVELOPER_ID_HASH" >> "$GITHUB_ENV"
            echo "SIGNING_IDENTITY_NAME=$DEVELOPER_ID_NAME" >> "$GITHUB_ENV"
          else
            echo "No Developer ID Application certificate provided. Skipping macOS code signing."
          fi

      - name: Codesign Go VM helper
        if: env.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 != ''
        env:
          APPLE_DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
        run: |
          GO_ARCH=${{ matrix.arch == 'arm64' && 'arm64' || 'amd64' }}
          VM_HELPER="apps/desktop/resources/vm-helper/shogo-vm-$GO_ARCH"
          if [ -f "$VM_HELPER" ]; then
            codesign --force --options runtime \
              --entitlements apps/desktop/entitlements.plist \
              --sign - "$VM_HELPER"
            echo "Go VM helper codesigned with virtualization entitlement"
          fi

      - name: Package Electron app (with retry on silent no-op)
        working-directory: apps/desktop
        # SKIP_MOBILE_BUILD=1 tells the forge `prePackage` hook (which
        # runs `scripts/sync-web.mjs`) to reuse apps/mobile/dist/ from
        # the build-web artifact instead of running `bun run build` in
        # apps/mobile again. The mirror+verify step still runs and will
        # fail loudly if vs/loader.js or vs/editor/editor.main.js is
        # missing — see apps/desktop/forge.config.ts and
        # apps/desktop/scripts/sync-web.mjs.
        #
        # @electron/packager intermittently exits 0 while producing NO
        # `out/` directory: it prints "Copying files / Preparing native
        # dependencies / Finalizing package" within ~30 ms and returns
        # without writing anything. This is a transient packager flake —
        # it has struck both arch legs on a single run (v1.8.17) even
        # though the immediately-preceding release (v1.8.16) packaged the
        # identical code fine, and the failing commit touched only
        # agent-runtime. Previously a standalone "verify" step only
        # *detected* the no-op and failed the whole tagged release,
        # forcing a manual `gh run rerun`. We now retry in-place: run the
        # packager, check for Shogo.app, and on a no-op wipe `out/` and
        # try again (up to 3 attempts) before failing.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_MOBILE_BUILD: '1'
          # Surface @electron/packager's swallowed reason for the silent no-op.
          DEBUG: '@electron/packager,electron-packager,@electron/universal,@electron/get,electron-forge:*'
          DEBUG_COLORS: 'false'
        run: |
          set -uo pipefail
          EXPECTED="out/Shogo-darwin-${{ matrix.arch }}/Shogo.app"
          ATTEMPTS=3
          for attempt in $(seq 1 "$ATTEMPTS"); do
            echo "=== electron-forge package attempt $attempt/$ATTEMPTS ==="
            rm -rf out
            npx electron-forge package --arch=${{ matrix.arch }} || echo "  (electron-forge exited non-zero on attempt $attempt)"
            if [ -d "$EXPECTED" ]; then
              echo "Packager produced: $EXPECTED (attempt $attempt)"
              exit 0
            fi
            echo "::warning::electron-forge package produced no $EXPECTED on attempt $attempt (likely the silent @electron/packager no-op)."
            echo "out/ contents after attempt $attempt:"
            ls -la out/ 2>&1 || echo "  (out/ does not exist)"
            [ "$attempt" -lt "$ATTEMPTS" ] && sleep 5
          done
          echo "::error::electron-forge package failed to produce $EXPECTED after $ATTEMPTS attempts."
          exit 1

      - name: Verify bundled native binaries match target arch
        # Guards the v1.8.14 failure mode: macOS x64 builds are cross-compiled
        # on this arm64 runner, so `bun install` / `npm install` resolve native
        # arch-specific deps (e.g. @prisma/engines' schema-engine, sqlite-vec,
        # node-pty) for the HOST arch (arm64) and electron-forge packages them
        # into the x64 .app. Packaging succeeds; the app then bricks on first
        # launch for Intel users with a wrong-arch binary. This step inspects
        # every Mach-O in the .app (via `lipo -archs`, no execution required, so
        # it works for the x64 leg on an arm64 runner) and fails the build if
        # any binary is missing the target arch slice.
        working-directory: apps/desktop
        run: node scripts/check-native-arch.mjs --arch ${{ matrix.arch }} "out/Shogo-darwin-${{ matrix.arch }}/Shogo.app"

      - name: Codesign app bundle
        if: env.SIGNING_KEYCHAIN != ''
        working-directory: apps/desktop
        run: |
          set -euo pipefail
          # SIGNING_IDENTITY_HASH/_NAME come from "Prepare macOS Code
          # Signing", which already filtered for "Developer ID Application:"
          # and verified there was a match. Reusing them here (instead of
          # re-running `find-identity | head -1`) makes the codesign step
          # deterministic when the keychain ever holds more than one
          # identity, and surfaces a useful name in the log.
          HASH="$SIGNING_IDENTITY_HASH"
          echo "Signing identity: $SIGNING_IDENTITY_NAME ($HASH)"
          APP_PATH=$(find out -name "Shogo.app" -maxdepth 4 -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Shogo.app not found in out/"
            find out -name "*.app" -maxdepth 4
            exit 1
          fi
          echo "App bundle: $APP_PATH"
          SIGN_ARGS=(--sign "$HASH" --keychain "$SIGNING_KEYCHAIN" --force --timestamp --options runtime)
          SIGNED=0

          sign_file() {
            codesign "${SIGN_ARGS[@]}" "$1" 2>&1 && SIGNED=$((SIGNED + 1)) || echo "  WARNING: failed to sign $1"
          }

          echo "=== Phase 1: Sign all native binaries (Mach-O, dylib, .node, .so) ==="
          find "$APP_PATH" -type f \( -name "*.dylib" -o -name "*.dylib.*" -o -name "*.so" -o -name "*.node" \) | sort -r | while read -r f; do
            echo "  signing: $f"
            sign_file "$f"
          done

          find "$APP_PATH" -type f -perm +111 ! -name "*.dylib" ! -name "*.dylib.*" ! -name "*.so" ! -name "*.node" ! -name "*.js" ! -name "*.py" ! -name "*.sh" | while read -r f; do
            if file "$f" | grep -q "Mach-O"; then
              echo "  signing (with child entitlements): $f"
              codesign "${SIGN_ARGS[@]}" --entitlements ./entitlements.child.plist "$f" 2>&1 && SIGNED=$((SIGNED + 1)) || echo "  WARNING: failed to sign $f"
            fi
          done

          echo "=== Phase 2: Sign helper .app bundles with child entitlements (deepest first) ==="
          find "$APP_PATH" -name "*.app" -type d ! -path "$APP_PATH" -depth | while read -r bundle; do
            echo "  signing bundle: $bundle"
            codesign "${SIGN_ARGS[@]}" --entitlements ./entitlements.child.plist "$bundle" 2>&1 && SIGNED=$((SIGNED + 1)) || echo "  WARNING: failed to sign $bundle"
          done

          echo "=== Phase 3: Sign .framework bundles (deepest first) ==="
          find "$APP_PATH" -name "*.framework" -type d -depth | while read -r fw; do
            echo "  signing framework: $fw"
            sign_file "$fw"
          done

          echo "=== Phase 4: Sign main app bundle with entitlements ==="
          echo "  signing app: $APP_PATH"
          codesign "${SIGN_ARGS[@]}" --entitlements ./entitlements.plist "$APP_PATH"

          echo "Verifying signature..."
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          echo "Codesign complete."

      - name: Notarize app bundle
        if: env.SIGNING_KEYCHAIN != ''
        working-directory: apps/desktop
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          APP_PATH=$(find out -name "Shogo.app" -maxdepth 4 -type d | head -1)
          ZIP_PATH="/tmp/Shogo-notarize.zip"
          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"
          echo "Submitting for notarization..."
          SUBMIT_OUTPUT=$(xcrun notarytool submit "$ZIP_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 15m 2>&1) || true
          echo "$SUBMIT_OUTPUT"
          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | grep "id:" | head -1 | awk '{print $2}')
          STATUS=$(echo "$SUBMIT_OUTPUT" | grep "^  *status:" | tail -1 | awk '{print $2}')
          if [ -z "$STATUS" ] && [ -n "$SUBMISSION_ID" ]; then
            STATUS=$(xcrun notarytool info "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" 2>&1 | grep "status:" | tail -1 | awk '{print $2}')
          fi
          if [ "$STATUS" != "Accepted" ]; then
            echo "::error::Notarization failed with status: $STATUS"
            echo "Fetching notarization log..."
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              /tmp/notarization-log.json 2>&1 || true
            cat /tmp/notarization-log.json 2>/dev/null || echo "Could not fetch log"
            exit 1
          fi
          echo "Stapling notarization ticket..."
          xcrun stapler staple "$APP_PATH"
          echo "Notarization complete."

      - name: Build distribution artifacts
        working-directory: apps/desktop
        run: npx electron-forge make --arch=${{ matrix.arch }} --skip-package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup macOS Signing Keychain
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: desktop-darwin-${{ matrix.arch }}
          path: apps/desktop/out/make/**/*

  boot-smoke-x64:
    # End-to-end guard for the v1.8.14 incident: the x64 .app is cross-built on
    # the arm64 `build-desktop` runner and is NEVER executed there (an arm64 host
    # can't run an x64 binary), so a boot-fatal regression on Intel sails through
    # every existing check. This job runs on a real Intel runner
    # (macos-15-intel), extracts the shipped x64 app, launches it from a clean
    # profile, and asserts the local server actually starts — which is exactly
    # the path that the bad PRISMA_SCHEMA_ENGINE_BINARY bricked.
    #
    # Must stay on an Intel label: the whole point is to exercise the x86_64
    # slice on real Intel hardware. `macos-13` was GitHub's prior Intel runner
    # but was fully retired on 2025-12-04, after which this job queued forever
    # with no runner and the gated `release` job below never ran. `macos-15-intel`
    # is the supported x86_64 replacement (Apple Silicon arm64 runners can't
    # execute the x64 binary, so we can't fall back to those).
    name: Boot smoke test (macOS x64 / Intel)
    needs: build-desktop
    runs-on: macos-15-intel
    timeout-minutes: 15
    steps:
      - name: Download x64 artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: desktop-darwin-x64
          path: artifacts/

      - name: Extract Shogo.app
        id: extract
        run: |
          set -euo pipefail
          # maker-zip emits Shogo-darwin-x64-<version>.zip; prefer it over the
          # .dmg because unzip needs no `hdiutil attach` privileges.
          ZIP=$(find artifacts -type f -name 'Shogo-darwin-x64-*.zip' -print -quit || true)
          if [ -z "$ZIP" ]; then
            echo "::error::Could not find Shogo-darwin-x64-*.zip in artifacts/"
            find artifacts -type f | head -50
            exit 1
          fi
          echo "Found: $ZIP"
          mkdir -p extracted
          unzip -q "$ZIP" -d extracted
          APP=$(find extracted -maxdepth 2 -name 'Shogo.app' -type d -print -quit)
          if [ -z "$APP" ]; then
            echo "::error::Shogo.app not found after unzip"
            find extracted -maxdepth 3 | head -50
            exit 1
          fi
          echo "app=$APP" >> "$GITHUB_OUTPUT"
          echo "Extracted app: $APP"

      - name: Assert app binary is x86_64
        run: |
          set -euo pipefail
          BIN="${{ steps.extract.outputs.app }}/Contents/MacOS/Shogo"
          ARCHS=$(lipo -archs "$BIN")
          echo "Shogo binary archs: $ARCHS"
          if ! echo "$ARCHS" | grep -qw x86_64; then
            echo "::error::x64 artifact's main binary is not x86_64 (got: $ARCHS)"
            exit 1
          fi

      - name: Launch app and verify local server boots
        run: |
          set -uo pipefail
          APP="${{ steps.extract.outputs.app }}"
          BIN="$APP/Contents/MacOS/Shogo"

          # Guarantee the first-launch (seed + migrate) path by clearing any
          # prior profile, and start from an empty log so our markers are
          # unambiguous. console.log (INFO) and writeLogSync (FATAL) both append
          # to this file — see apps/desktop/src/main.ts.
          rm -rf "$HOME/Library/Application Support/Shogo" "$HOME/Library/Logs/Shogo"
          mkdir -p "$HOME/Library/Logs/Shogo"
          LOG="$HOME/Library/Logs/Shogo/main.log"
          : > "$LOG"

          # Exec the Mach-O directly (not `open`) so an unsigned/un-notarized
          # build on a fork doesn't get blocked or path-translocated by
          # Gatekeeper. stdout/stderr are also captured as a fallback signal.
          "$BIN" > /tmp/shogo-stdout.log 2>&1 &
          APP_PID=$!
          echo "Launched Shogo (pid=$APP_PID)"

          PASS_RE='API server is healthy'
          FAIL_RE='\[FATAL\].*Failed to start local server|Failed to run database migrations'

          RESULT=""
          for i in $(seq 1 120); do
            if ! kill -0 "$APP_PID" 2>/dev/null; then
              # Process exited on its own — only the failure path does that
              # during boot (app.quit() after the FATAL).
              if grep -qE "$FAIL_RE" "$LOG" /tmp/shogo-stdout.log 2>/dev/null; then
                RESULT="fail"; break
              fi
            fi
            if grep -qE "$FAIL_RE" "$LOG" /tmp/shogo-stdout.log 2>/dev/null; then
              RESULT="fail"; break
            fi
            if grep -qE "$PASS_RE" "$LOG" /tmp/shogo-stdout.log 2>/dev/null; then
              RESULT="pass"; break
            fi
            sleep 2
          done

          echo "=== main.log ==="
          cat "$LOG" 2>/dev/null || true
          echo "=== stdout/stderr ==="
          cat /tmp/shogo-stdout.log 2>/dev/null || true
          echo "================="

          # Always tear the app down; it stays resident on success.
          kill "$APP_PID" 2>/dev/null || true
          pkill -f "$APP/Contents/MacOS/Shogo" 2>/dev/null || true

          if [ "$RESULT" = "pass" ]; then
            echo "Boot smoke test PASSED — local server reached healthy state on Intel."
            exit 0
          fi
          if [ "$RESULT" = "fail" ]; then
            echo "::error::Boot smoke test FAILED — the packaged x64 app could not start its local server on Intel. See logs above."
            exit 1
          fi
          echo "::error::Boot smoke test TIMED OUT — neither healthy nor fatal marker appeared within ~240s. See logs above."
          exit 1

  release:
    name: Create Release
    needs: [build-desktop, boot-smoke-x64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts/
          pattern: desktop-darwin-*

      - name: Add stable macOS download aliases
        run: |
          set -euo pipefail
          mkdir -p artifacts/stable-downloads

          for arch in arm64 x64; do
            dmg_path=$(find artifacts -type f -name "Shogo-*-${arch}.dmg" -print -quit)
            if [ -z "$dmg_path" ]; then
              echo "::error::Could not find macOS ${arch} DMG artifact"
              exit 1
            fi

            cp "$dmg_path" "artifacts/stable-downloads/Shogo-${arch}.dmg"
            echo "Created stable download alias: Shogo-${arch}.dmg -> $dmg_path"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: Shogo Desktop ${{ github.ref_name }}
          # Keep the release a DRAFT while every workflow that targets this
          # tag uploads its assets. Four workflows publish to the same v*
          # release (this one + desktop-release-windows, publish-agent-runtime,
          # publish-shogo-worker), so a non-draft create here would expose a
          # release that is still missing the other workflows' assets. The
          # finalize-release.yml coordinator flips draft -> published only once
          # all four runs for this commit have succeeded.
          draft: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Make desktop downloads the headline of the release notes
        # Four workflows publish to this tag (macos + windows desktop,
        # publish-agent-runtime, publish-shogo-worker), so a desktop user lands
        # on a release listing ~26 assets and can't tell which to download.
        # This job is gated on boot-smoke-x64 — reliably the LAST publisher — so
        # we deterministically (re)write the title + body here with the
        # installers up top and everything else (CLI / runtime / auto-update
        # feeds) tucked into a collapsed section. `gh release edit` overwrites
        # the body regardless of which workflow created the release first.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cat > release-notes.md <<'EOF'
          ## Download Shogo Desktop

          ### macOS
          - **Apple Silicon (M1–M4):** [Shogo-arm64.dmg](${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/Shogo-arm64.dmg)
          - **Intel:** [Shogo-x64.dmg](${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/Shogo-x64.dmg)

          ### Windows
          - **Installer:** [Shogo-Setup.exe](${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/Shogo-Setup.exe)

          > Not sure which Mac you have? Apple menu → **About This Mac**. "Apple M…" is Apple Silicon; "Intel" is Intel.

          <details>
          <summary>Other files in this release — you don't need these to install the desktop app</summary>

          These ride the same tag for the CLI, self-hosted workers, and the in-app auto-updater:

          - `shogo-agent-runtime-*.tar.gz` — fetched by `shogo runtime install`
          - `shogo-*.tar.gz` — Shogo CLI / worker binaries
          - `*.zip`, `*.nupkg`, `RELEASES` — macOS & Windows auto-update feeds (used by the app, not for manual download)
          - `*.sha256` — checksums for the tarballs above
          </details>
          EOF
          gh release edit "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "Shogo Desktop ${{ github.ref_name }}" \
            --notes-file release-notes.md
          echo "Release notes updated for ${{ github.ref_name }}."
