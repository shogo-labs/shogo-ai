# =============================================================================
# Metal node-agent release (pull-based deploy for the bare-metal Firecracker fleet)
# =============================================================================
# The fleet deploys by PULL, not push. This workflow does NOT SSH to hosts. It:
#   1. builds an immutable, versioned agent bundle (src + manifests),
#   2. uploads it to object storage (OCI S3-compat), and
#   3. flips a region/channel pointer via POST /api/internal/metal/release.
#
# Each host learns its desired version from its heartbeat response
# (apps/api routes/metal.ts → metal-agent-release.ts) and self-updates with a
# graceful restart that keeps live microVMs running (apps/metal-agent
# self-update.ts + pool.adopt). Brand-new / burst hosts converge on their own —
# no host inventory, no inbound SSH, no CI fan-out. Roll out with `canary`, then
# promote to `stable`; roll back by re-pointing the channel at an older version.
#
#   push to main (metal-agent/** changes) → staging `canary` (auto)
#   workflow_dispatch                     → choose environment (staging / production-us /
#                                           production-eu) / channel / region. Each
#                                           production region has its own control plane
#                                           (separate DB), so eu is a distinct target.
#
# CONFIG (per GitHub Environment: `staging` / `production-us`):
#   Variables:
#     METAL_RELEASE_BUCKET     object-storage bucket for agent bundles
#     METAL_RELEASE_PREFIX     key prefix (optional; default `metal-agent-releases/`)
#     METAL_S3_ENDPOINT        OCI S3-compat endpoint (https://<ns>.compat.objectstorage.<region>.oraclecloud.com)
#     METAL_S3_REGION          object-storage region (e.g. us-ashburn-1)
#     METAL_CONTROL_PLANE_URL  control-plane base URL (reaches /api/internal/metal/release)
#     METAL_RELEASE_REGION     fleet region this pointer targets (e.g. us / eu); '*' for all
#     METAL_RELEASE_INSECURE_TLS  'true' to skip TLS verify on the /release POST.
#                              Set ONLY for a control plane with no publicly-trusted
#                              cert (e.g. the EU CP's sslip.io origin behind a
#                              Cloudflare Origin cert) — matches the fleet's own
#                              NODE_TLS_REJECT_UNAUTHORIZED=0 posture; the bearer
#                              token is the security boundary. Leave unset for the
#                              Cloudflare-fronted us/staging domains.
#   Secrets:
#     METAL_S3_ACCESS_KEY_ID / METAL_S3_SECRET_ACCESS_KEY   OCI customer S3 keys
#     METAL_REGISTER_TOKEN     bearer for /api/internal/metal/* (same token hosts use)
# =============================================================================

name: Metal node-agent release

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'apps/metal-agent/**'
      - '.github/workflows/metal-agent-deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Fleet/control-plane to publish to (each is a distinct regional control plane).'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production-us
          - production-eu
      channel:
        description: 'Release channel to point at this build (canary rolls out first; promote to stable).'
        required: true
        default: 'canary'
        type: choice
        options:
          - canary
          - stable
      region:
        description: "Fleet region to target (blank = env's METAL_RELEASE_REGION; '*' = all regions)."
        required: false
        default: ''
        type: string
      rebuild_rootfs:
        description: 'Mark this release as requiring a runtime-rootfs rebuild on the host (the runtime image must already be published).'
        required: false
        default: false
        type: boolean

concurrency:
  # One release per environment+channel at a time; never cancel a mid-flight publish.
  group: metal-agent-release-${{ inputs.environment || 'staging' }}-${{ inputs.channel || 'canary' }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish ${{ inputs.channel || 'canary' }} → ${{ inputs.environment || 'staging' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'staging' }}
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Preflight config
        env:
          BUCKET: ${{ vars.METAL_RELEASE_BUCKET }}
          ENDPOINT: ${{ vars.METAL_S3_ENDPOINT }}
          CP_URL: ${{ vars.METAL_CONTROL_PLANE_URL }}
          AK: ${{ secrets.METAL_S3_ACCESS_KEY_ID }}
          SK: ${{ secrets.METAL_S3_SECRET_ACCESS_KEY }}
          TOKEN: ${{ secrets.METAL_REGISTER_TOKEN }}
        run: |
          set -euo pipefail
          miss=0
          for k in BUCKET ENDPOINT CP_URL AK SK TOKEN; do
            if [[ -z "${!k:-}" ]]; then echo "::error::missing config: $k"; miss=1; fi
          done
          [[ $miss -eq 0 ]] || { echo "::error::Set the METAL_RELEASE_* variables/secrets on the '${{ inputs.environment || 'staging' }}' environment."; exit 1; }

      - name: Build immutable agent bundle
        id: bundle
        run: |
          set -euo pipefail
          VERSION="$(git rev-parse --short HEAD)"
          # Content of a bundle == exactly what the agent swaps in (self-update.ts / deploy-fleet.sh).
          OUT="agent-${VERSION}.tgz"
          tar -czf "$OUT" -C apps/metal-agent src package.json tsconfig.json
          SHA="$(sha256sum "$OUT" | awk '{print $1}')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "file=$OUT" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "Built $OUT version=$VERSION sha256=$SHA ($(stat -c%s "$OUT") bytes)"

      - name: Upload bundle to object storage
        id: upload
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.METAL_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.METAL_S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.METAL_S3_REGION }}
          # OCI Object Storage's S3-compat endpoint does NOT support the aws-chunked
          # streaming body that aws-cli v2.23+ emits by default (its new flexible
          # checksums) — PutObject fails with "NotImplemented: AWS chunked encoding
          # not supported". Force the SDK to only checksum when the API requires it.
          # (Needs aws-cli >= 2.23.5 for `s3` to honor it; we use the low-level
          # `s3api put-object` below, which honors it on every 2.23.x.)
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
          ENDPOINT: ${{ vars.METAL_S3_ENDPOINT }}
          BUCKET: ${{ vars.METAL_RELEASE_BUCKET }}
          PREFIX: ${{ vars.METAL_RELEASE_PREFIX }}
          FILE: ${{ steps.bundle.outputs.file }}
        run: |
          set -euo pipefail
          PFX="${PREFIX:-metal-agent-releases/}"
          KEY="${PFX}${FILE}"
          # Immutable: never overwrite an existing version's bundle.
          if aws s3api head-object --endpoint-url "$ENDPOINT" --bucket "$BUCKET" --key "$KEY" >/dev/null 2>&1; then
            echo "Bundle already published at s3://$BUCKET/$KEY (immutable) — reusing."
          else
            # Low-level put-object (not `s3 cp`): the high-level transfer manager
            # still forced a CRC checksum → aws-chunked on some CLI builds even with
            # WHEN_REQUIRED; put-object reliably honors it against OCI.
            aws s3api put-object \
              --endpoint-url "$ENDPOINT" \
              --bucket "$BUCKET" --key "$KEY" \
              --body "$FILE" \
              --content-type application/gzip >/dev/null
          fi
          echo "bundle_url=s3://$BUCKET/$KEY" >> "$GITHUB_OUTPUT"
          echo "Published bundle: s3://$BUCKET/$KEY"

      - name: Flip channel pointer (POST /release)
        env:
          CP_URL: ${{ vars.METAL_CONTROL_PLANE_URL }}
          TOKEN: ${{ secrets.METAL_REGISTER_TOKEN }}
          REGION_INPUT: ${{ inputs.region }}
          REGION_DEFAULT: ${{ vars.METAL_RELEASE_REGION }}
          CHANNEL: ${{ inputs.channel || 'canary' }}
          VERSION: ${{ steps.bundle.outputs.version }}
          SHA256: ${{ steps.bundle.outputs.sha256 }}
          BUNDLE_URL: ${{ steps.upload.outputs.bundle_url }}
          REBUILD: ${{ inputs.rebuild_rootfs && 'true' || 'false' }}
          INSECURE_TLS: ${{ vars.METAL_RELEASE_INSECURE_TLS }}
        run: |
          set -euo pipefail
          REGION="${REGION_INPUT:-$REGION_DEFAULT}"
          [[ -n "$REGION" ]] || { echo "::error::no region (set inputs.region or vars.METAL_RELEASE_REGION)"; exit 1; }
          BODY=$(jq -cn \
            --arg region "$REGION" --arg channel "$CHANNEL" \
            --arg version "$VERSION" --arg url "$BUNDLE_URL" --arg sha "$SHA256" \
            --argjson rebuild "$REBUILD" \
            '{region:$region, channel:$channel, release:({version:$version, bundleUrl:$url, sha256:$sha} + (if $rebuild then {rebuildRootfs:true} else {} end))}')
          echo "Publishing release: $BODY"
          # Regional control planes with no publicly-trusted cert (eu sslip origin)
          # opt into -k; the fleet itself runs NODE_TLS_REJECT_UNAUTHORIZED=0 and the
          # bearer token is the security boundary. us/staging keep verified TLS.
          CURL_OPTS=(-sS -m 20)
          if [[ "${INSECURE_TLS:-}" == "true" ]]; then
            echo "::warning::METAL_RELEASE_INSECURE_TLS=true — skipping TLS verify for this control plane"
            CURL_OPTS+=(-k)
          fi
          code=$(curl "${CURL_OPTS[@]}" -o /tmp/release_resp.json -w '%{http_code}' \
            -X POST "${CP_URL%/}/api/internal/metal/release" \
            -H "Authorization: Bearer $TOKEN" -H 'Content-Type: application/json' \
            --data "$BODY")
          echo "HTTP $code"; cat /tmp/release_resp.json; echo
          [[ "$code" == "200" ]] || { echo "::error::/release returned $code"; exit 1; }
          echo "::notice::Published $CHANNEL=$VERSION for region=$REGION → ${{ inputs.environment || 'staging' }}. Hosts converge on their next heartbeat."
