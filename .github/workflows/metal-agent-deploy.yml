# =============================================================================
# Metal node-agent rolling deploy (bare-metal Firecracker fleet)
# =============================================================================
# deploy.yml deploys the OKE (Kubernetes) fleet; it has NO path to the x86 bare-
# metal hosts that run the Firecracker substrate (terraform/latitude-metal +
# apps/metal-agent). Those were updated by hand. This workflow closes that gap:
# it ships the current node-agent source to each metal host and performs a
# GRACEFUL ROLLING restart (systemd KillMode=process) so live microVMs survive
# the deploy and are re-adopted by the new agent — see
# scripts/metal-agent/deploy-fleet.sh.
#
#   push to main (metal-agent/** changes) → staging fleet (auto)
#   workflow_dispatch                     → staging or production, with knobs
#
# CONFIG (per GitHub Environment: `staging` / `production-us`):
#   Variables:
#     METAL_FLEET_SSH_TARGETS  newline- or comma-separated `user@host` list of
#                              the fleet's public IPs (the same hosts stored in
#                              the platform_settings `metal.fleet.hosts` record).
#   Secrets:
#     METAL_SSH_PRIVATE_KEY    private key authorized on those hosts (root).
#     OCI_AUTH_TOKEN / OCI_USERNAME + vars.OCI_REGION / OCI_TENANCY_NAMESPACE
#                              only needed when rebuild_rootfs=true (OCIR pull).
# =============================================================================

name: Metal node-agent deploy

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'apps/metal-agent/**'
      - 'scripts/metal-agent/deploy-fleet.sh'
      - 'scripts/metal-agent/host-bootstrap.sh'
      - '.github/workflows/metal-agent-deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Fleet to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      idle_suspend_ms:
        description: 'If set, patch METAL_IDLE_SUSPEND_MS on each host (ms). Leave blank to keep the current value.'
        required: false
        default: ''
        type: string
      rebuild_rootfs:
        description: 'Rebuild the runtime rootfs from RUNTIME_IMAGE (heavy; invalidates snapshots so those projects cold-boot).'
        required: false
        default: false
        type: boolean
      runtime_image:
        description: 'Runtime image ref for rebuild_rootfs (defaults to the env multiarch-latest tag).'
        required: false
        default: ''
        type: string

concurrency:
  # One rolling deploy per fleet at a time; never cancel a mid-flight deploy.
  group: metal-agent-deploy-${{ inputs.environment || 'staging' }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Resolve the target host list (from the environment variable) into a matrix.
  # ---------------------------------------------------------------------------
  resolve-fleet:
    name: Resolve fleet
    runs-on: ubuntu-latest
    environment: ${{ (inputs.environment || 'staging') == 'production' && 'production-us' || 'staging' }}
    outputs:
      matrix: ${{ steps.hosts.outputs.matrix }}
      count: ${{ steps.hosts.outputs.count }}
    steps:
      - name: Parse METAL_FLEET_SSH_TARGETS
        id: hosts
        env:
          TARGETS: ${{ vars.METAL_FLEET_SSH_TARGETS }}
        run: |
          set -euo pipefail
          if [[ -z "${TARGETS// }" ]]; then
            echo "::error::METAL_FLEET_SSH_TARGETS is not set for this environment. Add it (newline/comma-separated user@host) in the environment's Variables."
            exit 1
          fi
          # Split on commas/newlines/spaces, drop blanks + comments, JSON-encode.
          mapfile -t HOSTS < <(printf '%s' "$TARGETS" | tr ',' '\n' | sed 's/#.*//' | awk 'NF{$1=$1;print $1}')
          if [[ ${#HOSTS[@]} -eq 0 ]]; then
            echo "::error::No usable hosts parsed from METAL_FLEET_SSH_TARGETS."
            exit 1
          fi
          MATRIX=$(printf '%s\n' "${HOSTS[@]}" | jq -R . | jq -cs '{target: .}')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "count=${#HOSTS[@]}" >> "$GITHUB_OUTPUT"
          echo "Resolved ${#HOSTS[@]} host(s): ${HOSTS[*]}"

  # ---------------------------------------------------------------------------
  # Roll the deploy across the fleet, one host at a time (max-parallel: 1) so a
  # bad build can't take the whole fleet down simultaneously.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy ${{ matrix.target }}
    needs: resolve-fleet
    runs-on: ubuntu-latest
    environment: ${{ (inputs.environment || 'staging') == 'production' && 'production-us' || 'staging' }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.resolve-fleet.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # deploy-fleet.sh stamps the deployed short SHA

      - name: Install SSH key
        env:
          SSH_KEY: ${{ secrets.METAL_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${SSH_KEY:-}" ]]; then
            echo "::error::METAL_SSH_PRIVATE_KEY secret is not set for this environment."
            exit 1
          fi
          install -d -m 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/metal_deploy
          chmod 600 ~/.ssh/metal_deploy

      - name: Compute default runtime image
        id: img
        env:
          REBUILD: ${{ inputs.rebuild_rootfs }}
          RUNTIME_IMAGE_INPUT: ${{ inputs.runtime_image }}
          REGISTRY: ${{ vars.OCI_REGION }}.ocir.io/${{ vars.OCI_TENANCY_NAMESPACE }}
          PREFIX: ${{ inputs.environment || 'staging' }}
        run: |
          set -euo pipefail
          IMG="$RUNTIME_IMAGE_INPUT"
          if [[ "${REBUILD:-false}" == "true" && -z "$IMG" ]]; then
            IMG="${REGISTRY}/shogo/shogo-runtime:${PREFIX}-multiarch-latest"
          fi
          echo "runtime_image=$IMG" >> "$GITHUB_OUTPUT"

      - name: Prepare OCIR docker config (rebuild only)
        id: ocir
        if: ${{ inputs.rebuild_rootfs == true }}
        env:
          OCI_REGION: ${{ vars.OCI_REGION }}
          OCI_TENANCY_NAMESPACE: ${{ vars.OCI_TENANCY_NAMESPACE }}
          OCI_USERNAME: ${{ secrets.OCI_USERNAME }}
          OCI_AUTH_TOKEN: ${{ secrets.OCI_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          AUTH=$(printf '%s' "${OCI_TENANCY_NAMESPACE}/${OCI_USERNAME}:${OCI_AUTH_TOKEN}" | base64 -w0)
          CFG=$(printf '{"auths":{"%s.ocir.io":{"auth":"%s"}}}' "$OCI_REGION" "$AUTH")
          echo "config_b64=$(printf '%s' "$CFG" | base64 -w0)" >> "$GITHUB_OUTPUT"

      - name: Rolling deploy to ${{ matrix.target }}
        env:
          SSH_TARGET: ${{ matrix.target }}
          IDLE_SUSPEND_MS: ${{ inputs.idle_suspend_ms }}
          REBUILD_ROOTFS: ${{ inputs.rebuild_rootfs && 'true' || 'false' }}
          RUNTIME_IMAGE: ${{ steps.img.outputs.runtime_image }}
          DOCKER_CONFIG_B64: ${{ steps.ocir.outputs.config_b64 }}
          HEALTH_TIMEOUT_S: '120'
        run: |
          set -euo pipefail
          export SSH_KEY="$HOME/.ssh/metal_deploy"
          bash scripts/metal-agent/deploy-fleet.sh
