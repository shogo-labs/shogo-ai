# =============================================================================
# Publish shogo-agent-runtime prebuilt binaries
# =============================================================================
# Triggered when a `runtime-v*` tag is pushed. Builds the AGPL
# @shogo/agent-runtime as a single self-contained `bun build --compile`
# binary for each of the four supported targets, then uploads the four
# tarballs (+ SHA-256 sidecars) to a GitHub Release attached to the tag.
#
#   runtime-v0.1.0  →  uploads
#                        shogo-agent-runtime-darwin-arm64.tar.gz   (+ .sha256)
#                        shogo-agent-runtime-darwin-x64.tar.gz     (+ .sha256)
#                        shogo-agent-runtime-linux-arm64.tar.gz    (+ .sha256)
#                        shogo-agent-runtime-linux-x64.tar.gz      (+ .sha256)
#
# These tarballs are what `shogo runtime install` (in @shogo-ai/worker)
# downloads and unpacks into ~/.shogo/runtime/. The install command
# defaults its base URL to this GitHub Release, but is overridable via
# `--base-url` / `SHOGO_RUNTIME_RELEASES_URL` for self-hosting at e.g.
# `releases.shogo.ai`.
#
# License: the binaries are AGPL-3.0-or-later (matches the source at
# packages/agent-runtime/). The MIT-licensed worker spawns these as
# separate OS processes — see packages/shogo-worker/README.md
# "Process boundary" for why this composition is permissible.
#
# Bun cross-compiles all four targets from a single ubuntu-latest host
# via `--target=bun-{darwin,linux}-{arm64,x64}`, so this workflow does
# not need a matrix. Speed matters less than reproducibility here:
# every binary in a release was built from the same checkout.
# =============================================================================

name: Publish agent-runtime binaries

on:
  push:
    tags:
      - 'runtime-v[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to publish (e.g. runtime-v0.1.0). Must already exist.'
        required: true
        type: string
      channel:
        description: 'Release channel (stable | beta | nightly). Affects only release notes & dist-tag UI.'
        required: false
        default: 'stable'
        type: choice
        options:
          - stable
          - beta
          - nightly
      dry_run:
        description: 'Build but do not upload to a release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write # required to create the GitHub Release & upload assets

concurrency:
  group: publish-agent-runtime-${{ github.ref_name }}
  cancel-in-progress: false

env:
  BUN_VERSION: '1.3.11'
  TARGETS: 'darwin-arm64 darwin-x64 linux-arm64 linux-x64'

jobs:
  build:
    name: Build + publish runtime binaries
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache bun dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.bun/install/cache
          key: bun-runtime-${{ hashFiles('bun.lock') }}
          restore-keys: bun-runtime-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve version from tag
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          if [[ ! "$TAG" =~ ^runtime-v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag '$TAG' is not a valid agent-runtime tag (expected runtime-vX.Y.Z[-prerelease])"
            exit 1
          fi
          VERSION="${TAG#runtime-v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # Stable unless the version is a prerelease or the dispatch
          # input explicitly asked for a different channel.
          INPUT_CHANNEL="${{ github.event.inputs.channel }}"
          if [ -n "$INPUT_CHANNEL" ]; then
            CHANNEL="$INPUT_CHANNEL"
          elif [[ "$VERSION" == *-* ]]; then
            CHANNEL="beta"
          else
            CHANNEL="stable"
          fi
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "Building shogo-agent-runtime $VERSION (channel=$CHANNEL, tag=$TAG)"

      - name: Build all four targets
        working-directory: packages/agent-runtime
        run: |
          set -euo pipefail
          mkdir -p dist
          for TARGET in $TARGETS; do
            echo "::group::compile shogo-agent-runtime-$TARGET"
            OUT="dist/shogo-agent-runtime-$TARGET"
            bun build src/server.ts \
              --compile \
              --target="bun-$TARGET" \
              --outfile "$OUT"
            ls -lh "$OUT"
            echo "::endgroup::"
          done

      - name: Tarball + sha256 sidecars
        working-directory: packages/agent-runtime
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist/release
          for TARGET in $TARGETS; do
            BIN="shogo-agent-runtime-$TARGET"
            STAGE="dist/stage-$TARGET"
            mkdir -p "$STAGE"
            # Inside the tarball the binary is just `agent-runtime` so
            # the worker's runtime-resolver can find ~/.shogo/runtime/agent-runtime
            # without target-name knowledge.
            cp "dist/$BIN" "$STAGE/agent-runtime"
            chmod +x "$STAGE/agent-runtime"
            # Drop a small VERSION file next to it so `shogo runtime version`
            # can report something even without re-asking the cloud.
            cat > "$STAGE/VERSION" <<EOF
          version=$VERSION
          target=$TARGET
          built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          source=https://github.com/${{ github.repository }}/tree/${{ steps.version.outputs.tag }}/packages/agent-runtime
          license=AGPL-3.0-or-later
          EOF
            TARBALL="dist/release/$BIN.tar.gz"
            tar -C "$STAGE" -czf "$TARBALL" agent-runtime VERSION
            (cd dist/release && sha256sum "$BIN.tar.gz" > "$BIN.tar.gz.sha256")
            ls -lh "$TARBALL" "$TARBALL.sha256"
          done

      - name: Upload build artifacts (workflow scope)
        uses: actions/upload-artifact@cd2207e0fa7c08c4ae8898a85d8da307ee48aaf2 # v5.0.0
        with:
          name: shogo-agent-runtime-${{ steps.version.outputs.version }}
          path: packages/agent-runtime/dist/release/*
          retention-days: 30

      - name: Create or update GitHub Release
        if: github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          CHANNEL: ${{ steps.version.outputs.channel }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Mark non-stable channels as `--prerelease` so the GitHub UI
          # surfaces them correctly and `shogo runtime install` can
          # filter them when channel != channel from the user.
          PRERELEASE_FLAG=""
          if [ "$CHANNEL" != "stable" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          NOTES_FILE=$(mktemp)
          {
            echo "Prebuilt binaries for shogo-agent-runtime $VERSION."
            echo
            echo "- Channel: $CHANNEL"
            echo "- License: AGPL-3.0-or-later"
            echo "- Source: https://github.com/$REPO/tree/$TAG/packages/agent-runtime"
            echo
            echo "Install via the worker:"
            echo
            echo '```'
            echo "shogo runtime install --channel $CHANNEL"
            echo '```'
          } > "$NOTES_FILE"

          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release $TAG already exists — updating assets."
            gh release upload "$TAG" packages/agent-runtime/dist/release/* --repo "$REPO" --clobber
          else
            gh release create "$TAG" \
              --repo "$REPO" \
              --title "agent-runtime $VERSION" \
              --notes-file "$NOTES_FILE" \
              $PRERELEASE_FLAG \
              packages/agent-runtime/dist/release/*
          fi

      - name: Summary
        if: always()
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          CHANNEL: ${{ steps.version.outputs.channel }}
          DRY: ${{ github.event.inputs.dry_run }}
          REPO: ${{ github.repository }}
        run: |
          {
            echo "## agent-runtime publish"
            echo "- Tag: \`$TAG\`"
            echo "- Version: \`$VERSION\`"
            echo "- Channel: \`$CHANNEL\`"
            echo "- Dry run: \`${DRY:-false}\`"
            echo
            echo "### Built artifacts"
            for TARGET in $TARGETS; do
              echo "- \`shogo-agent-runtime-$TARGET.tar.gz\` (+ \`.sha256\`)"
            done
            if [ "${DRY:-false}" != "true" ]; then
              echo
              echo "Release: https://github.com/$REPO/releases/tag/$TAG"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
