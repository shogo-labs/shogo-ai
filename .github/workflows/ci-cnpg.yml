# =============================================================================
# CI - CNPG Publication self-maintains
# =============================================================================
# Spins up a kind cluster + the same CNPG operator version we run in
# production, applies the regional `platform-publication.yaml`, and
# asserts:
#
#   1. CNPG reconciles the Publication CR to `ready=true`
#   2. The resulting Postgres publication is `FOR TABLES IN SCHEMA public`
#      (NOT `FOR ALL TABLES`, NOT a hand-listed table set)
#   3. A new table created after the publication exists is auto-included,
#      with no `ALTER PUBLICATION` call
#
# This is the test that proves the prevention fix from #506 actually works
# end-to-end. It's the only check that catches a CNPG operator regression
# in `tablesInSchema` translation, and the only one that proves the
# auto-include behavior on the version of Postgres we actually run (18.3).
#
# Skip-conditions: only runs when files in the publication's blast radius
# change, so it doesn't slow down unrelated PRs.
# =============================================================================

name: CI - CNPG Publication

on:
  pull_request:
    branches: [main]
    paths:
      - 'k8s/cnpg/**/platform-publication.yaml'
      - 'k8s/cnpg/logical-replication/enforce-table-ownership.sql'
      - 'scripts/check-publication-drift.ts'
      - '.github/workflows/ci-cnpg.yml'

permissions: {}

concurrency:
  group: ci-cnpg-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  cnpg-publication:
    name: Publication self-maintains under CNPG ${{ matrix.cnpg_chart }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        # Chart 0.23.0 == operator v1.25.x — the version pinned in
        # `terraform/modules/cnpg/main.tf` and running in all production
        # regions. Add newer versions here when bumping the prod pin.
        cnpg_chart: ['0.23.0']

    env:
      # Match production: PG 18.3, same image CNPG uses on OCI.
      PG_IMAGE: 'ghcr.io/cloudnative-pg/postgresql:18.3'
      NS: 'shogo-production-system'
      PUB_NAME: 'shogo_all_pub'
      MANIFEST: 'k8s/cnpg/production-us-oci/platform-publication.yaml'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: cnpg-test
          wait: 120s

      - name: Install CNPG operator (matches prod chart version)
        run: |
          helm repo add cnpg https://cloudnative-pg.github.io/charts
          helm repo update
          # `--wait` blocks until the operator deployment is Available, so
          # there's no need for a separate kubectl wait step here.
          helm install cnpg-operator cnpg/cloudnative-pg \
            --version "${{ matrix.cnpg_chart }}" \
            --namespace cnpg-system --create-namespace \
            --set monitoring.podMonitorEnabled=false \
            --wait --timeout 5m
          # Confirm the Publication CRD this PR depends on is installed.
          kubectl get crd publications.postgresql.cnpg.io \
            -o jsonpath='{.spec.versions[*].name}' && echo

      - name: Create minimal Cluster CR
        # Don't apply the prod cluster YAML — it references externalClusters
        # with hardcoded IPs and an OCI-only storage class. This minimal CR
        # exercises the same Publication reconciliation code path on the
        # same Postgres image (18.3) as prod.
        run: |
          kubectl create namespace "${NS}"
          cat <<EOF | kubectl apply -f -
          apiVersion: postgresql.cnpg.io/v1
          kind: Cluster
          metadata:
            name: platform-pg
            namespace: ${NS}
          spec:
            instances: 1
            imageName: ${PG_IMAGE}
            postgresql:
              parameters:
                wal_level: "logical"
            bootstrap:
              initdb:
                database: shogo
                owner: shogo
            storage:
              size: 1Gi
            resources:
              requests:
                memory: "256Mi"
                cpu: "100m"
              limits:
                memory: "512Mi"
                cpu: "500m"
          EOF
          echo "Waiting for cluster to be Ready..."
          kubectl wait --for=condition=Ready cluster/platform-pg -n "${NS}" --timeout=5m

      - name: Apply publication manifest under test
        run: |
          kubectl apply -f "${MANIFEST}"

      - name: Wait for Publication CR to reconcile
        run: |
          for i in $(seq 1 30); do
            APPLIED=$(kubectl get publication platform-pg-pub -n "${NS}" \
              -o jsonpath='{.status.applied}' 2>/dev/null || echo "")
            if [ "${APPLIED}" = "true" ]; then
              echo "Publication CR reached applied=true"
              exit 0
            fi
            echo "[$i/30] applied=${APPLIED:-<unset>}, retrying in 5s..."
            sleep 5
          done
          echo "::error::Publication CR did not reach applied=true within 150s"
          kubectl get publication platform-pg-pub -n "${NS}" -o yaml
          exit 1

      - name: Assert publication shape (FOR TABLES IN SCHEMA public)
        run: |
          PSQL() {
            kubectl exec -n "${NS}" platform-pg-1 -c postgres -- \
              psql -U postgres -d shogo -t -A -v ON_ERROR_STOP=1 "$@"
          }

          # `FOR ALL TABLES` would set puballtables=t. We don't want that —
          # we want `FOR TABLES IN SCHEMA public`, which sets puballtables=f
          # and adds a row to pg_publication_namespace.
          PUBALLTABLES=$(PSQL -c "SELECT puballtables FROM pg_publication WHERE pubname = '${PUB_NAME}'")
          if [ "${PUBALLTABLES}" != "f" ]; then
            echo "::error::publication is FOR ALL TABLES (puballtables=${PUBALLTABLES}); expected FOR TABLES IN SCHEMA public"
            PSQL -c "\dRp+ ${PUB_NAME}"
            exit 1
          fi

          IN_SCHEMA=$(PSQL -c "
            SELECT n.nspname
            FROM pg_publication_namespace pn
            JOIN pg_publication p ON p.oid = pn.pnpubid
            JOIN pg_namespace n ON n.oid = pn.pnnspid
            WHERE p.pubname = '${PUB_NAME}'
          ")
          if [ "${IN_SCHEMA}" != "public" ]; then
            echo "::error::publication does not target schema 'public', got: '${IN_SCHEMA}'"
            PSQL -c "\dRp+ ${PUB_NAME}"
            exit 1
          fi

          echo "Publication shape OK: FOR TABLES IN SCHEMA public"
          PSQL -c "\dRp+ ${PUB_NAME}"

      - name: Assert auto-include — new table is published without ALTER
        # This is the regression test for #501. A migration that adds a
        # table must propagate to the publication automatically. If this
        # step ever fails, do NOT merge the PR — Postgres or CNPG has
        # broken the assumption this whole prevention fix relies on.
        run: |
          PSQL() {
            kubectl exec -n "${NS}" platform-pg-1 -c postgres -- \
              psql -U postgres -d shogo -t -A -v ON_ERROR_STOP=1 "$@"
          }

          BEFORE=$(PSQL -c "SELECT count(*) FROM pg_publication_tables WHERE pubname='${PUB_NAME}'")
          echo "Tables published before: ${BEFORE}"

          # Simulate `prisma migrate deploy` adding a new model.
          # No ALTER PUBLICATION call — the test is whether Postgres
          # auto-includes it.
          PSQL -c "CREATE TABLE drift_canary (id int PRIMARY KEY, marker text);"

          AFTER=$(PSQL -c "SELECT count(*) FROM pg_publication_tables WHERE pubname='${PUB_NAME}'")
          echo "Tables published after: ${AFTER}"

          IN_PUB=$(PSQL -c "
            SELECT count(*) FROM pg_publication_tables
            WHERE pubname='${PUB_NAME}' AND tablename='drift_canary'
          ")
          if [ "${IN_PUB}" != "1" ]; then
            echo "::error::drift_canary was NOT auto-included in ${PUB_NAME}"
            echo "::error::This means CNPG/Postgres did not honor FOR TABLES IN SCHEMA — the prevention fix is broken."
            PSQL -c "SELECT tablename FROM pg_publication_tables WHERE pubname='${PUB_NAME}' ORDER BY 1"
            exit 1
          fi

          echo "Auto-include works: drift_canary was published without an ALTER PUBLICATION call."

      - name: Assert all 3 regional manifests behave identically
        # Quick paranoia check: the CI guard already enforces that the EU
        # and India YAMLs are byte-identical to US (modulo the leading
        # comment), but apply each one in turn here too so we know CNPG
        # accepts all three. Cheap because they reconcile to the same CR.
        run: |
          for region in eu india; do
            echo "::group::Apply ${region} manifest"
            kubectl apply -f "k8s/cnpg/production-${region}-oci/platform-publication.yaml"
            for i in $(seq 1 10); do
              APPLIED=$(kubectl get publication platform-pg-pub -n "${NS}" \
                -o jsonpath='{.status.applied}' 2>/dev/null || echo "")
              if [ "${APPLIED}" = "true" ]; then break; fi
              sleep 3
            done
            if [ "${APPLIED}" != "true" ]; then
              echo "::error::${region} manifest did not reconcile to applied=true"
              kubectl get publication platform-pg-pub -n "${NS}" -o yaml
              exit 1
            fi
            echo "::endgroup::"
          done
          echo "All three regional manifests reconcile cleanly."

      # ----------------------------------------------------------------------
      # GRANT contract regression tests
      #
      # The publication self-maintains, but `logical_replicator` SELECT
      # grants do NOT happen automatically. `k8s/cnpg/logical-replication/
      # grants.sql` is supposed to close that gap via a sweep, per-role
      # ALTER DEFAULT PRIVILEGES, and an event trigger. Three assertions:
      #
      #   A. After applying grants.sql, every existing table in `public`
      #      has SELECT for `logical_replicator`.
      #   B. A new CREATE TABLE issued AFTER grants.sql ran auto-grants
      #      SELECT via the event trigger — no manual GRANT required.
      #   C. **Load-bearing safety:** if the event trigger's GRANT fails
      #      at runtime (we simulate by dropping the role), the CREATE
      #      TABLE must still commit. The EXCEPTION handler must catch
      #      the failure and let the migration proceed. If this ever
      #      breaks, a future migration could be aborted by replication
      #      machinery — strictly worse than the bug grants.sql fixes.
      # ----------------------------------------------------------------------
      - name: Create logical_replicator role and apply grants.sql
        run: |
          set -euo pipefail
          kubectl exec -n "${NS}" platform-pg-1 -c postgres -- \
            psql -U postgres -d shogo -v ON_ERROR_STOP=1 -c "
              CREATE ROLE logical_replicator LOGIN REPLICATION;
            "
          kubectl exec -i -n "${NS}" platform-pg-1 -c postgres -- \
            psql -U postgres -d shogo -v ON_ERROR_STOP=1 \
              < k8s/cnpg/logical-replication/grants.sql

      - name: 'Assert (A) — sweep covered every existing table'
        run: |
          set -euo pipefail
          MISSING=$(kubectl exec -n "${NS}" platform-pg-1 -c postgres -- \
            psql -U postgres -d shogo -tAc "
              SELECT count(*)
              FROM pg_class c
              JOIN pg_namespace n ON n.oid = c.relnamespace
              WHERE n.nspname = 'public' AND c.relkind = 'r'
                AND NOT has_table_privilege('logical_replicator', c.oid, 'SELECT');
            ")
          if [ "${MISSING}" != "0" ]; then
            echo "::error::sweep missed ${MISSING} tables"
            kubectl exec -n "${NS}" platform-pg-1 -c postgres -- \
              psql -U postgres -d shogo -c "
                SELECT n.nspname, c.relname
                FROM pg_class c JOIN pg_namespace n ON n.oid = c.relnamespace
                WHERE n.nspname='public' AND c.relkind='r'
                  AND NOT has_table_privilege('logical_replicator', c.oid, 'SELECT');
              "
            exit 1
          fi
          echo "✓ (A) all existing public tables have SELECT for logical_replicator"

      - name: 'Assert (B) — event trigger auto-grants on new CREATE TABLE'
        run: |
          set -euo pipefail
          # Create as `shogo` (the migration role) to ensure the trigger
          # path is the one exercised in production, not the postgres path.
          kubectl exec -n "${NS}" platform-pg-1 -c postgres -- \
            psql -U postgres -d shogo -v ON_ERROR_STOP=1 -c "
              SET ROLE shogo;
              CREATE TABLE public.auto_grant_canary (id int PRIMARY KEY);
              RESET ROLE;
            "
          OK=$(kubectl exec -n "${NS}" platform-pg-1 -c postgres -- \
            psql -U postgres -d shogo -tAc "
              SELECT has_table_privilege('logical_replicator', 'public.auto_grant_canary', 'SELECT');
            ")
          if [ "${OK}" != "t" ]; then
            echo "::error::event trigger did NOT auto-grant SELECT on auto_grant_canary"
            exit 1
          fi
          echo "✓ (B) event trigger auto-granted SELECT to logical_replicator on a fresh table"

      - name: 'Assert (C) — EXCEPTION handler prevents trigger from blocking migrations'
        run: |
          set -euo pipefail
          # Simulate the failure mode by deleting the role mid-flight. The
          # next CREATE TABLE will fire the event trigger, which will try to
          # GRANT to a role that no longer exists. Without the EXCEPTION
          # handler this would abort the CREATE TABLE. With it, the CREATE
          # must succeed and emit a WARNING.
          kubectl exec -n "${NS}" platform-pg-1 -c postgres -- \
            psql -U postgres -d shogo -v ON_ERROR_STOP=1 -c "
              REASSIGN OWNED BY logical_replicator TO postgres;
              DROP OWNED BY logical_replicator;
              DROP ROLE logical_replicator;
            "

          # Run CREATE TABLE as `shogo`. Capture stderr to confirm the
          # warning fired; exit code must be 0.
          OUTPUT=$(kubectl exec -n "${NS}" platform-pg-1 -c postgres -- \
            psql -U postgres -d shogo -v ON_ERROR_STOP=1 -c "
              SET ROLE shogo;
              CREATE TABLE public.exception_canary (id int PRIMARY KEY);
              RESET ROLE;
            " 2>&1)
          EXIT_CODE=$?
          echo "psql output:"
          echo "${OUTPUT}"
          if [ ${EXIT_CODE} -ne 0 ]; then
            echo "::error::CREATE TABLE was aborted by the event trigger — EXCEPTION handler is broken."
            echo "::error::This means a future migration could be blocked by replication machinery."
            exit 1
          fi
          EXISTS=$(kubectl exec -n "${NS}" platform-pg-1 -c postgres -- \
            psql -U postgres -d shogo -tAc \
              "SELECT count(*) FROM pg_class c JOIN pg_namespace n ON n.oid=c.relnamespace
               WHERE n.nspname='public' AND c.relname='exception_canary'")
          if [ "${EXISTS}" != "1" ]; then
            echo "::error::exception_canary table does not exist — CREATE TABLE silently rolled back"
            exit 1
          fi
          # Sanity: the trigger should have emitted a WARNING about the
          # failed GRANT. Loose match — psql formats warnings as
          # "WARNING:  auto_grant_replicator_select: GRANT failed for ..."
          if ! echo "${OUTPUT}" | grep -q "auto_grant_replicator_select: GRANT failed"; then
            echo "::warning::Expected a 'GRANT failed' warning from the trigger, but did not see it in output. Trigger may not have fired."
          fi
          echo "✓ (C) EXCEPTION handler caught the failed GRANT; CREATE TABLE committed"

      - name: 'Idempotency check — grants.sql can run twice with no error'
        run: |
          set -euo pipefail
          # Restore the role so a fresh apply has a target.
          kubectl exec -n "${NS}" platform-pg-1 -c postgres -- \
            psql -U postgres -d shogo -v ON_ERROR_STOP=1 -c \
              "CREATE ROLE logical_replicator LOGIN REPLICATION;"
          for i in 1 2; do
            echo "Run #${i}..."
            kubectl exec -i -n "${NS}" platform-pg-1 -c postgres -- \
              psql -U postgres -d shogo -v ON_ERROR_STOP=1 \
                < k8s/cnpg/logical-replication/grants.sql
          done
          echo "✓ grants.sql is idempotent"

      # ----------------------------------------------------------------------
      # Ownership contract regression tests
      #
      # `shogo` (the migration role) must own every table in `public`, or a
      # migration's `ALTER TABLE` fails with `must be owner` (SQLSTATE 42501)
      # and wedges the cluster with P3009 (2026-05-31 incident).
      # `k8s/cnpg/logical-replication/enforce-table-ownership.sql` makes this a
      # structural property via a sweep + an event trigger. Three assertions,
      # mirroring the GRANT tests above:
      #
      #   D. After applying the script, every table in `public` is shogo-owned
      #      (the sweep covers pre-existing postgres-owned tables).
      #   E. A CREATE TABLE issued as `postgres` AFTER the script ran is
      #      reassigned to shogo by the event trigger — no manual ALTER.
      #   F. **Load-bearing safety:** if the trigger's reassignment fails at
      #      runtime (simulated by renaming `shogo` away), CREATE TABLE must
      #      still commit. The EXCEPTION handler must catch it, exactly like
      #      the grants.sql trigger — replication/ownership machinery must
      #      never be able to abort a migration.
      # ----------------------------------------------------------------------
      - name: Seed a postgres-owned table and apply enforce-table-ownership.sql
        run: |
          set -euo pipefail
          # Seed a postgres-owned table so the sweep has something to fix
          # (the publication tests above also left some postgres-owned tables).
          kubectl exec -n "${NS}" platform-pg-1 -c postgres -- \
            psql -U postgres -d shogo -v ON_ERROR_STOP=1 -c "
              CREATE TABLE public.owner_sweep_canary (id int PRIMARY KEY);
            "
          kubectl exec -i -n "${NS}" platform-pg-1 -c postgres -- \
            psql -U postgres -d shogo -v ON_ERROR_STOP=1 \
              < k8s/cnpg/logical-replication/enforce-table-ownership.sql

      - name: 'Assert (D) — sweep made every public table shogo-owned'
        run: |
          set -euo pipefail
          DRIFTED=$(kubectl exec -n "${NS}" platform-pg-1 -c postgres -- \
            psql -U postgres -d shogo -tAc "
              SELECT count(*)
              FROM pg_class c JOIN pg_namespace n ON n.oid = c.relnamespace
              WHERE n.nspname='public' AND c.relkind IN ('r','p')
                AND c.relowner <> 'shogo'::regrole;
            ")
          if [ "${DRIFTED}" != "0" ]; then
            echo "::error::sweep left ${DRIFTED} non-shogo-owned tables"
            kubectl exec -n "${NS}" platform-pg-1 -c postgres -- \
              psql -U postgres -d shogo -c "
                SELECT n.nspname, c.relname, c.relowner::regrole AS owner
                FROM pg_class c JOIN pg_namespace n ON n.oid = c.relnamespace
                WHERE n.nspname='public' AND c.relkind IN ('r','p')
                  AND c.relowner <> 'shogo'::regrole;
              "
            exit 1
          fi
          echo "✓ (D) every public table is shogo-owned after the sweep"

      - name: 'Assert (E) — event trigger reassigns a postgres-created table'
        run: |
          set -euo pipefail
          # Created in the default postgres superuser session — the path a
          # manual operator `CREATE TABLE` on a secondary would take.
          kubectl exec -n "${NS}" platform-pg-1 -c postgres -- \
            psql -U postgres -d shogo -v ON_ERROR_STOP=1 -c "
              CREATE TABLE public.owner_trigger_canary (id int PRIMARY KEY);
            "
          OWNER=$(kubectl exec -n "${NS}" platform-pg-1 -c postgres -- \
            psql -U postgres -d shogo -tAc "
              SELECT c.relowner::regrole
              FROM pg_class c JOIN pg_namespace n ON n.oid=c.relnamespace
              WHERE n.nspname='public' AND c.relname='owner_trigger_canary';
            ")
          if [ "${OWNER}" != "shogo" ]; then
            echo "::error::event trigger did NOT reassign owner_trigger_canary to shogo (owner=${OWNER})"
            exit 1
          fi
          echo "✓ (E) event trigger reassigned a postgres-created table to shogo"

      - name: 'Assert (F) — EXCEPTION handler prevents trigger from blocking CREATE'
        run: |
          set -euo pipefail
          # Simulate the failure mode: rename `shogo` away so the trigger's
          # `ALTER ... OWNER TO shogo` throws "role shogo does not exist".
          # Rename (not drop) because `shogo` owns the database and many
          # tables; rename preserves all OID-based ownership and is reversible.
          kubectl exec -n "${NS}" platform-pg-1 -c postgres -- \
            psql -U postgres -d shogo -v ON_ERROR_STOP=1 -c "
              ALTER ROLE shogo RENAME TO shogo_rename_test;
            "
          set +e
          OUTPUT=$(kubectl exec -n "${NS}" platform-pg-1 -c postgres -- \
            psql -U postgres -d shogo -v ON_ERROR_STOP=1 -c "
              CREATE TABLE public.owner_exception_canary (id int PRIMARY KEY);
            " 2>&1)
          EXIT_CODE=$?
          set -e
          echo "psql output:"
          echo "${OUTPUT}"
          # Always restore the role name before asserting, so a failed
          # assertion doesn't leave the cluster wedged for later steps.
          kubectl exec -n "${NS}" platform-pg-1 -c postgres -- \
            psql -U postgres -d shogo -v ON_ERROR_STOP=1 -c "
              ALTER ROLE shogo_rename_test RENAME TO shogo;
            "
          if [ ${EXIT_CODE} -ne 0 ]; then
            echo "::error::CREATE TABLE was aborted by the event trigger — EXCEPTION handler is broken."
            echo "::error::This means a future migration could be blocked by ownership machinery."
            exit 1
          fi
          EXISTS=$(kubectl exec -n "${NS}" platform-pg-1 -c postgres -- \
            psql -U postgres -d shogo -tAc \
              "SELECT count(*) FROM pg_class c JOIN pg_namespace n ON n.oid=c.relnamespace
               WHERE n.nspname='public' AND c.relname='owner_exception_canary'")
          if [ "${EXISTS}" != "1" ]; then
            echo "::error::owner_exception_canary does not exist — CREATE TABLE silently rolled back"
            exit 1
          fi
          if ! echo "${OUTPUT}" | grep -q "enforce_table_owner_shogo: OWNER reassignment failed"; then
            echo "::warning::Expected an 'OWNER reassignment failed' warning from the trigger, but did not see it in output."
          fi
          echo "✓ (F) EXCEPTION handler caught the failed reassignment; CREATE TABLE committed"

      - name: 'Idempotency check — enforce-table-ownership.sql can run twice'
        run: |
          set -euo pipefail
          for i in 1 2; do
            echo "Run #${i}..."
            kubectl exec -i -n "${NS}" platform-pg-1 -c postgres -- \
              psql -U postgres -d shogo -v ON_ERROR_STOP=1 \
                < k8s/cnpg/logical-replication/enforce-table-ownership.sql
          done
          echo "✓ enforce-table-ownership.sql is idempotent"

      - name: Diagnostics on failure
        if: failure()
        run: |
          echo "::group::Cluster"
          kubectl get cluster platform-pg -n "${NS}" -o yaml || true
          echo "::endgroup::"
          echo "::group::Publication"
          kubectl get publication platform-pg-pub -n "${NS}" -o yaml || true
          echo "::endgroup::"
          echo "::group::Pods"
          kubectl get pods -n "${NS}" || true
          kubectl describe pod platform-pg-1 -n "${NS}" || true
          echo "::endgroup::"
          echo "::group::CNPG operator logs"
          kubectl logs -n cnpg-system -l app.kubernetes.io/name=cloudnative-pg --tail=300 || true
          echo "::endgroup::"
          echo "::group::pg_publication state"
          kubectl exec -n "${NS}" platform-pg-1 -c postgres -- \
            psql -U postgres -d shogo -c "
              SELECT pubname, puballtables FROM pg_publication;
              SELECT * FROM pg_publication_namespace;
              SELECT * FROM pg_publication_tables;
            " || true
          echo "::endgroup::"
