# =============================================================================
# Shogo AI - Project Runtime E2E Testing (PostgreSQL Sidecar Architecture)
# =============================================================================
# Tests the pod-per-project architecture locally using Docker.
# This simulates the Kubernetes architecture where each project has:
#   - project-runtime: Claude Code agent + MCP + Vite
#   - postgres: PostgreSQL sidecar (localhost connection)
#
# Usage:
#   docker-compose -f docker-compose.project-runtime.yml up -d
#   ./scripts/test-project-runtime-e2e.sh
#   docker-compose -f docker-compose.project-runtime.yml down -v
#
# Architecture:
#   In Kubernetes, both containers run in the same pod and communicate via
#   localhost. In Docker Compose, we use Docker networks with container names.
#   The project-runtime connects to "postgres-sidecar:5432" which simulates
#   the "localhost:5432" connection in Kubernetes.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Sidecar (Per-Project Database)
  # ---------------------------------------------------------------------------
  # In production (Kubernetes), this runs as a sidecar container in the same
  # pod as project-runtime. The project connects via localhost:5432.
  # In Docker Compose, we simulate this with a dedicated postgres service.
  # ---------------------------------------------------------------------------
  postgres-sidecar:
    image: postgres:16-alpine
    container_name: project-runtime-postgres-sidecar
    environment:
      POSTGRES_USER: shogo
      POSTGRES_PASSWORD: shogo
      POSTGRES_DB: project
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      # Expose on 5433 for local testing (5432 is used by main postgres)
      - "5433:5432"
    volumes:
      - postgres-sidecar-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "shogo", "-d", "project"]
      interval: 3s
      timeout: 2s
      retries: 10
    networks:
      - project-runtime-network

  # ---------------------------------------------------------------------------
  # MinIO (S3-compatible storage for project files)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: project-runtime-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - project-runtime-network

  # ---------------------------------------------------------------------------
  # MinIO Bucket Initialization
  # ---------------------------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    container_name: project-runtime-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: |
      /bin/sh -c "
        echo 'Configuring MinIO client...'
        mc alias set myminio http://minio:9000 minioadmin minioadmin
        
        echo 'Creating buckets...'
        mc mb myminio/shogo-workspaces --ignore-existing
        mc mb myminio/shogo-schemas --ignore-existing
        
        echo 'Setting bucket policies...'
        mc anonymous set download myminio/shogo-workspaces
        mc anonymous set download myminio/shogo-schemas
        
        echo 'Uploading test project files...'
        echo '{\"name\":\"test-project\",\"private\":true}' > /tmp/package.json
        mc cp /tmp/package.json myminio/shogo-workspaces/test-project-123/package.json
        
        echo 'MinIO initialization complete!'
        mc ls myminio/shogo-workspaces/
      "
    networks:
      - project-runtime-network

  # ---------------------------------------------------------------------------
  # Project Runtime (with PostgreSQL Sidecar)
  # ---------------------------------------------------------------------------
  # This simulates a Kubernetes pod with two containers:
  #   1. project-runtime (this container)
  #   2. postgres-sidecar (the database)
  # 
  # In Kubernetes, DATABASE_URL points to localhost:5432.
  # In Docker Compose, we use the postgres-sidecar service name.
  # ---------------------------------------------------------------------------
  project-runtime:
    build:
      context: .
      dockerfile: packages/project-runtime/Dockerfile
    container_name: project-runtime-test
    ports:
      - "8081:8080"   # Agent server
      - "5174:5173"   # Vite preview
    env_file:
      - path: .env.local
        required: false
    environment:
      # Project configuration
      PROJECT_ID: test-project-123
      PROJECT_DIR: /app/project
      SCHEMAS_PATH: /app/.schemas
      MCP_SERVER_PATH: /app/packages/project-runtime/src/mcp-templates.ts
      PORT: "8080"
      NODE_ENV: development
      # PostgreSQL Sidecar connection
      # In Kubernetes: postgres://shogo:shogo@localhost:5432/project
      # In Docker Compose: use service name instead of localhost
      DATABASE_URL: postgres://shogo:shogo@postgres-sidecar:5432/project
      # S3/MinIO configuration
      S3_WORKSPACES_BUCKET: shogo-workspaces
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_FORCE_PATH_STYLE: "true"
      S3_SYNC_INTERVAL: "30000"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      # ANTHROPIC_API_KEY loaded from .env.local
    volumes:
      # Mount schemas for MCP
      - ./.schemas:/app/.schemas:ro
      # Persist project data
      - project-data:/app/project
    depends_on:
      postgres-sidecar:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - project-runtime-network

volumes:
  postgres-sidecar-data:
    name: project-runtime-postgres-data
  minio-data:
    name: project-runtime-minio-data
  project-data:
    name: project-runtime-project-data

networks:
  project-runtime-network:
    name: project-runtime-network
    driver: bridge
