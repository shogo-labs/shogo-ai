# SigNoz alert: conflict watchdog failing (needs human intervention)
#
# Apply via SigNoz UI ("Alert Rules" -> "New Alert Rule" -> Import) or the
# SigNoz HTTP API (POST /api/v1/rules). NOT applied by `terraform apply`.
#
# Why: `k8s/cnpg/logical-replication/conflict-watchdog.yaml` self-heals the
# occasional escaped active-active conflict by skipping the known-safe classes
# (insert_exists / update_exists / multiple_unique_conflicts) and re-enabling
# the subscription. A SUCCESSFUL heal exits 0 and does NOT page — that's the
# point. The watchdog exits NON-ZERO (and this alert fires) only when it needs a
# human:
#   * a subscription disabled with NO known-safe conflict in the log window
#     (unknown cause — do not blind-skip), or
#   * the per-run SKIP_BUDGET was exhausted (conflict storm or a real bug
#     producing unbounded distinct conflicts).
# Either way the mesh is stuck in a way the watchdog deliberately won't paper
# over.
#
# Same "no successful run in 15 min" shape as ReplicationMonitorFailing — it also
# catches the watchdog not running at all. Auto-clears on the next green run.
#
# NOTE (skip review): every skip the watchdog performs prints a `WATCHDOG_SKIP
# sub=... relation=... lsn=...` line. A skip is a data-loss event and MUST be
# reviewed even though it does not page here. Add a SigNoz *logs* alert on the
# `WATCHDOG_SKIP` marker (body contains "WATCHDOG_SKIP") at warning severity so
# skips are triaged — that alert is log-based (different schema) and is tracked
# in docs/runbooks/mesh-durably-healthy-plan.md.

alert: ConflictWatchdogFailing
ruleType: threshold_rule
condition:
  compositeQuery:
    queryType: promql
    promQueries:
      A:
        query: |
          min by (cluster) (
            time()
            - kube_cronjob_status_last_successful_time{
                namespace="shogo-production-system",
                cronjob="conflict-watchdog"
              }
          )
        legend: "{{cluster}}"
        disabled: false
  op: ">"
  target: 900 # 15m = 3 missed 5-minute intervals
  matchType: "1" # at-least-once-during
  selectedQuery: A
evalWindow: "5m0s"
frequency: "1m0s"
labels:
  severity: critical
  team: platform
  incident_class: logical_replication
annotations:
  summary: "conflict-watchdog is failing/not running — the mesh may be stuck with no safe auto-heal"
  description: |
    A region's logical-replication conflict-watchdog CronJob has not had a
    successful run in 15+ minutes. This means it either (a) hit a disabled
    subscription it must NOT auto-skip (unknown, non-safe conflict class), (b)
    exhausted its per-run skip budget (conflict storm / real bug), or (c) is not
    running at all. The self-heal safety net is down; a disabled subscription
    will now stay disabled until a human acts.

    Triage:
    1. Read the failing region's watchdog log:
       kubectl get jobs -n shogo-production-system | grep conflict-watchdog
       kubectl logs -n shogo-production-system job/<newest conflict-watchdog job>
    2. The log states the reason (CRITICAL: ... no known-safe conflict / skip
       budget exhausted) and the stuck subscription + relation.
    3. Inspect the conflict on the publisher; decide skip vs. fix the duplicate
       row per k8s/cnpg/logical-replication/RUNBOOK.md step 9.
    4. If it's a conflict storm, find the multi-writer source (a write path that
       bypassed home-region routing) before re-enabling.

    Runbook: k8s/cnpg/logical-replication/RUNBOOK.md
    Plan: docs/runbooks/mesh-durably-healthy-plan.md
