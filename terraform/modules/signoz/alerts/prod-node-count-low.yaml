# SigNoz alert: production node count below declared minimum
#
# Why: the b11c65dd incident root-cause was a single-node prod-us
# cluster despite terraform declaring `system_pool_min = 2`. Live
# state had drifted (autoscaler scaled past min during a quiet window
# OR an OCI VM died and didn't get replaced) and we had no alert on
# the drift. This rule catches the drift within 5 minutes.
#
# As of 2026-06-02 (run 26865807851) the autoscaler MIN floor is now
# wired to the live deploy via vars.NODE_POOL_MIN (deploy.yml "Deploy
# Cluster Autoscaler" -> k8s/base/cluster-autoscaler.yaml `--nodes`),
# so the old "autoscaler hardcoded to 1, ignores terraform min" drift
# class should no longer occur. A breach now means an OCI VM died and
# wasn't replaced, or the deploy hasn't re-applied the floor yet.
#
# Threshold mirrors the rollout-headroom bump: prod-us min is now 4.
# When you adjust min in terraform/environments/production-us/main.tf
# (and the matching NODE_POOL_MIN GitHub var), update this threshold.

alert: ProdNodeCountBelowMin
ruleType: threshold_rule
condition:
  compositeQuery:
    queryType: promql
    promQueries:
      A:
        query: |
          count(kube_node_info{cluster="oke-production-us"})
        legend: nodes
        disabled: false
  op: "<"
  target: 4
  matchType: "1" # at-least-once-during
  selectedQuery: A
evalWindow: "5m0s"
frequency: "1m0s"
labels:
  severity: critical
  team: platform
  cluster: oke-production-us
annotations:
  summary: "oke-production-us has fewer than 4 nodes"
  description: |
    Live node count has dropped below the terraform-declared
    `system_pool_min = 4`. Either:
      (a) An OCI VM has died and the node pool isn't replacing it.
          Check OCI Console -> OKE -> oke-production-us -> Node Pools.
      (b) The cluster autoscaler is ignoring the min floor. Check
          autoscaler logs (and confirm `--nodes` MIN matches
          vars.NODE_POOL_MIN=4):
            kubectl logs -n kube-system deployment/cluster-autoscaler

    Without 4+ nodes the warm-pool churn during a deploy will
    starve paying users on `Insufficient memory`, and a new revision's
    `min-scale: 2` pods may force a COLD node to be provisioned
    mid-rollout (the cold-pull-mid-rollout failure class).

    Runbook: docs/runbooks/deploy-prod.md
