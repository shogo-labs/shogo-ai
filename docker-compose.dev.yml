# =============================================================================
# Shogo AI - Local Development Environment (with Hot Reload)
# =============================================================================
# Usage:
#   docker-compose -f docker-compose.dev.yml up -d    # Start all services
#   docker-compose -f docker-compose.dev.yml logs -f  # Follow all logs
#   docker-compose -f docker-compose.dev.yml down     # Stop all services
#
# Infra-only mode (run apps locally with native hot reload):
#   docker-compose -f docker-compose.dev.yml up -d postgres redis minio traefik
#   bun run dev  # Run all apps locally
#
# This config provides:
#   - Hot reload for web (Vite), API (bun --watch), and MCP
#   - Source code mounted as volumes
#   - Infrastructure services (postgres, redis, minio) remain unchanged
#   - Traefik reverse proxy for subdomain routing (project runtimes)
#
# Access points:
#   - Web:      http://localhost:5173
#   - API:      http://localhost:8002
#   - MCP:      http://localhost:3100
#   - Traefik:  http://localhost:8080 (dashboard)
#   - Projects: http://{project-id}.localhost:80 (via Traefik)
#   - Postgres: localhost:5432
#   - Redis:    localhost:6379
#   - MinIO:    http://localhost:9001 (console)
#
# Environment: Reads from .env.local (secrets like ANTHROPIC_API_KEY)
#
# Subdomain Routing:
#   Traefik routes *.localhost to project Vite runtimes based on Host header.
#   Example: project-abc.localhost -> localhost:5200 (project-abc's Vite)
#
#   For local development, add to /etc/hosts:
#     127.0.0.1 *.localhost
#   Or use dnsmasq to resolve all *.localhost to 127.0.0.1
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Traefik Reverse Proxy (Subdomain Routing for Project Runtimes)
  # ---------------------------------------------------------------------------
  # Routes *.localhost to appropriate backend ports based on Host header.
  # Used for isolating project Vite runtimes with subdomain-based routing.
  #
  # Dashboard: http://localhost:8080
  # Project access: http://{project-id}.localhost:80
  #
  # Example routing:
  #   project-abc.localhost -> host.docker.internal:5200
  #   project-xyz.localhost -> host.docker.internal:5201
  #
  # Note: Project runtimes are spawned by RuntimeManager on host ports 5200-5299.
  # Traefik routes to these via host.docker.internal.
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.0
    container_name: shogo-traefik-dev
    command:
      # Enable API and dashboard
      - "--api.insecure=true"
      - "--api.dashboard=true"
      # Docker provider for dynamic service discovery
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=shogo-dev-network"
      # File provider for static route configuration
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--providers.file.watch=true"
      # Entrypoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Log level for debugging
      - "--log.level=INFO"
    ports:
      # HTTP entrypoint for project subdomain routing
      - "80:80"
      # HTTPS entrypoint (optional, for future SSL)
      - "443:443"
      # Dashboard
      - "8080:8080"
    volumes:
      # Docker socket for dynamic service discovery
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      # Dynamic configuration for project routing
      - "./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro"
    extra_hosts:
      # Allow Traefik to route to host machine where Vite runtimes run
      - "host.docker.internal:host-gateway"
    networks:
      - shogo-dev-network
    labels:
      # Enable Traefik dashboard at traefik.localhost
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.localhost`)"
      - "traefik.http.routers.dashboard.service=api@internal"

  # ---------------------------------------------------------------------------
  # PostgreSQL Database (Control Plane + Workspace Data)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: shogo-postgres-dev
    environment:
      POSTGRES_USER: shogo
      POSTGRES_PASSWORD: shogo_dev
      POSTGRES_DB: shogo
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shogo"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - shogo-dev-network

  # ---------------------------------------------------------------------------
  # MinIO (S3-compatible storage)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: shogo-minio-dev
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data_dev:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - shogo-dev-network

  # ---------------------------------------------------------------------------
  # Redis (BetterAuth session cache)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: shogo-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    networks:
      - shogo-dev-network

  # ---------------------------------------------------------------------------
  # Shogo MCP Server - Development Mode with Hot Reload
  # ---------------------------------------------------------------------------
  mcp:
    image: oven/bun:1.2-alpine
    container_name: shogo-mcp-dev
    working_dir: /app
    command: sh -c "bun install && bun --watch packages/mcp/src/server-http.ts"
    ports:
      - "3100:3100"
    environment:
      MCP_PORT: "3100"
      NODE_ENV: development
      DATABASE_URL: postgres://shogo:shogo_dev@postgres:5432/shogo
      SCHEMAS_PATH: /app/.schemas
      WORKSPACE_ID: workspace
      TENANT_ID: tenant-a
    volumes:
      # Mount source code for hot reload
      - .:/app
      # Preserve node_modules in container
      - mcp_node_modules:/app/node_modules
      - mcp_package_node_modules:/app/packages/mcp/node_modules
      - state_api_node_modules:/app/packages/state-api/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -q --spider http://localhost:3100/mcp 2>/dev/null || wget -q --spider http://localhost:3100/sse 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - shogo-dev-network

  # ---------------------------------------------------------------------------
  # Shogo API Server - Development Mode with Hot Reload
  # ---------------------------------------------------------------------------
  api:
    image: oven/bun:1.2-alpine
    container_name: shogo-api-dev
    working_dir: /app
    # Run as non-root user (required for Claude Code --dangerously-skip-permissions)
    user: "1000:1000"
    command: sh -c "bun install && cd packages/state-api && bun run build && cd /app && bun --watch apps/api/src/server.ts"
    ports:
      - "8002:8002"
    env_file:
      - path: .env.local
        required: false
    environment:
      API_PORT: "8002"
      NODE_ENV: development
      DATABASE_URL: postgres://shogo:shogo_dev@postgres:5432/shogo
      MCP_URL: http://mcp:3100
      VITE_PORT: "5173"
      BETTER_AUTH_SECRET: shogo-local-dev-secret-32-chars-minimum-ok
      BETTER_AUTH_URL: http://localhost:8002
      REDIS_URL: redis://redis:6379
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
      # Agent persona: 'wavesmith' (default) or 'code'
      SHOGO_AGENT: code
      # ANTHROPIC_API_KEY loaded from .env.local via env_file
    volumes:
      # Mount source code for hot reload
      - .:/app
      # Preserve node_modules in container
      - api_node_modules:/app/node_modules
      - api_app_node_modules:/app/apps/api/node_modules
      - state_api_node_modules:/app/packages/state-api/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -q --spider http://localhost:8002/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - shogo-dev-network

  # ---------------------------------------------------------------------------
  # Shogo Web Frontend - Vite Dev Server with Hot Reload
  # ---------------------------------------------------------------------------
  web:
    image: oven/bun:1.2-alpine
    container_name: shogo-web-dev
    working_dir: /app
    command: sh -c "bun install && cd packages/state-api && bun run build && cd /app/apps/web && bun run dev --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      VITE_PORT: "5173"
      VITE_API_URL: http://localhost:8002
      VITE_MCP_URL: http://localhost:3100
      VITE_BETTER_AUTH_URL: http://localhost:8002
      VITE_WORKSPACE: workspace
      # HMR configuration for Docker
      VITE_HMR_HOST: localhost
      VITE_HMR_PORT: "5173"
      # Enable polling for file watching (needed for Docker on macOS)
      VITE_USE_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      # Mount source code for hot reload
      - .:/app
      # Preserve node_modules in container
      - web_node_modules:/app/node_modules
      - state_api_node_modules:/app/packages/state-api/node_modules
      - web_app_node_modules:/app/apps/web/node_modules
    depends_on:
      - api
      - mcp
    networks:
      - shogo-dev-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data_dev:
    name: shogo-postgres-data-dev
  minio_data_dev:
    name: shogo-minio-data-dev
  redis_data_dev:
    name: shogo-redis-data-dev
  # Node modules volumes to avoid host/container conflicts
  mcp_node_modules:
    name: shogo-mcp-node-modules-dev
  mcp_package_node_modules:
    name: shogo-mcp-package-node-modules-dev
  api_node_modules:
    name: shogo-api-node-modules-dev
  api_app_node_modules:
    name: shogo-api-app-node-modules-dev
  web_node_modules:
    name: shogo-web-node-modules-dev
  state_api_node_modules:
    name: shogo-state-api-node-modules-dev
  web_app_node_modules:
    name: shogo-web-app-node-modules-dev

# =============================================================================
# Networks
# =============================================================================
networks:
  shogo-dev-network:
    name: shogo-dev-network
    driver: bridge
