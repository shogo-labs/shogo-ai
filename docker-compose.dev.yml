# =============================================================================
# Shogo AI - Development Override (Hot Reloading)
# =============================================================================
# Usage:
#   bun run docker:dev:up          # Start dev mode
#   bun run docker:dev:build       # Rebuild and start
#   bun run docker:dev:logs        # Follow logs
#   bun run docker:dev:down        # Stop
#
# Git Worktree Isolation:
#   Each worktree gets unique ports via PORT_OFFSET in .env.local
#   Run ./scripts/worktree-setup.sh to generate .env.local with unique ports
#   COMPOSE_PROJECT_NAME isolates containers, volumes, and networks
#
# This override:
#   - Mounts source code for live editing (Claude can edit packages/*, apps/*)
#   - Uses Vite dev server for web (HMR)
#   - Inherits parameterized ports from .env.local for worktree isolation
#
# Environment: Reads from .env.local (ports, secrets like ANTHROPIC_API_KEY)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # MCP Server - Development with hot reloading
  # ---------------------------------------------------------------------------
  # Strategy: Mount entire project, use anonymous volume to preserve node_modules
  # ---------------------------------------------------------------------------
  mcp:
    build:
      context: .
      dockerfile: packages/mcp/Dockerfile.dev
    env_file:
      - path: .env.local
        required: false
    volumes:
      - .:/app
      # Preserve all node_modules from container build (bun workspaces structure)
      - /app/node_modules
      - /app/packages/state-api/node_modules
      - /app/packages/mcp/node_modules
      - /app/.config
      # - /app/.claude/debug
      # - /app/.claude/projects
      # - /app/.claude/session-env
      # - /app/.claude/shell-snapshots
      # - /app/.claude/todos
      # - /app/.claude/statsig
      # - /app/.claude/plugins
      # - /app/.claude/plans
    environment:
      NODE_ENV: development
    # Note: Intentionally NOT using --watch here
    # Claude Code SDK writes to .claude/ during chat, which would trigger restarts
    # Also, Claude may edit source code during chat - we don't want to lose the stream
    command: ["bun", "run", "src/server-http.ts"]

  # ---------------------------------------------------------------------------
  # MCP Server Workspace 2 - Development with hot reloading
  # ---------------------------------------------------------------------------
  mcp-workspace-2:
    build:
      context: .
      dockerfile: packages/mcp/Dockerfile.dev
    env_file:
      - path: .env.local
        required: false
    volumes:
      - .:/app
      - /app/node_modules
      - /app/packages/state-api/node_modules
      - /app/packages/mcp/node_modules
      - /app/.config
      # - /app/.claude/debug
      # - /app/.claude/projects
      # - /app/.claude/session-env
      # - /app/.claude/shell-snapshots
      # - /app/.claude/todos
      # - /app/.claude/statsig
      # - /app/.claude/plugins
      # - /app/.claude/plans
    environment:
      NODE_ENV: development
    # Note: Intentionally NOT using --watch here
    # Claude Code SDK writes to .claude/ during chat, which would trigger restarts
    # Also, Claude may edit source code during chat - we don't want to lose the stream
    command: ["bun", "run", "src/server-http.ts"]

  # ---------------------------------------------------------------------------
  # API Server - Development with hot reloading
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    env_file:
      - path: .env.local
        required: false
    volumes:
      - .:/app
      # Preserve node_modules from container build (bun workspaces structure)
      - /app/node_modules
      - /app/packages/state-api/node_modules
      - /app/packages/mcp/node_modules
      - /app/apps/api/node_modules
      # Mask Claude Code SDK runtime directories (stay in container, don't sync to host)
      # Note: .claude.json files can't be masked (SDK needs read/write) - rely on .gitignore
      - /app/.config
      # - /app/.claude/debug
      # - /app/.claude/projects
      # - /app/.claude/session-env
      # - /app/.claude/shell-snapshots
      # - /app/.claude/todos
      # - /app/.claude/statsig
      # - /app/.claude/plugins
      # - /app/.claude/plans
    environment:
      NODE_ENV: development
      # Dynamic CORS for worktree isolation (matches ports from .env.local)
      ALLOWED_ORIGINS: http://localhost:${WEB_PORT:-3000},http://localhost:${VITE_DEV_PORT:-5173},http://localhost:${API_PORT:-8002}
    # Note: Intentionally NOT using --watch here
    # Claude Code SDK writes to .claude/ during chat, which would trigger restarts
    # Also, Claude may edit source code during chat - we don't want to lose the stream
    command: ["bun", "run", "src/server.ts"]

  # ---------------------------------------------------------------------------
  # Web Frontend - Development with Vite HMR
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    env_file:
      - path: .env.local
        required: false
    ports: !override
      # Override base ports (nginx:80) with Vite dev server (3000)
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/packages/state-api/node_modules
      - /app/packages/mcp/node_modules
      - /app/apps/web/node_modules
    environment:
      NODE_ENV: development
      # Client-side URLs (used by browser) - parameterized for worktree isolation
      VITE_API_URL: http://localhost:${API_PORT:-8002}
      VITE_MCP_URL: http://localhost:${MCP_PORT:-3100}
      VITE_BETTER_AUTH_URL: http://localhost:${API_PORT:-8002}
      VITE_WORKSPACE: ${WORKSPACE_ID:-workspace}
      # Server-side proxy targets (Vite dev server uses Docker networking)
      # Internal ports are fixed (8002, 3100) - only external ports change
      VITE_API_PROXY_TARGET: http://api:8002
      VITE_MCP_PROXY_TARGET: http://mcp:3100
    command: ["bun", "run", "dev", "--host", "0.0.0.0", "--port", "3000"]
