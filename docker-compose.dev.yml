# =============================================================================
# Shogo AI - Development Override (Hot Reloading)
# =============================================================================
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Quick start:
#   bun run docker:dev        # Start with HMR support
#   bun run docker:dev:build  # Rebuild and start
#   bun run docker:dev:logs   # Follow all logs
#   bun run docker:dev:down   # Stop all services
#
# Port Reference:
#   - Web UI:    http://localhost:5173 (with HMR)
#   - API:       http://localhost:8002
#   - MCP:       http://localhost:3100
#   - Postgres:  localhost:5432
#   - MinIO:     localhost:9000 (console: 9001)
#   - Redis:     localhost:6379
#
# E2E Tests:
#   cd apps/web && bun run test:e2e
#
# This override:
#   - Mounts source code for live editing
#   - Uses watch mode for api and mcp (auto-restart on file changes)
#   - Uses Vite dev server for web (HMR with WebSocket)
#   - Project preview works via RuntimeManager (no separate container needed)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # MCP Server - Development with hot reloading
  # ---------------------------------------------------------------------------
  # Strategy: Mount entire project, use anonymous volume to preserve node_modules
  # ---------------------------------------------------------------------------
  mcp:
    build:
      context: .
      dockerfile: packages/mcp/Dockerfile.dev
    volumes:
      - .:/app
      # Preserve all node_modules from container build (bun workspaces structure)
      - /app/node_modules
      - /app/packages/state-api/node_modules
      - /app/packages/mcp/node_modules
    environment:
      NODE_ENV: development
    command: ["bun", "--watch", "src/server-http.ts"]

  # ---------------------------------------------------------------------------
  # MCP Server Workspace 2 - Development with hot reloading
  # ---------------------------------------------------------------------------
  mcp-workspace-2:
    build:
      context: .
      dockerfile: packages/mcp/Dockerfile.dev
    volumes:
      - .:/app
      - /app/node_modules
      - /app/packages/state-api/node_modules
      - /app/packages/mcp/node_modules
    environment:
      NODE_ENV: development
    command: ["bun", "--watch", "src/server-http.ts"]

  # ---------------------------------------------------------------------------
  # API Server - Development with hot reloading
  # ---------------------------------------------------------------------------
  # The API also runs RuntimeManager for project previews, spawning Vite
  # processes inside this container. No separate runtime container needed.
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    volumes:
      - .:/app
      - /app/node_modules
      - /app/packages/state-api/node_modules
      - /app/packages/mcp/node_modules
      - /app/packages/project-runtime/node_modules
      - /app/apps/api/node_modules
      # Persist workspaces for project files
      - ./workspaces:/app/workspaces
    environment:
      NODE_ENV: development
      # CORS: Allow all development origins
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173,http://127.0.0.1:5173,http://host.docker.internal:5173
      # RuntimeManager config for project previews
      WORKSPACES_DIR: /app/workspaces
      RUNTIME_BASE_PORT: "5200"
      RUNTIME_DOMAIN_SUFFIX: localhost
      # Projects database (isolated from platform database)
      PROJECTS_DATABASE_URL: postgres://project:project_dev@postgres-projects:5432/projects
    command: ["bun", "--watch", "src/server.ts"]

  # ---------------------------------------------------------------------------
  # Web Frontend - Development with Vite HMR
  # ---------------------------------------------------------------------------
  # Runs on port 5173 (standard Vite port) for compatibility with e2e tests.
  # HMR WebSocket is configured to work through Docker networking.
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    ports:
      # Expose on 5173 for e2e test compatibility
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/packages/state-api/node_modules
      - /app/packages/mcp/node_modules
      - /app/apps/web/node_modules
    environment:
      NODE_ENV: development
      # Vite server config
      VITE_PORT: "5173"
      # Client-side URLs (used by browser - points to Docker exposed ports)
      VITE_API_URL: http://localhost:8002
      VITE_MCP_URL: http://localhost:3100
      VITE_BETTER_AUTH_URL: http://localhost:8002
      VITE_WORKSPACE: workspace
      # Server-side proxy targets (Vite dev server uses Docker networking)
      VITE_API_PROXY_TARGET: http://api:8002
      VITE_MCP_PROXY_TARGET: http://mcp:3100
      # HMR configuration for Docker
      VITE_HMR_HOST: localhost
      VITE_HMR_PORT: "5173"
      # Enable file watching with polling (required for Docker on macOS/Windows)
      VITE_USE_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    command: ["bun", "run", "dev", "--host", "0.0.0.0", "--port", "5173"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5173"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 3
