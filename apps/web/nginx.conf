server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # DNS resolver (configurable - Docker uses 127.0.0.11, K8s uses kube-dns)
    resolver ${DNS_RESOLVER} valid=10s;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Proxy /api requests to the API service (same namespace)
    # Uses environment variables: API_UPSTREAM, API_HOST
    # Note: Uses set directive to enable dynamic DNS resolution via resolver
    location /api/ {
        set $api_upstream ${API_UPSTREAM};
        proxy_pass $api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host ${API_HOST};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # Proxy /mcp requests to the MCP workspace service
    # Uses environment variables: MCP_UPSTREAM, MCP_HOST
    # Match both /mcp and /mcp/... paths
    location /mcp {
        set $mcp_upstream ${MCP_UPSTREAM};
        # Rewrite to forward to /mcp on the upstream
        rewrite ^/mcp$ /mcp break;
        rewrite ^/mcp/(.*)$ /mcp/$1 break;
        proxy_pass $mcp_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host ${MCP_HOST};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 300s;
        # Prevent redirects from changing the host
        proxy_redirect off;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback - all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

